<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BrainDeer – Sign in with Google</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#3a2918;--card:#4a3625;--cream:#f0e2cc;--tan:#c2a476;--green:#58cc02;--greend:#46a302;--mid:#6b4f32}
    body{
      background:var(--bg);min-height:100dvh;
      font-family:'Nunito',sans-serif;color:var(--cream);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:24px 20px;text-align:center;gap:20px;
    }
    .mascot{font-size:56px;animation:bob 1.2s ease-in-out infinite}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    h1{font-size:24px;font-weight:900}
    p{font-size:15px;font-weight:700;color:var(--tan);line-height:1.5;max-width:280px}
    .btn{
      padding:15px 32px;border:none;border-radius:16px;
      background:var(--green);color:#fff;
      font-size:16px;font-weight:900;font-family:'Nunito',sans-serif;
      cursor:pointer;display:flex;align-items:center;gap:10px;
      box-shadow:0 5px 0 var(--greend);
      transition:transform .1s,box-shadow .1s;
    }
    .btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--greend)}
    .btn:disabled{opacity:.5;pointer-events:none}
    .g-logo{width:20px;height:20px}
    .spinner{
      width:20px;height:20px;border:3px solid transparent;
      border-top-color:#fff;border-radius:50%;
      animation:spin .6s linear infinite;display:none;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .status{
      font-size:14px;font-weight:700;color:var(--tan);
      min-height:20px;
    }
    .success-box{
      background:#4a3625;border-radius:16px;padding:20px 24px;
      max-width:300px;display:none;
    }
    .success-box h2{font-size:20px;font-weight:900;margin-bottom:8px}
    .success-box p{font-size:14px;color:var(--tan)}
  </style>
</head>
<body>

<div class="mascot">🦌</div>
<h1>Sign in with Google</h1>
<p>Tap the button below to connect your Google account to BrainDeer.</p>

<button class="btn" id="btn" onclick="doSignIn()">
  <svg class="g-logo" viewBox="0 0 48 48">
    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
  </svg>
  <span id="btn-text">Continue with Google</span>
  <div class="spinner" id="spinner"></div>
</button>

<div class="status" id="status"></div>

<div class="success-box" id="success-box">
  <h2>✅ Signed in!</h2>
  <p>You're all set. Go back to the BrainDeer app — it'll open automatically.</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const cfg = {
    apiKey: "AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",
    authDomain: "braindeer-backend.firebaseapp.com",
    projectId: "braindeer-backend",
    storageBucket: "braindeer-backend.firebasestorage.app",
    messagingSenderId: "331205139765",
    appId: "1:331205139765:web:20cfef8194af63fc55c07c"
  };

  const app  = initializeApp(cfg);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const gp   = new GoogleAuthProvider();

  // If already signed in (e.g. user came back), show success immediately
  onAuthStateChanged(auth, u => {
    if (u) showSuccess();
  });

  async function ensure(u) {
    const ref = doc(db, 'users', u.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        uid: u.uid, email: u.email,
        username: u.displayName || null,
        pic: u.photoURL || null,
        createdAt: serverTimestamp(), lastSeen: serverTimestamp()
      });
    } else {
      setDoc(ref, { lastSeen: serverTimestamp() }, { merge: true });
    }
  }

  function setLoading(on) {
    document.getElementById('btn').disabled = on;
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('btn-text').style.display = on ? 'none' : 'inline';
  }

  function showSuccess() {
    document.getElementById('btn').style.display = 'none';
    document.getElementById('status').textContent = '';
    document.getElementById('success-box').style.display = 'block';
    // Try to close this tab and return to the PWA
    setTimeout(() => {
      window.close();
      // Fallback: redirect back to the app
      setTimeout(() => {
        window.location.href = 'https://braindeer.org';
      }, 800);
    }, 1200);
  }

  window.doSignIn = async function() {
    setLoading(true);
    document.getElementById('status').textContent = 'Opening Google…';
    try {
      // This page is in normal Safari (not standalone), so popup works fine
      const result = await signInWithPopup(auth, gp);
      await ensure(result.user);
      showSuccess();
    } catch (e) {
      setLoading(false);
      document.getElementById('status').textContent =
        e.code === 'auth/popup-closed-by-user' ? 'Cancelled. Tap the button to try again.' :
        'Something went wrong. Please try again.';
    }
  };
</script>

</body>
</html>
