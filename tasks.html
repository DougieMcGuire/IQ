<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daily Tasks – BrainDeer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #3a2918; --card: #4a3625; --card-glow: #5a4232;
      --brown-mid: #6b4f32; --brown-light: #8f6b4a;
      --tan: #c2a476; --cream: #f0e2cc;
      --green: #58cc02; --green-dark: #46a302;
      --red: #ea2b2b; --red-dark: #c42020;
      --gold: #ffc800; --gold-dark: #d9aa00;
      --orange: #ff9600;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Nunito', sans-serif;
      background: var(--bg); color: var(--cream);
    }

    /* ── Layout ── */
    .page {
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
    }

    /* ── Top bar ── */
    .top-bar {
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 12px;
      background: var(--bg); flex-shrink: 0;
    }
    .top-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .page-title { font-size: 22px; font-weight: 900; color: var(--cream); }
    .resets-chip {
      background: var(--card); border-radius: 12px; padding: 5px 12px;
      font-size: 11px; font-weight: 800; color: var(--tan);
      box-shadow: 0 2px 0 rgba(0,0,0,0.15);
    }

    /* ── Scrollable body ── */
    .scroll-body {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 12px 18px calc(env(safe-area-inset-bottom, 0px) + 84px);
    }
    .scroll-body::-webkit-scrollbar { display: none; }

    /* ── Daily streak card ── */
    .streak-card {
      background: var(--card); border-radius: 18px;
      padding: 14px 16px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
      position: relative; overflow: hidden;
    }
    .streak-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
      pointer-events: none;
    }
    .streak-flame { font-size: 36px; }
    .streak-info { flex: 1; }
    .streak-label { font-size: 11px; font-weight: 800; color: var(--tan); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 3px; }
    .streak-val { font-size: 28px; font-weight: 900; color: var(--orange); line-height: 1; }
    .streak-sub { font-size: 12px; font-weight: 600; color: var(--tan); margin-top: 2px; }

    /* ── Overall progress ── */
    .overall-card {
      background: var(--card); border-radius: 18px;
      padding: 14px 16px; margin-bottom: 14px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
      position: relative; overflow: hidden;
    }
    .overall-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
      pointer-events: none;
    }
    .overall-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .overall-label { font-size: 13px; font-weight: 800; color: var(--cream); }
    .overall-count { font-size: 13px; font-weight: 900; color: var(--gold); }
    .overall-bar-outer { height: 12px; background: var(--brown-mid); border-radius: 6px; overflow: hidden; }
    .overall-bar-inner {
      height: 100%; border-radius: 6px; background: var(--gold);
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }
    .overall-bar-inner::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 45%;
      background: rgba(255,255,255,0.28); border-radius: 6px 6px 0 0;
    }

    /* ── Complete banner ── */
    .complete-banner {
      display: none; align-items: center; gap: 14px;
      background: linear-gradient(135deg, #58cc02 0%, #46d400 100%);
      border-radius: 18px; padding: 16px 18px; margin-bottom: 14px;
      box-shadow: 0 5px 0 var(--green-dark);
    }
    .complete-banner.show { display: flex; animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    .cb-icon { font-size: 36px; }
    .cb-text .cb-title { font-size: 16px; font-weight: 900; color: #fff; }
    .cb-text .cb-sub   { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.85); margin-top: 2px; }

    /* ── Task section label ── */
    .section-label {
      font-size: 11px; font-weight: 800; color: var(--tan);
      letter-spacing: 1.2px; text-transform: uppercase;
      margin-bottom: 8px; padding-left: 2px;
    }

    /* ── Task cards ── */
    .task-card {
      background: var(--card); border-radius: 18px;
      padding: 14px 14px 14px 14px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
      position: relative; overflow: hidden;
      transition: opacity 0.4s;
    }
    .task-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
      pointer-events: none; border-radius: 18px 18px 0 0;
    }
    .task-card.is-claimed { opacity: 0.45; }

    .task-icon {
      width: 48px; height: 48px; flex-shrink: 0;
      background: var(--bg); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; box-shadow: 0 3px 0 rgba(0,0,0,0.15);
    }

    .task-body { flex: 1; min-width: 0; }
    .task-label { font-size: 14px; font-weight: 800; color: var(--cream); margin-bottom: 8px; line-height: 1.25; }

    .task-progress-row { display: flex; align-items: center; gap: 8px; }
    .task-bar-outer {
      flex: 1; height: 8px; background: var(--brown-mid);
      border-radius: 4px; overflow: hidden;
    }
    .task-bar-inner {
      height: 100%; border-radius: 4px; background: var(--green);
      transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
    }
    .task-bar-inner::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 45%;
      background: rgba(255,255,255,0.25); border-radius: 4px 4px 0 0;
    }
    .task-bar-inner.bar-done { background: var(--gold); }
    .task-pct { font-size: 11px; font-weight: 800; color: var(--tan); white-space: nowrap; }

    /* Claim btn */
    .task-claim {
      flex-shrink: 0;
      background: var(--gold); color: #2a1800;
      border: none; border-radius: 12px; padding: 10px 14px;
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 900;
      cursor: pointer; box-shadow: 0 4px 0 var(--gold-dark);
      transition: transform 0.1s, box-shadow 0.1s;
      white-space: nowrap; line-height: 1;
    }
    .task-claim:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--gold-dark); }

    .task-done-badge { flex-shrink: 0; font-size: 26px; animation: popIn 0.3s ease; }

    /* ── XP toast ── */
    .xp-toast {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      left: 50%; transform: translateX(-50%) translateY(-16px);
      background: var(--gold); color: #2a1800;
      border-radius: 20px; padding: 8px 20px;
      font-size: 17px; font-weight: 900;
      box-shadow: 0 4px 0 var(--gold-dark);
      z-index: 999; opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }
    .xp-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Confetti ── */
    .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 800; overflow: hidden; }
    .confetti i { position: absolute; width: 10px; height: 10px; opacity: 0; border-radius: 3px; }
    .confetti i.fall { animation: confettiFall 1.3s ease-out forwards; }

    /* ── Nav ── */
    nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(64px + env(safe-area-inset-bottom, 0px));
      background: var(--card); box-shadow: 0 -3px 0 rgba(0,0,0,0.15);
      display: flex; justify-content: center; align-items: flex-start;
      padding-top: 6px; gap: 4px; z-index: 100; flex-shrink: 0;
    }
    .nav-btn {
      padding: 8px 18px; background: none; border: none;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      color: #6b4f32; font-family: 'Nunito', sans-serif;
      font-size: 11px; font-weight: 800; border-radius: 14px;
      transition: all 0.15s; cursor: pointer; position: relative;
    }
    .nav-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .nav-btn.active { color: var(--cream); background: #6b4f32; box-shadow: 0 3px 0 rgba(0,0,0,0.15); }

    /* ── Empty / loading ── */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px;
      padding: 60px 20px; color: var(--tan);
      font-size: 14px; font-weight: 700;
    }
    .loading-spinner {
      width: 36px; height: 36px; border: 4px solid var(--brown-mid);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Animations ── */
    @keyframes popIn {
      0%   { transform: scale(0.85); opacity: 0; }
      60%  { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate-in { animation: slideUp 0.35s ease both; }
    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.1s; }
    .delay-3 { animation-delay: 0.15s; }
    .delay-4 { animation-delay: 0.2s; }
  </style>
</head>
<body>

<div class="page">
  <div class="top-bar">

<nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// ════════════════════════════════════════════════════
// BrainDeer Daily Tasks — Firestore-backed
// ════════════════════════════════════════════════════

var firebaseConfig = {
  apiKey:            "AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",
  authDomain:        "braindeer-backend.firebaseapp.com",
  projectId:         "braindeer-backend",
  storageBucket:     "braindeer-backend.firebasestorage.app",
  messagingSenderId: "331205139765",
  appId:             "1:331205139765:web:20cfef8194af63fc55c07c"
};

// Only init if not already done (parent may have already inited)
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

var db  = firebase.firestore();
var auth = firebase.auth();

// ── Nav ──
function navGo(page) {
  if (window.parent !== window) window.parent.goTo(page);
  else window.location.href = page + '.html';
}

// ── Helpers ──
function getTodayKey() {
  var n = new Date();
  return n.getFullYear() + '-' + (n.getMonth() + 1) + '-' + n.getDate();
}

function wasYesterday(dateStr) {
  if (!dateStr) return false;
  var parts = dateStr.split('-').map(Number);
  var prev  = new Date(parts[0], parts[1] - 1, parts[2]);
  var yest  = new Date();
  yest.setDate(yest.getDate() - 1);
  return prev.toDateString() === yest.toDateString();
}

function seededRandom(seed) {
  var s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

var TASK_POOL = [
  { id: 'streak_5',       type: 'streak',   target: 5,   label: 'Get a streak of 5',          icon: '🔥', xp: 30  },
  { id: 'streak_10',      type: 'streak',   target: 10,  label: 'Get a streak of 10',         icon: '🔥', xp: 60  },
  { id: 'streak_15',      type: 'streak',   target: 15,  label: 'Get a streak of 15',         icon: '🔥', xp: 100 },
  { id: 'correct_10',     type: 'correct',  target: 10,  label: 'Get 10 correct',              icon: '✅', xp: 25  },
  { id: 'correct_25',     type: 'correct',  target: 25,  label: 'Get 25 correct',              icon: '✅', xp: 50  },
  { id: 'correct_50',     type: 'correct',  target: 50,  label: 'Get 50 correct',              icon: '✅', xp: 90  },
  { id: 'answer_20',      type: 'answered', target: 20,  label: 'Answer 20 questions',         icon: '🧠', xp: 20  },
  { id: 'answer_50',      type: 'answered', target: 50,  label: 'Answer 50 questions',         icon: '🧠', xp: 45  },
  { id: 'answer_100',     type: 'answered', target: 100, label: 'Answer 100 questions',        icon: '🧠', xp: 80  },
  { id: 'accuracy_70',    type: 'accuracy', target: 70,  label: 'Hit 70% accuracy today',      icon: '🎯', xp: 35  },
  { id: 'accuracy_80',    type: 'accuracy', target: 80,  label: 'Hit 80% accuracy today',      icon: '🎯', xp: 55  },
  { id: 'play_wordle',    type: 'game', game: 'wordle',       target: 3, label: 'Play 3 Wordle rounds',      icon: '🟩', xp: 40 },
  { id: 'play_math',      type: 'game', game: 'mathRush',     target: 3, label: 'Play 3 Math Rush rounds',   icon: '➕', xp: 40 },
  { id: 'play_memory',    type: 'game', game: 'memory',       target: 2, label: 'Play 2 Memory games',       icon: '🃏', xp: 35 },
  { id: 'play_reaction',  type: 'game', game: 'reaction',     target: 3, label: 'Play 3 Reaction tests',     icon: '⚡', xp: 30 },
  { id: 'play_ttt',       type: 'game', game: 'ticTacToe',    target: 2, label: 'Play 2 Tic Tac Toe games',  icon: '⭕', xp: 30 },
  { id: 'play_simon',     type: 'game', game: 'simon',        target: 2, label: 'Play 2 Simon Says rounds',  icon: '🔴', xp: 35 },
  { id: 'play_scramble',  type: 'game', game: 'wordScramble', target: 3, label: 'Unscramble 3 words',        icon: '🔤', xp: 30 },
  { id: 'fast_5',         type: 'fast',     target: 5,   label: 'Answer 5 in under 3.5s',      icon: '⚡', xp: 45  },
  { id: 'fast_10',        type: 'fast',     target: 10,  label: 'Answer 10 in under 3.5s',     icon: '⚡', xp: 70  },
];

function getDailyTaskDefs() {
  var dateKey = getTodayKey();
  var seed    = dateKey.split('-').reduce(function(a, n) { return a * 31 + parseInt(n); }, 0);
  var rng     = seededRandom(seed);
  return TASK_POOL.slice().sort(function() { return rng() - 0.5; }).slice(0, 3);
}

function getTasksRef(uid) {
  return db.collection('users').doc(uid).collection('dailyTasks').doc(getTodayKey());
}

// ── Load or create today's task state ──
async function loadTaskState(uid) {
  var ref  = getTasksRef(uid);
  var snap = await ref.get();
  if (snap.exists) return snap.data();

  // Check yesterday's state for streak
  var yestKey  = (function() {
    var y = new Date(); y.setDate(y.getDate() - 1);
    return y.getFullYear() + '-' + (y.getMonth() + 1) + '-' + y.getDate();
  })();
  var yestSnap = await db.collection('users').doc(uid).collection('dailyTasks').doc(yestKey).get();
  var prevStreak = 0;
  if (yestSnap.exists) {
    var yd = yestSnap.data();
    prevStreak = (yd.allDone ? (yd.dailyStreak || 0) + 1 : (yd.dailyStreak || 0));
  }

  var fresh = {
    date:        getTodayKey(),
    tasks:       getDailyTaskDefs().map(function(def) {
      return Object.assign({}, def, { progress: 0, done: false, claimed: false });
    }),
    allDone:     false,
    allClaimed:  false,
    dailyStreak: prevStreak,
  };
  await ref.set(fresh);
  return fresh;
}

async function claimTaskInFirestore(uid, taskId) {
  var ref  = getTasksRef(uid);
  var snap = await ref.get();
  if (!snap.exists) return null;
  var state = snap.data();
  var task  = state.tasks.find(function(t) { return t.id === taskId && t.done && !t.claimed; });
  if (!task) return null;
  task.claimed = true;
  if (state.tasks.every(function(t) { return t.claimed; })) state.allClaimed = true;
  await ref.set(state);
  return task.xp;
}

function awardXP(xp) {
  // Post to parent -> app.html relays to improve.html -> IQData handles it
  try {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'xpAwarded', xp: xp }, '*');
    }
  } catch (e) { console.warn('[tasks] awardXP failed', e); }
}

// ── Reset timer ──
function updateResetTimer() {
  var now      = new Date();
  var midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  var diff = midnight - now;
  var h = Math.floor(diff / 3600000);
  var m = Math.floor((diff % 3600000) / 60000);
  var chip = document.getElementById('resets-chip');
  if (chip) chip.textContent = 'Resets in ' + h + 'h ' + m + 'm';
}

// ── Confetti ──
function spawnConfetti(n) {
  var colors = ['#58cc02','#ffc800','#ea2b2b','#1cb0f6','#ce82ff','#ff9600'];
  var el     = document.getElementById('confetti');
  for (var i = 0; i < n; i++) {
    var p = document.createElement('i');
    p.style.left           = Math.random() * 100 + '%';
    p.style.top            = '-12px';
    p.style.background     = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = Math.random() * 0.25 + 's';
    el.appendChild(p);
    setTimeout(function(el){ el.classList.add('fall'); }.bind(null, p), 10);
    setTimeout(function(el){ el.remove(); }.bind(null, p), 1500);
  }
}

// ── XP toast ──
function showXpToast(msg) {
  var t = document.getElementById('xp-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

// ════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════
var _currentUid = null;

function render(state) {
  var body = document.getElementById('scroll-body');
  var done  = state.tasks.filter(function(t) { return t.done; }).length;
  var total = state.tasks.length;

  body.innerHTML = '';

  // ── Daily streak card ──
  var streakCard = document.createElement('div');
  streakCard.className = 'streak-card animate-in';
  var streakDays = state.dailyStreak || 0;
  var streakSub  = streakDays === 0
    ? 'Complete all tasks today to start your streak!'
    : streakDays === 1 ? 'Great start — keep it up tomorrow!'
    : streakDays + ' days in a row \u2014 don\'t break it!';
  streakCard.innerHTML =
    '<div class="streak-flame">📅</div>' +
    '<div class="streak-info">' +
      '<div class="streak-label">Daily Challenge Streak</div>' +
      '<div class="streak-val">' + streakDays + ' ' + (streakDays === 1 ? 'day' : 'days') + '</div>' +
      '<div class="streak-sub">' + streakSub + '</div>' +
    '</div>';
  body.appendChild(streakCard);

  // ── Overall progress ──
  var overallCard = document.createElement('div');
  overallCard.className = 'overall-card animate-in delay-1';
  overallCard.innerHTML =
    '<div class="overall-row">' +
      '<span class="overall-label">Today\'s Progress</span>' +
      '<span class="overall-count">' + done + ' / ' + total + ' complete</span>' +
    '</div>' +
    '<div class="overall-bar-outer">' +
      '<div class="overall-bar-inner" style="width:' + ((done / total) * 100) + '%"></div>' +
    '</div>';
  body.appendChild(overallCard);

  // ── All done banner ──
  if (state.allDone) {
    var banner = document.createElement('div');
    banner.className = 'complete-banner show animate-in delay-2';
    banner.innerHTML =
      '<div class="cb-icon">🎉</div>' +
      '<div class="cb-text">' +
        '<div class="cb-title">All tasks complete!</div>' +
        '<div class="cb-sub">Come back tomorrow for a new set.</div>' +
      '</div>';
    body.appendChild(banner);
  }

  // ── Section label ──
  var sectionLabel = document.createElement('div');
  sectionLabel.className = 'section-label animate-in delay-2';
  sectionLabel.textContent = "Today's Tasks";
  body.appendChild(sectionLabel);

  // ── Task cards ──
  state.tasks.forEach(function(task, i) {
    var pct  = Math.min(100, Math.round((task.progress / task.target) * 100));
    var card = document.createElement('div');
    card.className = 'task-card animate-in' + (task.claimed ? ' is-claimed' : '') + ' delay-' + Math.min(i + 3, 4);

    var rightEl = '';
    if (task.claimed) {
      rightEl = '<div class="task-done-badge">✅</div>';
    } else if (task.done) {
      rightEl = '<button class="task-claim" data-id="' + task.id + '">+' + task.xp + ' XP</button>';
    }

    card.innerHTML =
      '<div class="task-icon">' + task.icon + '</div>' +
      '<div class="task-body">' +
        '<div class="task-label">' + task.label + '</div>' +
        '<div class="task-progress-row">' +
          '<div class="task-bar-outer">' +
            '<div class="task-bar-inner' + (task.done ? ' bar-done' : '') + '" style="width:' + pct + '%"></div>' +
          '</div>' +
          '<div class="task-pct">' + task.progress + ' / ' + task.target + '</div>' +
        '</div>' +
      '</div>' +
      rightEl;

    var claimBtn = card.querySelector('.task-claim');
    if (claimBtn) {
      (function(btn, uid) {
        btn.addEventListener('click', async function() {
          var xp = await claimTaskInFirestore(uid, btn.dataset.id);
          if (xp === null) return;
          awardXP(xp);
          spawnConfetti(22);
          showXpToast('+' + xp + ' XP');
          var fresh = await loadTaskState(uid);
          render(fresh);
        });
      })(claimBtn, _currentUid);
    }

    body.appendChild(card);
  });
}

// ════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════
updateResetTimer();
setInterval(updateResetTimer, 60000);

auth.onAuthStateChanged(async function(user) {
  if (!user) {
    // Not logged in — show nothing, let app.html handle redirect
    document.getElementById('loading-state').textContent = 'Please log in.';
    return;
  }
  _currentUid = user.uid;
  try {
    var state = await loadTaskState(user.uid);
    render(state);
  } catch (e) {
    console.error('[tasks] boot failed', e);
    document.getElementById('loading-state').textContent = 'Failed to load tasks.';
  }
});

// Listen for updates from improve.html (via app.html relay)
window.addEventListener('message', async function(e) {
  if (e.data && e.data.type === 'tasksUpdated' && _currentUid) {
    var fresh = await loadTaskState(_currentUid);
    render(fresh);
  }
});

// Refresh when tab becomes visible
document.addEventListener('visibilitychange', async function() {
  if (!document.hidden && _currentUid) {
    var fresh = await loadTaskState(_currentUid);
    render(fresh);
  }
});
</script>
</body>
</html>
