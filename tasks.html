<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover">
  <title>Tasks — Cebear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f0e8;--card:#fff;--card-border:#e8e2d6;
      --blue:#0474fc;--blue-dark:#0358c4;
      --text:#1e293b;--text-dim:#64748b;--text-light:#94a3b8;
      --green:#22c55e;--green-dark:#16a34a;
      --gold:#f59e0b;--gold-dark:#d97706;
      --orange:#f97316;--purple:#8b5cf6;
      --shadow-card:0 4px 0 var(--card-border);
      --shadow-blue:0 4px 0 var(--blue-dark);
      --r:18px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text)}
    body{display:flex;flex-direction:column}

    /* ── HEADER ── */
    .hdr{
      background:var(--blue);
      padding:calc(env(safe-area-inset-top,16px) + 10px) 20px 0;
      flex-shrink:0;position:relative;
    }
    .hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:18px;background:var(--bg);border-radius:18px 18px 0 0}
    .hdr-in{max-width:460px;margin:0 auto}

    .hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .hdr-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.2px}
    .hdr-cd{font-size:11px;font-weight:800;color:rgba(255,255,255,.45);letter-spacing:.5px;font-variant-numeric:tabular-nums}

    /* ── STATS ROW ── */
    .stats{display:flex;align-items:center;justify-content:center;gap:28px;padding-bottom:24px}

    .s-block{display:flex;flex-direction:column;align-items:center}
    .s-num{font-size:36px;font-weight:900;color:#fff;line-height:1;letter-spacing:-1px}
    .s-num.gold{color:#fcd34d}
    .s-label{font-size:9px;font-weight:800;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px}

    .s-pips{display:flex;gap:3px;margin-top:6px}
    .s-pip{width:12px;height:3.5px;border-radius:2px;background:rgba(255,255,255,.1)}
    .s-pip.on{background:#fcd34d}

    .s-div{width:1px;height:40px;background:rgba(255,255,255,.12);flex-shrink:0}

    /* Ring */
    .ring{position:relative;width:48px;height:48px}
    .ring svg{width:100%;height:100%;transform:rotate(-90deg)}
    .ring .bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:4}
    .ring .fill{fill:none;stroke:rgba(255,255,255,.85);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.34,1.56,.64,1)}
    .ring .fill.done{stroke:#fcd34d}
    .ring span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff}

    /* ── BODY ── */
    .body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;min-height:0;padding:4px 16px 40px}
    .body::-webkit-scrollbar{display:none}
    .bi{max-width:460px;margin:0 auto}

    .banner{display:none;background:var(--green);border-radius:var(--r);border:2.5px solid var(--green-dark);padding:14px 16px;margin-bottom:12px;align-items:center;gap:10px;color:#fff;box-shadow:0 4px 0 var(--green-dark)}
    .banner.show{display:flex;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
    .banner-ic{width:36px;height:36px;background:rgba(255,255,255,.25);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .banner-ic svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
    .banner-t{font-size:15px;font-weight:900}
    .banner-s{font-size:11px;font-weight:700;opacity:.8;margin-top:1px}

    .sec{font-size:10px;font-weight:900;color:var(--text-light);letter-spacing:2px;text-transform:uppercase;margin:0 0 10px;padding:0 4px}

    /* ── TASKS ── */
    .tk{background:var(--card);border-radius:var(--r);border:2.5px solid var(--card-border);padding:14px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-card);transition:all .3s}
    .tk.claimed{opacity:.35;pointer-events:none}
    .tk.ready{border-color:var(--gold);box-shadow:0 4px 0 var(--gold-dark)}
    .tk-top{display:flex;align-items:center;gap:11px;margin-bottom:8px}
    .tk-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 0 rgba(0,0,0,.1)}
    .tk-ic svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
    .tk-ic.ic-play{background:var(--blue);box-shadow:0 3px 0 var(--blue-dark)}
    .tk-ic.ic-answer{background:var(--green);box-shadow:0 3px 0 var(--green-dark)}
    .tk-ic.ic-streak{background:var(--orange);box-shadow:0 3px 0 #c2410c}
    .tk-ic.ic-fast{background:var(--purple);box-shadow:0 3px 0 #6d28d9}
    .tk-ic.ic-accuracy{background:var(--blue);box-shadow:0 3px 0 var(--blue-dark)}
    .tk-ic.ic-done{background:var(--green);box-shadow:0 3px 0 var(--green-dark)}
    .tk-name{font-size:14px;font-weight:800;line-height:1.3}
    .tk-meta{display:flex;align-items:center;gap:8px;margin-top:3px}
    .tk-xp{font-size:11px;font-weight:900;color:var(--gold-dark);background:rgba(245,158,11,.1);padding:2px 8px;border-radius:6px;border:1.5px solid rgba(245,158,11,.2)}
    .tk-ct{font-size:11px;font-weight:800;color:var(--text-light)}
    .tk-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;border:1.5px solid #d1d5db}
    .tk-fill{height:100%;border-radius:2px;background:var(--blue);transition:width .6s cubic-bezier(.34,1.56,.64,1)}
    .tk-fill.tdone{background:var(--gold)}
    .tk-act{display:flex;justify-content:flex-end;margin-top:10px}

    .btn-claim{background:var(--gold);color:#fff;border:none;border-radius:14px;padding:9px 20px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 var(--gold-dark);transition:transform .1s;display:flex;align-items:center;gap:5px}
    .btn-claim:active{transform:translateY(4px);box-shadow:none}
    .btn-claim svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
    .btn-go{background:var(--blue);color:#fff;border:none;border-radius:14px;padding:9px 20px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;box-shadow:var(--shadow-blue);transition:transform .1s;display:flex;align-items:center;gap:5px}
    .btn-go:active{transform:translateY(4px);box-shadow:none}
    .btn-go svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}
    .tk-done{display:flex;align-items:center;gap:5px;color:var(--green);font-size:12px;font-weight:900}
    .tk-done-dot{width:24px;height:24px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 0 var(--green-dark)}
    .tk-done-dot svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round}

    .xp-toast{position:fixed;top:calc(env(safe-area-inset-top,20px) + 16px);left:50%;transform:translateX(-50%) translateY(-20px);background:var(--gold);color:#fff;border-radius:16px;padding:8px 20px;font-size:18px;font-weight:900;z-index:999;opacity:0;pointer-events:none;box-shadow:0 4px 0 var(--gold-dark);transition:opacity .25s,transform .35s cubic-bezier(.34,1.56,.64,1)}
    .xp-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .confetti{position:fixed;inset:0;pointer-events:none;z-index:800;overflow:hidden}
    .confetti i{position:absolute;width:10px;height:10px;opacity:0;border-radius:3px}
    .confetti i.fall{animation:cf 1.3s ease-out forwards}
    .empty{text-align:center;padding:40px 20px;color:var(--text-light);font-size:14px;font-weight:700}

    @keyframes popIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
    @keyframes cf{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
    @keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .an{animation:su .3s ease both}
    .d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}.d4{animation-delay:.16s}.d5{animation-delay:.2s}
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-in">
    <div class="hdr-row">
      <div class="hdr-title">Daily Tasks</div>
      <div class="hdr-cd" id="cd">--:--:--</div>
    </div>
    <div class="stats">
      <div class="s-block">
        <div class="s-num gold" id="streak">0</div>
        <div class="s-label">Streak</div>
        <div class="s-pips" id="pips"></div>
      </div>
      <div class="s-div"></div>
      <div class="s-block">
        <div class="ring">
          <svg viewBox="0 0 36 36"><circle class="bg" cx="18" cy="18" r="15"/><circle class="fill" id="rfill" cx="18" cy="18" r="15" stroke-dasharray="94.25" stroke-dashoffset="94.25"/></svg>
          <span id="rdone">0/3</span>
        </div>
        <div class="s-label">Done</div>
      </div>
    </div>
  </div>
</div>

<div class="body">
  <div class="bi" id="bi"><div class="empty">Loading...</div></div>
</div>

<div class="xp-toast" id="xp-toast"></div>
<div class="confetti" id="confetti"></div>

<script type="module">
import Haptics from './haptics.js';
if(window.parent!==window)parent.authCheck();

var db=null,auth=null,_uid=null;
try{if(window.parent!==window&&window.parent.firebase){db=window.parent.firebase.firestore();auth=window.parent.firebase.auth();}}catch(e){}

function getTodayKey(){var n=new Date();return n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate();}
var _todayKey=getTodayKey();
function getTasksRef(uid){return db.collection('users').doc(uid).collection('dailyTasks').doc(_todayKey);}

var _claimedIds=new Set(),_inFlight={};
var _cacheKey='bd_claimed_'+_todayKey;
function _loadClaimed(){try{var s=localStorage.getItem(_cacheKey);if(s)JSON.parse(s).forEach(function(id){_claimedIds.add(id)});try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('bd_claimed_')&&k!==_cacheKey)localStorage.removeItem(k);}}catch(e){}}catch(e){}}
function _setClaimed(id){_claimedIds.add(id);try{localStorage.setItem(_cacheKey,JSON.stringify(Array.from(_claimedIds)))}catch(e){}}
_loadClaimed();

var TASK_POOL=[
  {id:'streak_5',type:'streak',target:5,label:'Get a streak of 5',xp:30},
  {id:'streak_10',type:'streak',target:10,label:'Get a streak of 10',xp:60},
  {id:'correct_10',type:'correct',target:10,label:'Get 10 correct',xp:25},
  {id:'correct_25',type:'correct',target:25,label:'Get 25 correct',xp:50},
  {id:'answer_20',type:'answered',target:20,label:'Answer 20 questions',xp:20},
  {id:'answer_50',type:'answered',target:50,label:'Answer 50 questions',xp:45},
  {id:'accuracy_70',type:'accuracy',target:70,label:'Hit 70% accuracy today',xp:35},
  {id:'accuracy_80',type:'accuracy',target:80,label:'Hit 80% accuracy today',xp:55},
  {id:'play_wordle',type:'game',game:'wordle',target:3,label:'Play 3 Wordle rounds',xp:40},
  {id:'play_math',type:'game',game:'mathRush',target:3,label:'Play 3 Math Rush rounds',xp:40},
  {id:'play_memory',type:'game',game:'memory',target:2,label:'Play 2 Memory games',xp:35},
  {id:'play_reaction',type:'game',game:'reaction',target:3,label:'Play 3 Reaction tests',xp:30},
  {id:'play_ttt',type:'game',game:'ticTacToe',target:2,label:'Play 2 Tic Tac Toe games',xp:30},
  {id:'play_simon',type:'game',game:'simon',target:2,label:'Play 2 Simon Says rounds',xp:35},
  {id:'play_scramble',type:'game',game:'wordScramble',target:3,label:'Unscramble 3 words',xp:30},
  {id:'fast_5',type:'fast',target:5,label:'Answer 5 in under 3.5s',xp:45}
];
function seededRandom(seed){var s=seed;return function(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff}}
function getDailyTaskDefs(){var dk=_todayKey,seed=dk.split('-').reduce(function(a,n){return a*31+parseInt(n)},0);var rng=seededRandom(seed);return TASK_POOL.slice().sort(function(){return rng()-0.5}).slice(0,3);}

async function claimTask(uid,taskId){
  if(_inFlight[taskId])return null;_inFlight[taskId]=true;_setClaimed(taskId);
  try{var ref=getTasksRef(uid),earnedXp=null;
    await db.runTransaction(async function(tx){var snap=await tx.get(ref);if(!snap.exists)return;var st=snap.data();var task=st.tasks.find(function(t){return t.id===taskId});if(!task||!task.done||task.claimed){earnedXp=null;return}task.claimed=true;earnedXp=task.xp;if(st.tasks.every(function(t){return t.claimed}))st.allClaimed=true;tx.set(ref,st);});
    return earnedXp;
  }catch(e){return null}finally{delete _inFlight[taskId]}
}
function awardXP(xp){try{if(window.parent!==window)window.parent.postMessage({type:'xpAwarded',xp:xp},'*')}catch(e){}}

function tickCD(){var now=new Date(),mid=new Date(now);mid.setHours(24,0,0,0);var d=mid-now,h=Math.floor(d/36e5),m=Math.floor((d%36e5)/6e4),s=Math.floor((d%6e4)/1e3);var p=function(n){return String(n).padStart(2,'0')};document.getElementById('cd').textContent=p(h)+':'+p(m)+':'+p(s);}
setInterval(tickCD,1000);tickCD();

function boom(n){var c=['#22c55e','#f59e0b','#ef4444','#0474fc','#8b5cf6','#f97316'],el=document.getElementById('confetti');for(var i=0;i<n;i++){var p=document.createElement('i');p.style.left=Math.random()*100+'%';p.style.top='-12px';p.style.background=c[Math.floor(Math.random()*c.length)];p.style.animationDelay=Math.random()*.3+'s';el.appendChild(p);setTimeout((function(x){return function(){x.classList.add('fall')}})(p),10);setTimeout((function(x){return function(){x.remove()}})(p),1600);}}
function toast(m){var t=document.getElementById('xp-toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2400)}

function icCls(t){if(t.done)return'ic-done';if(t.type==='game')return'ic-play';if(t.type==='streak')return'ic-streak';if(t.type==='fast')return'ic-fast';if(t.type==='accuracy')return'ic-accuracy';return'ic-answer';}
function icSvg(t){var y=t.type;if(y==='game')return'<svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="4"/><path d="M6 12h4M8 10v4"/><circle cx="16" cy="11" r=".5" fill="#fff"/><circle cx="18" cy="13" r=".5" fill="#fff"/></svg>';if(y==='streak')return'<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>';if(y==='fast')return'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>';if(y==='accuracy')return'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>';return'<svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>';}

function updateHdr(st){
  var streak=st.dailyStreak||0;
  var allDone=st.allDone||st.tasks.every(function(t){return t.done});
  if(allDone&&streak<1)streak=1;
  document.getElementById('streak').textContent=streak;
  var pips=document.getElementById('pips'),pc=7;
  var filled=Math.min(streak%pc||(streak>0&&streak%pc===0?pc:0),pc);
  pips.innerHTML='';for(var p=0;p<pc;p++){var d=document.createElement('div');d.className='s-pip'+(p<filled?' on':'');pips.appendChild(d)}
  var done=st.tasks.filter(function(t){return t.done}).length,total=st.tasks.length,pct=total?done/total:0;
  var r=document.getElementById('rfill');r.style.strokeDashoffset=94.25-(94.25*pct);r.classList.toggle('done',!!allDone);
  document.getElementById('rdone').textContent=done+'/'+total;
}

function render(st){
  var el=document.getElementById('bi');el.innerHTML='';updateHdr(st);
  var allDone=st.allDone||st.tasks.every(function(t){return t.done});
  if(allDone){var b=document.createElement('div');b.className='banner show an';b.innerHTML='<div class="banner-ic"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div><div><div class="banner-t">All done! 🎉</div><div class="banner-s">Come back tomorrow for new tasks</div></div>';el.appendChild(b);}
  var lbl=document.createElement('div');lbl.className='sec an d1';lbl.textContent="Today's Tasks";el.appendChild(lbl);
  st.tasks.forEach(function(t,i){
    var pct=Math.min(100,Math.round(t.progress/t.target*100)),cl=t.claimed||_claimedIds.has(t.id);
    var c=document.createElement('div');c.className='tk an d'+(Math.min(i+2,5))+(cl?' claimed':(t.done?' ready':''));
    c.innerHTML='<div class="tk-top"><div class="tk-ic '+icCls(t)+'">'+icSvg(t)+'</div><div><div class="tk-name">'+t.label+'</div><div class="tk-meta"><span class="tk-xp">+'+t.xp+' XP</span><span class="tk-ct">'+t.progress+'/'+t.target+(t.type==='accuracy'?'%':'')+'</span></div></div></div><div class="tk-bar"><div class="tk-fill'+(t.done?' tdone':'')+'" style="width:'+pct+'%"></div></div><div class="tk-act" id="a-'+t.id+'"></div>';
    el.appendChild(c);act(t.id,t,cl);
  });
}

function act(id,t,cl){
  var el=document.getElementById('a-'+id);if(!el)return;
  if(cl){el.innerHTML='<div class="tk-done"><div class="tk-done-dot"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div>Claimed</div>';return;}
  if(t.done){
    var b=document.createElement('button');b.className='btn-claim';
    b.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Claim';
    b.addEventListener('click',function(){
      if(_claimedIds.has(id)||_inFlight[id])return;_setClaimed(id);
      el.innerHTML='<div class="tk-done"><div class="tk-done-dot"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div>Claimed</div>';
      var card=el.closest('.tk');if(card)card.classList.add('claimed');
      Haptics?.success?.();toast('+'+t.xp+' XP!');boom(30);awardXP(t.xp);
      if(_uid&&db){claimTask(_uid,id).then(function(){try{window.parent.postMessage({type:'tasksUpdated'},'*')}catch(e){}});}
    });el.appendChild(b);
  }else{
    var g=document.createElement('button');g.className='btn-go';
    g.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg> Train';
    g.addEventListener('click',function(){Haptics?.medium?.();try{window.parent.goTo('improve')}catch(e){}});
    el.appendChild(g);
  }
}

var _last=null;
async function load(){
  if(!auth||!db){document.getElementById('bi').innerHTML='<div class="empty">Sign in to track tasks</div>';return;}
  var u=auth.currentUser;
  if(!u){await new Promise(function(r){var done=false;var un=auth.onAuthStateChanged(function(x){if(done)return;done=true;un();if(x)_uid=x.uid;r();});setTimeout(function(){if(!done){done=true;un();r()}},3000);});u=auth.currentUser;}
  if(!u){document.getElementById('bi').innerHTML='<div class="empty">Sign in to track tasks</div>';return;}
  _uid=u.uid;
  try{
    var ref=getTasksRef(_uid),snap=await ref.get();
    if(snap.exists){var s=snap.data();s.tasks.forEach(function(t){if(_claimedIds.has(t.id))t.claimed=true});_last=s;render(s);}
    else{
      var defs=getDailyTaskDefs(),arr=[];
      defs.forEach(function(d){arr.push({id:d.id,type:d.type,target:d.target,label:d.label,icon:d.icon||'',xp:d.xp,game:d.game||'',progress:0,done:false,claimed:false});});
      var ds=JSON.stringify({date:_todayKey,tasks:arr,allDone:false,allClaimed:false,dailyStreak:0});
      try{await ref.set(window.parent.JSON.parse(ds));}catch(e){}
      var fresh=JSON.parse(ds);_last=fresh;render(fresh);
    }
  }catch(e){
    var d2=getDailyTaskDefs();
    render({date:_todayKey,tasks:d2.map(function(d){return{id:d.id,type:d.type,target:d.target,label:d.label,icon:d.icon||'',xp:d.xp,game:d.game||'',progress:0,done:false,claimed:false}}),allDone:false,allClaimed:false,dailyStreak:0});
  }
}

window.addEventListener('message',function(e){if(e.data&&e.data.type==='tasksUpdated')load();});

async function listen(){
  if(!db||!_uid)return;
  try{getTasksRef(_uid).onSnapshot(function(snap){
    if(!snap.exists)return;var s=snap.data();
    var fix=false;s.tasks.forEach(function(t){if(_claimedIds.has(t.id)){if(!t.claimed)fix=true;t.claimed=true;}});
    if(fix&&_uid){var fs=JSON.stringify(s);getTasksRef(_uid).set(window.parent.JSON.parse(fs)).catch(function(){});}
    var nj=JSON.stringify(s.tasks.map(function(t){return{i:t.id,p:t.progress,d:t.done,c:t.claimed}}));
    var oj=_last?JSON.stringify(_last.tasks.map(function(t){return{i:t.id,p:t.progress,d:t.done,c:t.claimed}})):'';
    if(nj!==oj){_last=s;render(s);}
  });}catch(e){}
}

load().then(listen);
