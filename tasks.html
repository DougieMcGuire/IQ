<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tasks – Cebear</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#162b5e;--card:#fff;--text:#162b5e;--dim:#6b7a9e;--pill:#EEF0F7;--green:#2DC653;--gd:#22a344;--red:#FF3B5C;--gold:#FFB800;--goldd:#d99e00;--orange:#FF8C00;--blue:#3B82F6;--purple:#7C5CFC}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100dvh;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text)}
    .page{display:flex;flex-direction:column;height:100dvh}
    .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 24px}
    .scroll::-webkit-scrollbar{display:none}

    /* ── HERO: Countdown + Streak side by side ── */
    .hero{padding:calc(env(safe-area-inset-top,0px)+14px) 16px 0;flex-shrink:0}
    .hero-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:12px}
    .hero-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .hero-card{background:var(--card);border-radius:18px;padding:16px;display:flex;flex-direction:column;align-items:center;text-align:center}
    .hc-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
    .hc-icon svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
    .hc-icon.ic-clock{background:var(--blue)}
    .hc-icon.ic-streak{background:var(--orange)}
    .hc-val{font-size:min(28px,7vw);font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:1px;line-height:1.1}
    .hc-val.clock-val{color:var(--blue)}
    .hc-val.streak-val{color:var(--orange)}
    .hc-lbl{font-size:10px;font-weight:800;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

    /* ── Progress bar (full width) ── */
    .prog-card{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:14px}
    .prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .prog-lbl{font-size:13px;font-weight:800;color:var(--text)}
    .prog-ct{font-size:14px;font-weight:900;color:var(--gold)}
    .prog-bar{height:10px;background:var(--pill);border-radius:5px;overflow:hidden}
    .prog-fill{height:100%;border-radius:5px;background:var(--green);transition:width .6s cubic-bezier(.34,1.56,.64,1)}
    .prog-fill.done{background:var(--gold)}

    /* ── Complete banner ── */
    .complete{display:none;background:var(--green);border-radius:18px;padding:16px;margin-bottom:14px;align-items:center;gap:12px}
    .complete.show{display:flex;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
    .complete-icon{width:44px;height:44px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .complete-icon svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
    .complete-txt{color:#fff}.complete-txt .ct-title{font-size:16px;font-weight:900}.complete-txt .ct-sub{font-size:11px;font-weight:700;opacity:.85;margin-top:2px}

    .sec-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase;margin:4px 0 8px}

    /* ── Task cards — NEW LAYOUT ── */
    .task{background:var(--card);border-radius:18px;padding:16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;position:relative;overflow:hidden;transition:opacity .5s}
    .task.claimed{opacity:.35}
    .task.ready{border-left:4px solid var(--gold)}
    .task-left{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;width:44px}
    .task-icon{width:44px;height:44px;background:var(--pill);border-radius:14px;display:flex;align-items:center;justify-content:center}
    .task-icon svg{width:22px;height:22px}
    .task-icon.ic-done{background:rgba(45,198,83,.1)}
    .task-right{flex:1;min-width:0}
    .task-name{font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px;line-height:1.3}
    .task-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .task-xp{font-size:11px;font-weight:900;color:var(--gold);background:rgba(255,184,0,.1);padding:2px 8px;border-radius:6px}
    .task-ct{font-size:11px;font-weight:800;color:var(--dim)}
    .task-bar{height:6px;background:var(--pill);border-radius:3px;overflow:hidden}
    .task-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .5s cubic-bezier(.34,1.56,.64,1)}
    .task-fill.tdone{background:var(--gold)}
    .task-action{position:absolute;right:14px;top:50%;transform:translateY(-50%)}
    .task-claim{background:var(--gold);color:var(--text);border:none;border-radius:12px;padding:10px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 2px 0 var(--goldd);transition:transform .1s;white-space:nowrap}
    .task-claim:active:not(:disabled){transform:translateY(2px);box-shadow:none}
    .task-claim:disabled{opacity:.5;cursor:default}
    .task-check{width:32px;height:32px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center}
    .task-check svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}

    .xp-toast{position:fixed;top:calc(env(safe-area-inset-top,0px)+16px);left:50%;transform:translateX(-50%) translateY(-20px);background:var(--gold);color:var(--text);border-radius:16px;padding:9px 22px;font-size:18px;font-weight:900;z-index:999;opacity:0;pointer-events:none;transition:opacity .25s,transform .35s cubic-bezier(.34,1.56,.64,1)}
    .xp-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .confetti{position:fixed;inset:0;pointer-events:none;z-index:800;overflow:hidden}
    .confetti i{position:absolute;width:10px;height:10px;opacity:0;border-radius:3px}
    .confetti i.fall{animation:cf 1.3s ease-out forwards}
    @keyframes popIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
    @keyframes cf{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:rgba(255,255,255,.4);font-size:14px;font-weight:700}
    .ld-spin{width:36px;height:36px;border:4px solid rgba(255,255,255,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .anim{animation:slideUp .3s ease both}.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}.d4{animation-delay:.16s}.d5{animation-delay:.2s}
  </style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div class="hero-title">Daily Tasks</div>
    <div class="hero-row">
      <div class="hero-card"><div class="hc-icon ic-clock"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div><div class="hc-val clock-val" id="countdown-text">--:--:--</div><div class="hc-lbl">New tasks in</div></div>
      <div class="hero-card" id="streak-hero"><div class="hc-icon ic-streak"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div><div class="hc-val streak-val" id="streak-val">0</div><div class="hc-lbl">Day streak</div></div>
    </div>
  </div>
  <div class="scroll" id="scroll-body">
    <div class="loading" id="loading-state"><div class="ld-spin"></div>Loading tasks...</div>
  </div>
</div>
<div class="xp-toast" id="xp-toast"></div>
<div class="confetti" id="confetti"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
var fc={apiKey:"AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",authDomain:"braindeer-backend.firebaseapp.com",projectId:"braindeer-backend",storageBucket:"braindeer-backend.firebasestorage.app",messagingSenderId:"331205139765",appId:"1:331205139765:web:20cfef8194af63fc55c07c"};
if(!firebase.apps.length)firebase.initializeApp(fc);var db=firebase.firestore(),auth=firebase.auth();
function getTodayKey(){var n=new Date();return n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate()}
function seededRandom(s){return function(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff}}
// SVG icons per task type
var ICONS={streak:'<svg viewBox="0 0 24 24" fill="none" stroke="#FF8C00" stroke-width="2" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>',correct:'<svg viewBox="0 0 24 24" fill="none" stroke="#2DC653" stroke-width="2.5" stroke-linecap="round"><path d="M5 12l5 5L20 7"/></svg>',answered:'<svg viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9 9a3 3 0 016 0c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="#3B82F6"/></svg>',accuracy:'<svg viewBox="0 0 24 24" fill="none" stroke="#7C5CFC" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',game:'<svg viewBox="0 0 24 24" fill="none" stroke="#FF8C00" stroke-width="2" stroke-linecap="round"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M8 10v4m-2-2h4m6-1h.01m-3 2h.01"/></svg>',fast:'<svg viewBox="0 0 24 24" fill="none" stroke="#FFB800" stroke-width="2" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>'};
var TASK_POOL=[{id:'streak_5',type:'streak',target:5,label:'Get a streak of 5',xp:30},{id:'streak_10',type:'streak',target:10,label:'Get a streak of 10',xp:60},{id:'streak_15',type:'streak',target:15,label:'Get a streak of 15',xp:100},{id:'correct_10',type:'correct',target:10,label:'Get 10 correct',xp:25},{id:'correct_25',type:'correct',target:25,label:'Get 25 correct',xp:50},{id:'correct_50',type:'correct',target:50,label:'Get 50 correct',xp:90},{id:'answer_20',type:'answered',target:20,label:'Answer 20 questions',xp:20},{id:'answer_50',type:'answered',target:50,label:'Answer 50 questions',xp:45},{id:'answer_100',type:'answered',target:100,label:'Answer 100 questions',xp:80},{id:'accuracy_70',type:'accuracy',target:70,label:'Hit 70% accuracy today',xp:35},{id:'accuracy_80',type:'accuracy',target:80,label:'Hit 80% accuracy today',xp:55},{id:'play_wordle',type:'game',game:'wordle',target:3,label:'Play 3 Wordle rounds',xp:40},{id:'play_math',type:'game',game:'mathRush',target:3,label:'Play 3 Math Rush rounds',xp:40},{id:'play_memory',type:'game',game:'memory',target:2,label:'Play 2 Memory games',xp:35},{id:'play_reaction',type:'game',game:'reaction',target:3,label:'Play 3 Reaction tests',xp:30},{id:'play_ttt',type:'game',game:'ticTacToe',target:2,label:'Play 2 Tic Tac Toe games',xp:30},{id:'play_simon',type:'game',game:'simon',target:2,label:'Play 2 Simon Says rounds',xp:35},{id:'play_scramble',type:'game',game:'wordScramble',target:3,label:'Unscramble 3 words',xp:30},{id:'fast_5',type:'fast',target:5,label:'Answer 5 in under 3.5s',xp:45},{id:'fast_10',type:'fast',target:10,label:'Answer 10 in under 3.5s',xp:70}];
function getDailyTaskDefs(){var dk=getTodayKey(),seed=dk.split('-').reduce(function(a,n){return a*31+parseInt(n)},0),rng=seededRandom(seed);return TASK_POOL.slice().sort(function(){return rng()-0.5}).slice(0,3)}
function getTasksRef(uid){return db.collection('users').doc(uid).collection('dailyTasks').doc(getTodayKey())}
function getYesterdayKey(){var y=new Date();y.setDate(y.getDate()-1);return y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate()}
async function loadTaskState(uid){var ref=getTasksRef(uid);var snap=await ref.get();if(snap.exists)return snap.data();var ys=await db.collection('users').doc(uid).collection('dailyTasks').doc(getYesterdayKey()).get();var ps=0;if(ys.exists){var yd=ys.data();ps=yd.allDone?(yd.dailyStreak||0):0}var fresh={date:getTodayKey(),tasks:getDailyTaskDefs().map(function(d){return Object.assign({},d,{progress:0,done:false,claimed:false})}),allDone:false,allClaimed:false,dailyStreak:ps};await ref.set(fresh);return fresh}
var _cif={};
async function claimTask(uid,tid){if(_cif[tid])return null;_cif[tid]=true;try{var ref=getTasksRef(uid);var xp=null;await db.runTransaction(async function(tx){var snap=await tx.get(ref);if(!snap.exists)throw'no';var st=snap.data();var t=st.tasks.find(function(t){return t.id===tid});if(!t||!t.done||t.claimed){xp=null;return}t.claimed=true;xp=t.xp;if(st.tasks.every(function(t){return t.claimed}))st.allClaimed=true;tx.set(ref,st)});return xp}catch{return null}finally{delete _cif[tid]}}
async function incrementStreakToday(uid){var ref=getTasksRef(uid);try{await db.runTransaction(async function(tx){var snap=await tx.get(ref);if(!snap.exists)return;var st=snap.data();if(!st.allDone||st.streakBumped)return;st.streakBumped=true;st.dailyStreak=(st.dailyStreak||0)+1;tx.set(ref,st)})}catch{}}
function awardXP(xp){try{if(window.parent!==window)window.parent.postMessage({type:'xpAwarded',xp:xp},'*')}catch{}}
function updateCountdown(){var now=new Date(),mid=new Date(now);mid.setHours(24,0,0,0);var d=mid-now;var h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);var pad=function(n){return String(n).padStart(2,'0')};var el=document.getElementById('countdown-text');if(el)el.textContent=pad(h)+':'+pad(m)+':'+pad(s)}
function spawnConfetti(n){var colors=['#2DC653','#FFB800','#FF3B5C','#3B82F6','#7C5CFC','#FF8C00'];var el=document.getElementById('confetti');for(var i=0;i<n;i++){var p=document.createElement('i');p.style.left=Math.random()*100+'%';p.style.top='-12px';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDelay=Math.random()*.3+'s';el.appendChild(p);setTimeout(function(e){e.classList.add('fall')}.bind(null,p),10);setTimeout(function(e){e.remove()}.bind(null,p),1600)}}
function showXpToast(m){var t=document.getElementById('xp-toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2400)}
var _uid=null;
function render(state){var body=document.getElementById('scroll-body');var done=state.tasks.filter(function(t){return t.done}).length;var total=state.tasks.length;body.innerHTML='';
  document.getElementById('streak-val').textContent=state.dailyStreak||0;

  // Progress
  var pc=document.createElement('div');pc.className='prog-card anim';
  pc.innerHTML='<div class="prog-top"><span class="prog-lbl">Today\'s Progress</span><span class="prog-ct">'+done+'/'+total+'</span></div><div class="prog-bar"><div class="prog-fill'+(state.allDone?' done':'')+'" style="width:'+Math.round(done/total*100)+'%"></div></div>';
  body.appendChild(pc);

  // Complete banner
  if(state.allDone){var cb=document.createElement('div');cb.className='complete show anim d1';cb.innerHTML='<div class="complete-icon"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div><div class="complete-txt"><div class="ct-title">All tasks complete!</div><div class="ct-sub">New tasks at midnight</div></div>';body.appendChild(cb)}

  var lbl=document.createElement('div');lbl.className='sec-lbl anim d1';lbl.textContent="Today's Tasks";body.appendChild(lbl);

  state.tasks.forEach(function(task,i){var pct=Math.min(100,Math.round(task.progress/task.target*100));var card=document.createElement('div');var isReady=task.done&&!task.claimed;
    card.className='task anim d'+(i+2)+(task.claimed?' claimed':'')+(isReady?' ready':'');
    var iconSvg=ICONS[task.type]||ICONS.answered;
    var actionHtml='';
    if(task.claimed)actionHtml='<div class="task-action"><div class="task-check"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div></div>';
    else if(task.done)actionHtml='<div class="task-action"><button class="task-claim" data-id="'+task.id+'" data-xp="'+task.xp+'">+'+task.xp+' XP</button></div>';
    card.innerHTML='<div class="task-left"><div class="task-icon'+(task.done?' ic-done':'')+'">'+iconSvg+'</div></div><div class="task-right" style="padding-right:'+(task.done?'80px':'0')+'"><div class="task-name">'+task.label+'</div><div class="task-meta"><span class="task-xp">'+task.xp+' XP</span><span class="task-ct">'+task.progress+'/'+task.target+'</span></div><div class="task-bar"><div class="task-fill'+(task.done?' tdone':'')+'" style="width:'+pct+'%"></div></div></div>'+actionHtml;
    var claimBtn=card.querySelector('.task-claim');
    if(claimBtn){(function(btn,uid){btn.addEventListener('click',async function(){btn.disabled=true;btn.textContent='...';var xp=await claimTask(uid,btn.dataset.id);if(xp===null){var f=await loadTaskState(uid);render(f);return}awardXP(xp);spawnConfetti(18);showXpToast('+'+xp+' XP');var f=await loadTaskState(uid);if(f.allDone&&!f.streakBumped){await incrementStreakToday(uid);f=await loadTaskState(uid)}render(f)})})(claimBtn,_uid)}
    body.appendChild(card)});
}
updateCountdown();setInterval(updateCountdown,1000);
auth.onAuthStateChanged(async function(user){if(!user){document.getElementById('loading-state').textContent='Please log in.';return}_uid=user.uid;try{var state=await loadTaskState(user.uid);render(state)}catch{document.getElementById('loading-state').textContent='Failed to load tasks.'}});
window.addEventListener('message',async function(e){if(e.data&&e.data.type==='tasksUpdated'&&_uid){var f=await loadTaskState(_uid);render(f)}});
document.addEventListener('visibilitychange',async function(){if(!document.hidden&&_uid){var f=await loadTaskState(_uid);render(f)}});
</script>
</body>
</html>
