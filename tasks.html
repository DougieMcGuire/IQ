<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Tasks – Cebear</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--cream:#F0EAD6;--navy:#1b2d5b;--navyM:#243a6e;--card:#fff;--text:#1b2d5b;--dim:#6b7a9e;--light:#a0acc4;--green:#3fba4f;--gd:#2d9a3c;--red:#e8443a;--gold:#e8a817;--goldd:#c48e10;--orange:#e87d1a;--blue:#3a7df2;--purple:#6d4aed}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100dvh;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--navy);color:var(--text)}
    .page{display:flex;flex-direction:column;height:100dvh}
    .hero{background:var(--cream);padding:calc(env(safe-area-inset-top,20px) + 8px) 16px 0;flex-shrink:0}
    .hero-inner{max-width:420px;margin:0 auto}
    .hero-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .hero-title{font-size:22px;font-weight:900;color:var(--navy)}
    .hero-countdown{display:flex;align-items:center;gap:6px;background:rgba(27,45,91,.06);border-radius:10px;padding:6px 12px}
    .hero-countdown svg{width:14px;height:14px;stroke:var(--dim);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .hero-countdown .cd-time{font-size:14px;font-weight:900;color:var(--navy);font-variant-numeric:tabular-nums}
    .hero-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .h-card{background:var(--card);border-radius:18px;padding:16px;display:flex;flex-direction:column;align-items:center;text-align:center}
    .streak-num{font-size:min(42px,11vw);font-weight:900;color:var(--orange);line-height:1}
    .streak-label{font-size:10px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
    .streak-pips{display:flex;gap:4px;margin-top:10px;width:100%;justify-content:center}
    .streak-pip{flex:1;max-width:20px;height:5px;border-radius:3px;background:rgba(27,45,91,.06)}
    .streak-pip.done{background:var(--green)}
    .streak-pip.active{background:var(--orange)}
    .prog-ring-wrap{position:relative;width:min(72px,18vw);height:min(72px,18vw);margin-bottom:4px}
    .prog-ring{width:100%;height:100%;transform:rotate(-90deg)}
    .prog-ring-bg{fill:none;stroke:rgba(27,45,91,.06);stroke-width:6}
    .prog-ring-fill{fill:none;stroke:var(--green);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.34,1.56,.64,1)}
    .prog-ring-fill.alldone{stroke:var(--gold)}
    .prog-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:min(18px,4.5vw);font-weight:900;color:var(--navy)}
    .body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--navy);border-radius:24px 24px 0 0;padding:20px 16px 24px;position:relative;z-index:1}
    .body::-webkit-scrollbar{display:none}
    .body-inner{max-width:420px;margin:0 auto}
    .complete{display:none;background:var(--green);border-radius:16px;padding:14px 16px;margin-bottom:12px;align-items:center;gap:12px;color:#fff}
    .complete.show{display:flex;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
    .complete-ic{width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .complete-ic svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
    .ct-title{font-size:15px;font-weight:900}
    .ct-sub{font-size:11px;font-weight:700;opacity:.85;margin-top:2px}
    .sec-lbl{font-size:10px;font-weight:900;color:rgba(240,234,214,.25);letter-spacing:2px;text-transform:uppercase;margin:0 0 10px}
    .task{background:rgba(240,234,214,.06);border-radius:18px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden;transition:opacity .4s}
    .task.claimed{opacity:.28;pointer-events:none}
    .task.ready{box-shadow:inset 0 0 0 1.5px var(--gold)}
    .task-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .task-ic{width:44px;height:44px;background:rgba(240,234,214,.06);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .task-ic svg{width:22px;height:22px}
    .task-ic.ic-done{background:rgba(63,186,79,.1)}
    .task-info{flex:1;min-width:0}
    .task-name{font-size:14px;font-weight:800;color:var(--cream);line-height:1.3}
    .task-meta{display:flex;align-items:center;gap:8px;margin-top:3px}
    .task-xp{font-size:11px;font-weight:900;color:var(--gold);background:rgba(232,168,23,.1);padding:2px 8px;border-radius:6px}
    .task-ct{font-size:11px;font-weight:800;color:rgba(240,234,214,.3)}
    .task-bar{height:7px;background:rgba(240,234,214,.06);border-radius:4px;overflow:hidden}
    .task-fill{height:100%;border-radius:4px;background:var(--blue);transition:width .5s cubic-bezier(.34,1.56,.64,1)}
    .task-fill.tdone{background:var(--gold)}
    .task-action{display:flex;justify-content:flex-end;margin-top:10px}
    .task-claim{background:var(--gold);color:var(--navy);border:none;border-radius:12px;padding:10px 20px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 3px 0 var(--goldd);transition:transform .1s,opacity .2s;display:flex;align-items:center;gap:6px}
    .task-claim:active:not(:disabled){transform:translateY(3px);box-shadow:none}
    .task-claim:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
    .task-claim svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
    .task-check{display:flex;align-items:center;gap:6px;color:var(--green);font-size:13px;font-weight:900}
    .task-check-circle{width:28px;height:28px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center}
    .task-check-circle svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    .task-claim-loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;color:rgba(240,234,214,.4);font-size:13px;font-weight:800}
    .spin-sm{width:16px;height:16px;border:2.5px solid rgba(240,234,214,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
    .xp-toast{position:fixed;top:calc(env(safe-area-inset-top,20px) + 16px);left:50%;transform:translateX(-50%) translateY(-20px);background:var(--gold);color:var(--navy);border-radius:16px;padding:9px 22px;font-size:18px;font-weight:900;z-index:999;opacity:0;pointer-events:none;transition:opacity .25s,transform .35s cubic-bezier(.34,1.56,.64,1)}
    .xp-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .confetti{position:fixed;inset:0;pointer-events:none;z-index:800;overflow:hidden}
    .confetti i{position:absolute;width:10px;height:10px;opacity:0;border-radius:3px}
    .confetti i.fall{animation:cf 1.3s ease-out forwards}
    @keyframes popIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
    @keyframes cf{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:rgba(240,234,214,.3);font-size:14px;font-weight:700}
    .ld-spin{width:36px;height:36px;border:4px solid rgba(240,234,214,.08);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .anim{animation:su .3s ease both}.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}.d4{animation-delay:.16s}
  </style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-hdr">
        <div class="hero-title">Daily Tasks</div>
        <div class="hero-countdown">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span class="cd-time" id="countdown-text">--:--:--</span>
        </div>
      </div>
      <div class="hero-cards">
        <div class="h-card">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#e87d1a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          <div class="streak-num" id="streak-val">0</div>
          <div class="streak-label">Day Streak</div>
          <div class="streak-pips" id="streak-pips"></div>
        </div>
        <div class="h-card">
          <div class="prog-ring-wrap">
            <svg class="prog-ring" viewBox="0 0 36 36">
              <circle class="prog-ring-bg" cx="18" cy="18" r="15"/>
              <circle class="prog-ring-fill" id="prog-ring-fill" cx="18" cy="18" r="15" stroke-dasharray="94.25" stroke-dashoffset="94.25"/>
            </svg>
            <div class="prog-center" id="prog-center">0/3</div>
          </div>
          <div class="streak-label">Completed</div>
        </div>
      </div>
    </div>
  </div>

  <div class="body" id="scroll-body">
    <div class="body-inner" id="body-inner">
      <div class="loading"><div class="ld-spin"></div>Loading tasks...</div>
    </div>
  </div>
</div>

<div class="xp-toast" id="xp-toast"></div>
<div class="confetti" id="confetti"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
var fc={apiKey:"AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",authDomain:"braindeer-backend.firebaseapp.com",projectId:"braindeer-backend",storageBucket:"braindeer-backend.firebasestorage.app",messagingSenderId:"331205139765",appId:"1:331205139765:web:20cfef8194af63fc55c07c"};
if(!firebase.apps.length)firebase.initializeApp(fc);
var db=firebase.firestore(),auth=firebase.auth();

// ─── Today key ───────────────────────────────────────────────────────────────
function getTodayKey(){var n=new Date();return n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate();}
function getYesterdayKey(){var y=new Date();y.setDate(y.getDate()-1);return y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate();}

// ─── Local claim cache ────────────────────────────────────────────────────────
// Persists in sessionStorage so claimed state survives re-renders within a session.
// This is the authoritative "already claimed" signal on the client side.
var _todayKey = getTodayKey();
var _CACHE_KEY = 'bd_claimed_' + _todayKey;
var _claimedIds = new Set();
(function(){
  try {
    var saved = JSON.parse(sessionStorage.getItem(_CACHE_KEY) || '[]');
    if (Array.isArray(saved)) saved.forEach(function(id){ _claimedIds.add(id); });
  } catch(e) {}
})();
function _setClaimed(id) {
  _claimedIds.add(id);
  try { sessionStorage.setItem(_CACHE_KEY, JSON.stringify(Array.from(_claimedIds))); } catch(e) {}
}
function _isClaimed(id) { return _claimedIds.has(id); }

// ─── In-flight guard ─────────────────────────────────────────────────────────
// Prevents two simultaneous claim transactions for the same task (double-tap race)
var _inFlight = {};

// ─── Seeded random for consistent daily tasks ─────────────────────────────────
function seededRandom(s){return function(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};}

// ─── Task definitions ─────────────────────────────────────────────────────────
var ICONS={
  streak:'<svg viewBox="0 0 24 24" fill="none" stroke="#e87d1a" stroke-width="2" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>',
  correct:'<svg viewBox="0 0 24 24" fill="none" stroke="#3fba4f" stroke-width="2.5" stroke-linecap="round"><path d="M5 12l5 5L20 7"/></svg>',
  answered:'<svg viewBox="0 0 24 24" fill="none" stroke="#3a7df2" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9 9a3 3 0 016 0c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="#3a7df2"/></svg>',
  accuracy:'<svg viewBox="0 0 24 24" fill="none" stroke="#6d4aed" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
  game:'<svg viewBox="0 0 24 24" fill="none" stroke="#e87d1a" stroke-width="2" stroke-linecap="round"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M8 10v4m-2-2h4m6-1h.01m-3 2h.01"/></svg>',
  fast:'<svg viewBox="0 0 24 24" fill="none" stroke="#e8a817" stroke-width="2" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>'
};

var TASK_POOL=[
  {id:'streak_5',type:'streak',target:5,label:'Get a streak of 5',xp:30},
  {id:'streak_10',type:'streak',target:10,label:'Get a streak of 10',xp:60},
  {id:'streak_15',type:'streak',target:15,label:'Get a streak of 15',xp:100},
  {id:'correct_10',type:'correct',target:10,label:'Get 10 correct',xp:25},
  {id:'correct_25',type:'correct',target:25,label:'Get 25 correct',xp:50},
  {id:'correct_50',type:'correct',target:50,label:'Get 50 correct',xp:90},
  {id:'answer_20',type:'answered',target:20,label:'Answer 20 questions',xp:20},
  {id:'answer_50',type:'answered',target:50,label:'Answer 50 questions',xp:45},
  {id:'answer_100',type:'answered',target:100,label:'Answer 100 questions',xp:80},
  {id:'accuracy_70',type:'accuracy',target:70,label:'Hit 70% accuracy today',xp:35},
  {id:'accuracy_80',type:'accuracy',target:80,label:'Hit 80% accuracy today',xp:55},
  {id:'play_wordle',type:'game',game:'wordle',target:3,label:'Play 3 Wordle rounds',xp:40},
  {id:'play_math',type:'game',game:'mathRush',target:3,label:'Play 3 Math Rush rounds',xp:40},
  {id:'play_memory',type:'game',game:'memory',target:2,label:'Play 2 Memory games',xp:35},
  {id:'play_reaction',type:'game',game:'reaction',target:3,label:'Play 3 Reaction tests',xp:30},
  {id:'play_ttt',type:'game',game:'ticTacToe',target:2,label:'Play 2 Tic Tac Toe games',xp:30},
  {id:'play_simon',type:'game',game:'simon',target:2,label:'Play 2 Simon Says rounds',xp:35},
  {id:'play_scramble',type:'game',game:'wordScramble',target:3,label:'Unscramble 3 words',xp:30},
  {id:'fast_5',type:'fast',target:5,label:'Answer 5 in under 3.5s',xp:45},
  {id:'fast_10',type:'fast',target:10,label:'Answer 10 in under 3.5s',xp:70}
];

function getDailyTaskDefs(){
  var dk=getTodayKey(), seed=dk.split('-').reduce(function(a,n){return a*31+parseInt(n);},0), rng=seededRandom(seed);
  return TASK_POOL.slice().sort(function(){return rng()-0.5;}).slice(0,3);
}

function getTasksRef(uid){ return db.collection('users').doc(uid).collection('dailyTasks').doc(getTodayKey()); }

// ─── Load task state from Firestore, merging local claim cache ────────────────
async function loadTaskState(uid) {
  var ref = getTasksRef(uid);
  var snap = await ref.get();
  var state;

  if (snap.exists) {
    state = snap.data();
    // Ensure tasks array exists and has all required fields
    if (!Array.isArray(state.tasks) || state.tasks.length === 0) {
      state.tasks = getDailyTaskDefs().map(function(d){
        return Object.assign({}, d, {progress:0, done:false, claimed:false});
      });
      state.allDone = false;
      state.allClaimed = false;
      await ref.set(state);
    }
  } else {
    // Brand new day — check yesterday for streak
    var ys = await db.collection('users').doc(uid).collection('dailyTasks').doc(getYesterdayKey()).get();
    var prevStreak = 0;
    if (ys.exists) { var yd = ys.data(); prevStreak = yd.allDone ? (yd.dailyStreak||0) : 0; }
    state = {
      date: getTodayKey(),
      tasks: getDailyTaskDefs().map(function(d){
        return Object.assign({}, d, {progress:0, done:false, claimed:false});
      }),
      allDone: false,
      allClaimed: false,
      dailyStreak: prevStreak
    };
    await ref.set(state);
  }

  // Always overlay local claim cache — this is the fix for re-render showing claim button
  state.tasks.forEach(function(t){
    if (_isClaimed(t.id)) { t.claimed = true; }
  });

  return state;
}

// ─── Claim task — atomic, guarded against double-claim ───────────────────────
async function claimTask(uid, taskId) {
  // Layer 1: local cache check
  if (_isClaimed(taskId)) return null;
  // Layer 2: in-flight check
  if (_inFlight[taskId]) return null;

  // Mark in-flight AND locally claimed immediately (before any async work)
  _inFlight[taskId] = true;
  _setClaimed(taskId); // optimistic — prevents any re-render from showing button again

  try {
    var ref = getTasksRef(uid);
    var earnedXp = null;

    await db.runTransaction(async function(tx) {
      var snap = await tx.get(ref);
      if (!snap.exists) return;
      var st = snap.data();
      var task = st.tasks.find(function(t){ return t.id === taskId; });
      // Server-side guard: if already claimed on server, return null xp
      if (!task || !task.done || task.claimed) { earnedXp = null; return; }
      task.claimed = true;
      earnedXp = task.xp;
      if (st.tasks.every(function(t){ return t.claimed; })) st.allClaimed = true;
      tx.set(ref, st);
    });

    return earnedXp;
  } catch(e) {
    console.warn('claimTask error:', e);
    return null;
  } finally {
    delete _inFlight[taskId];
  }
}

async function incrementStreakToday(uid) {
  var ref = getTasksRef(uid);
  try {
    await db.runTransaction(async function(tx) {
      var snap = await tx.get(ref);
      if (!snap.exists) return;
      var st = snap.data();
      if (!st.allDone || st.streakBumped) return;
      st.streakBumped = true;
      st.dailyStreak = (st.dailyStreak||0) + 1;
      tx.set(ref, st);
    });
  } catch(e) { console.warn('incrementStreak error:', e); }
}

function awardXP(xp) {
  try { if (window.parent !== window) window.parent.postMessage({type:'xpAwarded', xp:xp}, '*'); } catch(e) {}
}

// ─── Countdown timer ──────────────────────────────────────────────────────────
function updateCountdown() {
  var now=new Date(), mid=new Date(now);
  mid.setHours(24,0,0,0);
  var d=mid-now, h=Math.floor(d/3600000), m=Math.floor((d%3600000)/60000), s=Math.floor((d%60000)/1000);
  var pad=function(n){return String(n).padStart(2,'0');};
  document.getElementById('countdown-text').textContent=pad(h)+':'+pad(m)+':'+pad(s);
}

// ─── Confetti ─────────────────────────────────────────────────────────────────
function spawnConfetti(n) {
  var colors=['#3fba4f','#e8a817','#e8443a','#3a7df2','#6d4aed','#e87d1a'];
  var el=document.getElementById('confetti');
  for (var i=0;i<n;i++) {
    var p=document.createElement('i');
    p.style.left=Math.random()*100+'%'; p.style.top='-12px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=Math.random()*.3+'s';
    el.appendChild(p);
    setTimeout((function(el){return function(){el.classList.add('fall');};})(p), 10);
    setTimeout((function(el){return function(){el.remove();};})(p), 1600);
  }
}

function showXpToast(m) {
  var t=document.getElementById('xp-toast');
  t.textContent=m; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

// ─── Hero update ──────────────────────────────────────────────────────────────
function updateHero(state) {
  document.getElementById('streak-val').textContent = state.dailyStreak||0;
  var pips=document.getElementById('streak-pips');
  var days=state.dailyStreak||0, pipCount=7;
  var filled=Math.min(days%pipCount||(days>0&&days%pipCount===0?pipCount:0), pipCount);
  pips.innerHTML='';
  for (var p=0;p<pipCount;p++) {
    var pip=document.createElement('div');
    pip.className='streak-pip'+(p<filled?' done':(p===filled?' active':''));
    pips.appendChild(pip);
  }
  var done=state.tasks.filter(function(t){return t.done;}).length;
  var total=state.tasks.length, pct=total>0?done/total:0;
  var ring=document.getElementById('prog-ring-fill');
  ring.style.strokeDashoffset=94.25-(94.25*pct);
  ring.classList.toggle('alldone', state.allDone);
  document.getElementById('prog-center').textContent=done+'/'+total;
}

// ─── Main render ──────────────────────────────────────────────────────────────
function render(state) {
  var body=document.getElementById('scroll-body');
  body.innerHTML='<div class="body-inner" id="body-inner"></div>';
  var inner=document.getElementById('body-inner');

  updateHero(state);

  if (state.allDone) {
    var cb=document.createElement('div'); cb.className='complete show anim';
    cb.innerHTML='<div class="complete-ic"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div><div><div class="ct-title">All tasks complete! 🎉</div><div class="ct-sub">New tasks at midnight</div></div>';
    inner.appendChild(cb);
  }

  var lbl=document.createElement('div'); lbl.className='sec-lbl anim d1'; lbl.textContent="Today's Tasks";
  inner.appendChild(lbl);

  state.tasks.forEach(function(task, i) {
    var pct=Math.min(100, Math.round(task.progress/task.target*100));

    // Determine display state — local cache is authoritative
    var isClaimed = task.claimed || _isClaimed(task.id);
    var isInFlight = !!_inFlight[task.id];
    var showClaimed = isClaimed; // in-flight already sets _isClaimed via _setClaimed
    var isReady = task.done && !showClaimed;

    var card=document.createElement('div');
    card.className='task anim d'+(i+2)+(showClaimed?' claimed':'')+(isReady?' ready':'');
    card.id='task-card-'+task.id;

    var iconSvg = ICONS[task.type] || ICONS.answered;

    // Build action HTML
    var actHtml = '';
    if (showClaimed) {
      actHtml='<div class="task-action"><div class="task-check"><div class="task-check-circle"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div>Claimed</div></div>';
    } else if (isInFlight) {
      // Should not normally reach here since _setClaimed is called before _inFlight, but safety net
      actHtml='<div class="task-action"><div class="task-claim-loading"><div class="spin-sm"></div>Claiming...</div></div>';
    } else if (task.done) {
      actHtml='<div class="task-action"><button class="task-claim" data-tid="'+task.id+'" data-xp="'+task.xp+'"><svg viewBox="0 0 24 24"><path d="M12 2v4m0 12v4m-6-10H2m20 0h-4m-1.5-6.5L15 7m-6 10l-1.5 1.5M19.5 7.5L18 9M6 15l-1.5 1.5"/></svg>Claim +'+task.xp+' XP</button></div>';
    }

    card.innerHTML=
      '<div class="task-top">'+
        '<div class="task-ic'+(task.done?' ic-done':'')+'">'+iconSvg+'</div>'+
        '<div class="task-info">'+
          '<div class="task-name">'+task.label+'</div>'+
          '<div class="task-meta">'+
            '<span class="task-xp">'+task.xp+' XP</span>'+
            '<span class="task-ct">'+task.progress+'/'+task.target+'</span>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="task-bar"><div class="task-fill'+(task.done?' tdone':'')+'" style="width:'+pct+'%"></div></div>'+
      actHtml;

    // Attach claim handler
    var btn = card.querySelector('.task-claim');
    if (btn) {
      btn.addEventListener('click', function() {
        var tid = this.getAttribute('data-tid');
        var xpVal = parseInt(this.getAttribute('data-xp')) || 0;

        // Hard guards — belt AND suspenders
        if (_isClaimed(tid) || _inFlight[tid]) return;

        // 1. Disable the button immediately so no second tap can fire
        this.disabled = true;
        this.innerHTML = '<div class="spin-sm"></div>';

        // 2. Mark claimed locally RIGHT NOW before any async — prevents re-render restoring button
        _setClaimed(tid);

        // 3. Run the transaction
        var _uid_snap = _uid; // capture uid
        claimTask(_uid_snap, tid).then(function(earnedXp) {
          if (earnedXp !== null && earnedXp > 0) {
            awardXP(earnedXp);
            spawnConfetti(18);
            showXpToast('+' + earnedXp + ' XP');
          }
          return loadTaskState(_uid_snap);
        }).then(function(freshState) {
          if (freshState.allDone && !freshState.streakBumped) {
            return incrementStreakToday(_uid_snap).then(function(){
              return loadTaskState(_uid_snap);
            });
          }
          return freshState;
        }).then(function(finalState) {
          render(finalState);
        }).catch(function(e) {
          console.warn('claim flow error:', e);
          // Still re-render — claimed state is already in local cache so button won't reappear
          loadTaskState(_uid_snap).then(render).catch(function(){});
        });
      });
    }

    inner.appendChild(card);
  });
}

// ─── Refresh with debounce (prevents rapid re-renders from multiple messages) ──
var _refreshTimer = null;
function scheduleRefresh() {
  clearTimeout(_refreshTimer);
  _refreshTimer = setTimeout(function(){
    if (!_uid) return;
    loadTaskState(_uid).then(render).catch(function(e){ console.warn('refresh err:', e); });
  }, 350);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
updateCountdown();
setInterval(updateCountdown, 1000);

var _uid = null;

auth.onAuthStateChanged(async function(user) {
  if (!user) {
    document.getElementById('body-inner').innerHTML='<div class="loading" style="color:rgba(240,234,214,.3)">Please sign in to see your tasks.</div>';
    return;
  }
  _uid = user.uid;
  try {
    render(await loadTaskState(user.uid));
  } catch(e) {
    console.warn('init error:', e);
    document.getElementById('body-inner').innerHTML='<div class="loading" style="color:rgba(240,234,214,.3)">Failed to load tasks. Pull to refresh.</div>';
  }
});

// ─── Listen for progress updates from the game feed ───────────────────────────
window.addEventListener('message', function(e) {
  if (!e.data || !e.data.type) return;
  if (e.data.type === 'tasksUpdated' && _uid) {
    scheduleRefresh();
  }
});

// ─── Refresh when tab becomes visible again ───────────────────────────────────
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && _uid) scheduleRefresh();
});
</script>
</body>
</html>
