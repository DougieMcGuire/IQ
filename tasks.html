<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daily Tasks – Cebear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#162b5e;--navy:#162b5e;--navy-mid:#1e3872;--card:#fff;--text:#162b5e;--text-dim:#5a6a90;--text-light:#8a96b8;--pill:#EEF0F7;--green:#2DC653;--green-dark:#22a344;--red:#FF3B5C;--gold:#FFB800;--gold-dark:#d99e00;--orange:#FF8C00;--blue:#3B82F6}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text)}
    .page{display:flex;flex-direction:column;height:100%;overflow:hidden}

    .top-bar{padding:calc(env(safe-area-inset-top,0px)+14px) 18px 12px;background:var(--bg);flex-shrink:0}
    .top-row{display:flex;align-items:center;justify-content:space-between}
    .page-title{font-size:20px;font-weight:900;color:#fff}

    /* ── BIG countdown ── */
    .countdown-card{background:var(--card);border-radius:16px;padding:14px 16px;margin-top:12px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .cd-icon{width:40px;height:40px;background:var(--navy);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .cd-icon svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .cd-info{flex:1}
    .cd-label{font-size:10px;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
    .cd-time{font-size:24px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:1px}
    .cd-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:cdPulse 2s ease infinite;flex-shrink:0}
    @keyframes cdPulse{0%,100%{opacity:1}50%{opacity:.3}}

    .scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 20px}
    .scroll-body::-webkit-scrollbar{display:none}

    /* ── Streak card — BIG ── */
    .streak-card{background:var(--card);border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .streak-inner{display:flex;align-items:center;gap:14px}
    .streak-flame-wrap{width:56px;height:56px;flex-shrink:0;background:rgba(255,140,0,.1);border-radius:16px;display:flex;align-items:center;justify-content:center}
    .streak-flame-wrap svg{width:28px;height:28px;stroke:var(--orange);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .streak-info{flex:1}
    .streak-label{font-size:10px;font-weight:800;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
    .streak-val{font-size:32px;font-weight:900;color:var(--orange);line-height:1}
    .streak-sub{font-size:11px;font-weight:700;color:var(--text-dim);margin-top:3px;line-height:1.3}
    .streak-pips{display:flex;gap:5px;margin-top:12px}
    .streak-pip{flex:1;height:6px;border-radius:3px;background:var(--pill);transition:background .4s}
    .streak-pip.active{background:var(--orange)}.streak-pip.done{background:var(--green)}

    /* ── Progress ── */
    .progress-card{background:var(--card);border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}

    .progress-label{font-size:13px;font-weight:800;color:var(--text)}.progress-count{font-size:13px;font-weight:900;color:var(--gold)}

    .progress-bar-inner.all-done{background:var(--gold)}

    .complete-banner{display:none;background:var(--green);border-radius:20px;padding:18px 16px;margin-bottom:12px;align-items:center;gap:14px;box-shadow:0 4px 16px rgba(45,198,83,.3)}

    .cb-icon{width:48px;height:48px;background:rgba(255,255,255,.2);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .cb-icon svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
    .cb-text .cb-title{font-size:17px;font-weight:900;color:#fff}.cb-text .cb-sub{font-size:12px;font-weight:700;color:rgba(255,255,255,.85);margin-top:3px;line-height:1.3}

    .section-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.35);letter-spacing:1.5px;text-transform:uppercase;margin:4px 0 8px 2px}

    /* ── Task cards ── */
    .task-card{background:var(--card);border-radius:20px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);position:relative;overflow:hidden;transition:opacity .5s,transform .3s}
    .task-card.is-claimed{opacity:.4}
    .task-card.task-ready::after{content:'';position:absolute;left:0;top:12px;bottom:12px;width:4px;border-radius:0 3px 3px 0;background:var(--gold)}
    .task-icon-wrap{width:48px;height:48px;flex-shrink:0;background:var(--pill);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
    .task-icon-wrap.icon-done{background:rgba(45,198,83,.1)}
    .task-body{flex:1;min-width:0}
    .task-label{font-size:14px;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.25}
    .task-progress-row{display:flex;align-items:center;gap:8px}
    .task-bar-outer{flex:1;height:8px;background:var(--pill);border-radius:4px;overflow:hidden}
    .task-bar-inner{height:100%;border-radius:4px;background:var(--blue);transition:width .5s cubic-bezier(.34,1.56,.64,1)}
    .task-bar-inner.bar-done{background:var(--gold)}
    .task-pct{font-size:11px;font-weight:800;color:var(--text-dim);white-space:nowrap;min-width:36px;text-align:right}
    .task-claim{flex-shrink:0;background:var(--gold);color:var(--navy);border:none;border-radius:12px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 2px 0 var(--gold-dark);transition:transform .1s;white-space:nowrap;line-height:1}
    .task-claim:active:not(:disabled){transform:translateY(2px);box-shadow:none}.task-claim:disabled{opacity:.5;cursor:default}
    .task-done-badge{flex-shrink:0;width:32px;height:32px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
    .task-done-badge svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}

    .xp-toast{position:fixed;top:calc(env(safe-area-inset-top,0px)+16px);left:50%;transform:translateX(-50%) translateY(-20px);background:var(--gold);color:var(--navy);border-radius:20px;padding:9px 22px;font-size:18px;font-weight:900;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:999;opacity:0;pointer-events:none;transition:opacity .25s,transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
    .xp-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .confetti{position:fixed;inset:0;pointer-events:none;z-index:800;overflow:hidden}
    .confetti i{position:absolute;width:10px;height:10px;opacity:0;border-radius:3px}
    .confetti i.fall{animation:confettiFall 1.3s ease-out forwards}
    @keyframes popIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
    @keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:rgba(255,255,255,.5);font-size:14px;font-weight:700}
    .loading-spinner{width:36px;height:36px;border:4px solid rgba(255,255,255,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .animate-in{animation:slideUp .35s ease both}.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}.d4{animation-delay:.16s}.d5{animation-delay:.2s}
  </style>
</head>

function getTasksRef(uid){return db.collection('users').doc(uid).collection('dailyTasks').doc(getTodayKey())}
function getYesterdayKey(){var y=new Date();y.setDate(y.getDate()-1);return y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate()}
async function loadTaskState(uid){var ref=getTasksRef(uid);var snap=await ref.get();if(snap.exists)return snap.data();var yestSnap=await db.collection('users').doc(uid).collection('dailyTasks').doc(getYesterdayKey()).get();var prevStreak=0;if(yestSnap.exists){var yd=yestSnap.data();prevStreak=yd.allDone?(yd.dailyStreak||0):0}var fresh={date:getTodayKey(),tasks:getDailyTaskDefs().map(function(def){return Object.assign({},def,{progress:0,done:false,claimed:false})}),allDone:false,allClaimed:false,dailyStreak:prevStreak};await ref.set(fresh);return fresh}

  var streakDays=state.dailyStreak||0;var streakSub=streakDays===0?'Complete all tasks to start your streak!':streakDays===1?'First day done — keep it going!':streakDays+' days in a row — don\'t break it!';

  if(allDone){var banner=document.createElement('div');banner.className='complete-banner show animate-in d2';banner.innerHTML='<div class="cb-icon"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div><div class="cb-text"><div class="cb-title">All tasks complete!</div><div class="cb-sub">Streak updated. New tasks in <strong id="banner-countdown">--:--:--</strong></div></div>';body.appendChild(banner)}
  var lbl=document.createElement('div');lbl.className='section-label animate-in d2';lbl.textContent="Today's Tasks";body.appendChild(lbl);
  state.tasks.forEach(function(task,i){var pct=Math.min(100,Math.round((task.progress/task.target)*100));var card=document.createElement('div');var delayClass='d'+Math.min(i+3,5);var isReady=task.done&&!task.claimed;
    card.className='task-card animate-in '+delayClass+(task.claimed?' is-claimed':'')+(isReady?' task-ready':'');
    var rightEl='';if(task.claimed){rightEl='<div class="task-done-badge"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></div>'}else if(task.done){rightEl='<button class="task-claim" data-id="'+task.id+'" data-xp="'+task.xp+'">+'+task.xp+' XP</button>'}
    card.innerHTML='<div class="task-icon-wrap'+(task.done?' icon-done':'')+'">'+task.icon+'</div><div class="task-body"><div class="task-label">'+task.label+'</div><div class="task-progress-row"><div class="task-bar-outer"><div class="task-bar-inner'+(task.done?' bar-done':'')+'" style="width:'+pct+'%"></div></div><div class="task-pct">'+task.progress+'/'+task.target+'</div></div></div>'+rightEl;
    var claimBtn=card.querySelector('.task-claim');if(claimBtn){(function(btn,uid){btn.addEventListener('click',async function(){btn.disabled=true;btn.textContent='...';var xp=await claimTask(uid,btn.dataset.id);if(xp===null){var fresh=await loadTaskState(uid);render(fresh);return}awardXP(xp);spawnConfetti(18);showXpToast('+'+xp+' XP');var fresh=await loadTaskState(uid);if(fresh.allDone&&!fresh.streakBumped){await incrementStreakToday(uid);fresh=await loadTaskState(uid)}render(fresh)})})(claimBtn,_currentUid)}
    body.appendChild(card)});
}
updateCountdown();setInterval(updateCountdown,1000);
auth.onAuthStateChanged(async function(user){if(!user){document.getElementById('loading-state').textContent='Please log in.';return}_currentUid=user.uid;try{var state=await loadTaskState(user.uid);render(state)}catch(e){document.getElementById('loading-state').textContent='Failed to load tasks.'}});
window.addEventListener('message',async function(e){if(e.data&&e.data.type==='tasksUpdated'&&_currentUid){var fresh=await loadTaskState(_currentUid);render(fresh)}});
document.addEventListener('visibilitychange',async function(){if(!document.hidden&&_currentUid){var fresh=await loadTaskState(_currentUid);render(fresh)}});
</script>
