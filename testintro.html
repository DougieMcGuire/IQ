<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @font-face {
    font-family: 'Chewy';
    src: url('Chewy-Regular.ttf') format('truetype');
  }

  html, body {
    margin: 0;
    height: 100%;
    background: #0474fc;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .container {
    text-align: center;
    color: white;
  }

  .logo {
    width: 160px;
    opacity: 0;
    transform: scale(0.6);
    animation: logoIn 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  .text {
    font-family: 'Chewy', cursive;
    font-size: 64px;
    margin-top: 10px;
    opacity: 0;
    transform: translateY(20px);
    animation: textIn 0.6s ease-out forwards;
    animation-delay: 0.2s;
  }

  @keyframes logoIn {
    0% {
      opacity: 0;
      transform: scale(0.6);
    }
    70% {
      opacity: 1;
      transform: scale(1.05);
    }
    100% {
      opacity: 1;
      transform: scale(1);
    }
  }

  @keyframes textIn {
    0% {
      opacity: 0;
      transform: translateY(20px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</head>
<body>

<div class="container">
  <img src="logo.png" class="logo">
  <div class="text">cebear</div>
</div>

</body>
</html>
