<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @font-face {
    font-family: 'Chewy';
    src: url('Chewy-Regular.ttf') format('truetype');
  }

  html, body {
    margin: 0;
    height: 100%;
    background: #0474fc;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .container {
    text-align: center;
    color: white;
  }

  /* Bear logo */
  .logo {
    width: 170px;
    display: block;
    margin: 0 auto;
    opacity: 0;
    transform: scale(0.6);
    animation: pop 0.7s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  /* Text container */
  .text {
    font-family: 'Chewy', cursive;
    font-size: 92px;
    margin-top: 6px;
    white-space: nowrap;
  }

  /* Individual letters */
  .letter {
    display: inline-block;
    opacity: 0;
    transform: translateY(28px) scale(0.6);
    animation: pop 0.7s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  /* Very subtle stagger */
  .letter:nth-child(1) { animation-delay: 0.12s; }
  .letter:nth-child(2) { animation-delay: 0.16s; }
  .letter:nth-child(3) { animation-delay: 0.20s; }
  .letter:nth-child(4) { animation-delay: 0.24s; }
  .letter:nth-child(5) { animation-delay: 0.28s; }
  .letter:nth-child(6) { animation-delay: 0.32s; }

  /* Shared animation for PERFECT sync */
  @keyframes pop {
    0% {
      opacity: 0;
      transform: translateY(28px) scale(0.6);
    }
    65% {
      opacity: 1;
      transform: translateY(-6px) scale(1.08);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
</style>
</head>
<body>

<div class="container">
  <img src="logo.png" class="logo">
  <div class="text">
    <span class="letter">c</span><span class="letter">e</span><span class="letter">b</span><span class="letter">e</span><span class="letter">a</span><span class="letter">r</span>
  </div>
</div>

</body>
</html>
