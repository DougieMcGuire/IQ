<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0474fc;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  video {
    width: min(90vw, 90vh);
    pointer-events: none;
  }
</style>
</head>
<body>

<video
  id="intro"
  muted
  playsinline
  preload="auto"
  disablepictureinpicture
>
  <source src="copy_204462D8-E7CB-4CE8-AA6C-277226155A65.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("intro");

  video.addEventListener("loadedmetadata", () => {
    video.currentTime = 0;
  });

  video.addEventListener("canplaythrough", () => {
    requestAnimationFrame(() => {
      video.play();
    });
  });

  video.onended = () => {
    video.pause();
    video.currentTime = video.duration - 0.001;
  };
</script>

</body>
</html>
