<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
  @font-face {
    font-family: 'Chewy';
    src: url('Chewy-Regular.ttf') format('truetype');
  }

  html, body {
    margin: 0;
    height: 100%;
    background: #0474fc;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;

    /* Disable interaction */
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  .container {
    text-align: center;
    color: white;
    pointer-events: none;
  }

  img {
    -webkit-user-drag: none;
    user-drag: none;
    pointer-events: none;
  }

  .logo {
    width: 170px;
    display: block;
    margin: 0 auto;
    opacity: 0;
    transform: translateY(28px) scale(0.6);
    animation: pop 0.8s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  .text {
    font-family: 'Chewy', cursive;
    font-size: 92px;
    margin-top: 6px;
    white-space: nowrap;
    padding: 0 8px;              /* prevents side clipping */
    overflow: visible;
  }

  .letter {
    display: inline-block;
    opacity: 0;
    transform: translateY(28px) scale(0.6);
    animation: popLetter cubic-bezier(.34,1.56,.64,1) forwards;
    will-change: transform;
    backface-visibility: hidden;
  }

  /* All letters finish exactly at 0.8s */
  .letter:nth-child(1) { animation-delay: 0.15s; animation-duration: 0.65s; }
  .letter:nth-child(2) { animation-delay: 0.19s; animation-duration: 0.61s; }
  .letter:nth-child(3) { animation-delay: 0.23s; animation-duration: 0.57s; }
  .letter:nth-child(4) { animation-delay: 0.27s; animation-duration: 0.53s; }
  .letter:nth-child(5) { animation-delay: 0.31s; animation-duration: 0.49s; }
  .letter:nth-child(6) { animation-delay: 0.35s; animation-duration: 0.45s; }

  @keyframes pop {
    0% {
      opacity: 0;
      transform: translateY(28px) scale(0.6);
    }
    65% {
      opacity: 1;
      transform: translateY(-6px) scale(1.08);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes popLetter {
    0% {
      opacity: 0;
      transform: translateY(28px) scale(0.6);
    }
    65% {
      opacity: 1;
      transform: translateY(-6px) scale(1.08);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
</style>
</head>

<body>

<div class="container">
  <img src="logo.png" class="logo" draggable="false">
  <div class="text">
    <span class="letter">c</span><span class="letter">e</span><span class="letter">b</span><span class="letter">e</span><span class="letter">a</span><span class="letter">r</span>
  </div>
</div>

</body>
</html>
