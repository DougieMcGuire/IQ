<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @font-face {
    font-family: 'Chewy';
    src: url('Chewy-Regular.ttf') format('truetype');
  }

  html, body {
    margin: 0;
    height: 100%;
    background: #0474fc;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .container {
    text-align: center;
    color: white;
  }

  .logo {
    width: 170px;
    opacity: 0;
    transform: scale(0.6);
    animation: popIn 0.65s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  .text {
    font-family: 'Chewy', cursive;
    font-size: 88px;
    margin-top: 8px;
    display: inline-flex; /* prevents spacing gaps */
  }

  .letter {
    opacity: 0;
    transform: translateY(25px) scale(0.85);
    animation: popIn 0.65s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  /* Tight subtle stagger */
  .letter:nth-child(1) { animation-delay: 0.12s; }
  .letter:nth-child(2) { animation-delay: 0.16s; }
  .letter:nth-child(3) { animation-delay: 0.20s; }
  .letter:nth-child(4) { animation-delay: 0.24s; }
  .letter:nth-child(5) { animation-delay: 0.28s; }
  .letter:nth-child(6) { animation-delay: 0.32s; }

  @keyframes popIn {
    0% {
      opacity: 0;
      transform: translateY(25px) scale(0.6);
    }
    70% {
      opacity: 1;
      transform: translateY(-5px) scale(1.08);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
</style>
</head>
<body>

<div class="container">
  <img src="logo.png" class="logo">
  <div class="text">
    <span class="letter">c</span>
    <span class="letter">e</span>
    <span class="letter">b</span>
    <span class="letter">e</span>
    <span class="letter">a</span>
    <span class="letter">r</span>
  </div>
</div>

</body>
</html>
