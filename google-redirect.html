<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#3a2918">
  <title>BrainDeer</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#3a2918;font-family:'Nunito',sans-serif;color:#f0e2cc;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
    .mascot{font-size:52px;animation:bob 1.2s ease-in-out infinite}
    .title{font-size:22px;font-weight:900;margin:10px 0 6px}
    .sub{font-size:14px;font-weight:700;color:#c2a476;margin-bottom:20px;max-width:300px;line-height:1.5}
    .btn-back{padding:10px 24px;border:2px solid #6b4f32;border-radius:12px;background:transparent;color:#c2a476;font-size:14px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;margin-top:12px}
    .btn-back:active{opacity:.7}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  </style>
</head>
<body>

<div class="mascot">🦌</div>
<div class="title">BrainDeer</div>
<div class="sub" id="sub">Choose your Google account</div>
<button class="btn-back" onclick="window.location.replace('app.html')">← Back</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey:"AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",
    authDomain:"braindeer-backend.firebaseapp.com",
    projectId:"braindeer-backend",
    storageBucket:"braindeer-backend.firebasestorage.app",
    messagingSenderId:"331205139765",
    appId:"1:331205139765:web:20cfef8194af63fc55c07c"
  });

  window.handleGISCredential = function(response) {
    var idToken = response.credential;
    if (!idToken) return;
    document.getElementById('sub').textContent = 'Signing in…';

    var credential = firebase.auth.GoogleAuthProvider.credential(idToken);
    firebase.auth().signInWithCredential(credential)
      .then(function(result) {
        var ref = firebase.firestore().collection('users').doc(result.user.uid);
        return ref.get().then(function(snap) {
          if (!snap.exists) {
            return ref.set({
              uid: result.user.uid, email: result.user.email,
              username: result.user.displayName || null,
              pic: result.user.photoURL || null,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              lastSeen: firebase.firestore.FieldValue.serverTimestamp()
            });
          }
          return ref.set({ lastSeen: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
        });
      })
      .then(function() {
        window.location.replace('app.html');
      })
      .catch(function(err) {
        document.getElementById('sub').textContent = 'Sign-in failed. Tap back and try again.';
      });
  };
</script>
<script src="https://accounts.google.com/gsi/client" onload="
  google.accounts.id.initialize({
    client_id: '331205139765-3gapl6adar49lag63483id304v04mdd4.apps.googleusercontent.com',
    callback: handleGISCredential,
    use_fedcm_for_prompt: true
  });
  google.accounts.id.prompt();
"></script>

</body>
</html>
