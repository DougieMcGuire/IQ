<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>iPhone Push Test</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { padding: 10px 15px; font-size: 16px; }
    #log {
      margin-top: 20px;
      padding: 10px;
      background: #111;
      color: #0f0;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <h1>iPhone Push Test</h1>
  <button onclick="enablePush()">Enable Push Notifications</button>

  <div id="log">Logs will appear here...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-messaging.js";

    const logDiv = document.getElementById("log");

    function log(msg) {
      logDiv.textContent += "\n" + msg;
    }

    const firebaseConfig = {
      apiKey: "AIzaSyDv3SpKBi_bS6hwfKABho55vA52VjwRZPE",
      authDomain: "roblox-df2ad.firebaseapp.com",
      projectId: "roblox-df2ad",
      messagingSenderId: "323286791287",
      appId: "1:323286791287:web:c895be3f1802017086c272"
    };

    const app = initializeApp(firebaseConfig);
    const messaging = getMessaging(app);

    async function enablePush() {
      try {
        log("Requesting permission...");
        const permission = await Notification.requestPermission();

        if (permission !== "granted") {
          log("❌ Permission denied");
          return;
        }

        log("Permission granted ✅");
        log("Getting FCM token...");

        const token = await getToken(messaging, {
          vapidKey: "BE4vyGsiD6DgxdiLEfRHgaVgdBHmy2Ps6UFZLt3pql6ENGVKiRvRULNxIeQG16cyQmMGEa4StJpqx_ugg10-J3Y"
        });

        if (token) {
          log("✅ TOKEN RECEIVED:");
          log(token);
        } else {
          log("⚠️ No token returned");
        }

      } catch (err) {
        log("❌ ERROR:");
        log(err.message);
      }
    }

    window.enablePush = enablePush;
  </script>

</body>
</html>
