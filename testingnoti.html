<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>iPhone Push Auto Test</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { padding: 10px 15px; font-size: 16px; }
    #log {
      margin-top: 20px;
      padding: 10px;
      background: #111;
      color: #0f0;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <h1>iPhone Push Auto Test</h1>
  <button onclick="enablePush()">Enable Push Notifications</button>

  <div id="log">Logs will appear here...</div>

  <script type="module">
    const logDiv = document.getElementById("log");
    function log(msg) { logDiv.textContent += "\n" + msg; }

    async function enablePush() {
      try {
        log("Requesting permission...");
        const permission = await Notification.requestPermission();
        if (permission !== "granted") { log("❌ Permission denied"); return; }
        log("Permission granted ✅");

        log("Waiting 5 seconds to send test notification...");
        setTimeout(() => {
          log("Sending test notification 🔔");
          new Notification("Test Notification", {
            body: "This is a fully automated test!",
          });
        }, 5000);

      } catch (err) {
        log("❌ ERROR:"); log(err.message);
      }
    }

    window.enablePush = enablePush;
  </script>

</body>
</html>
