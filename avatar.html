<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Avatar — Cebear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f0e8;--card:#fff;--card-border:#e8e2d6;
      --blue:#0474fc;--blue-dark:#0358c4;--blue-deep:#0245a0;
      --text:#1e293b;--text-dim:#64748b;--text-light:#94a3b8;
      --green:#22c55e;--green-dark:#16a34a;
      --red:#ef4444;--gold:#f59e0b;--gold-dark:#d97706;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--blue);color:#fff;-webkit-font-smoothing:antialiased}

    .editor{display:flex;flex-direction:column;height:100dvh}

    /* ── Header ── */
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,8px) + 8px) 14px 10px;flex-shrink:0;gap:8px}
    .btn-x{background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);border-radius:12px;padding:8px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:rgba(255,255,255,.7);cursor:pointer;display:flex;align-items:center;gap:5px;flex-shrink:0;transition:all .1s}
    .btn-x:active{background:rgba(255,255,255,.2)}
    .hdr-title{font-family:'Chewy',cursive;font-size:20px;letter-spacing:.5px;flex:1;text-align:center}
    .btn-save{background:#fff;border:none;border-radius:12px;padding:8px 18px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;color:var(--blue);cursor:pointer;box-shadow:0 4px 0 var(--card-border);flex-shrink:0;display:flex;align-items:center;gap:6px;transition:all .1s}
    .btn-save:active{transform:translateY(4px);box-shadow:none}
    .btn-save:disabled{opacity:.35;pointer-events:none}
    .hdr svg,.btn-save svg,.btn-x svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

    /* ── Preview ── */
    .preview-row{display:flex;justify-content:center;padding:8px 16px 12px;flex-shrink:0}
    .av-ring{width:120px;height:120px;border-radius:50%;overflow:hidden;border:4px solid rgba(255,255,255,.3);box-shadow:0 6px 20px rgba(0,0,0,.15);position:relative}
    .av-ring canvas{width:100%;height:100%;display:block}
    .av-ring::after{content:'';position:absolute;inset:0;border-radius:50%;box-shadow:inset 0 0 0 2px rgba(255,255,255,.1);pointer-events:none}

    /* ── Category tabs ── */
    .cat-row{display:flex;gap:4px;overflow-x:auto;padding:0 12px 8px;flex-shrink:0;-webkit-overflow-scrolling:touch}
    .cat-row::-webkit-scrollbar{display:none}
    .cat-tab{display:flex;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;padding:7px 12px;border-radius:20px;background:rgba(255,255,255,.1);border:2px solid transparent;transition:all .12s;white-space:nowrap}
    .cat-tab.active{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5)}
    .cat-tab:active{opacity:.65}
    .cat-icon svg{width:15px;height:15px;stroke:rgba(255,255,255,.5);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;display:block;flex-shrink:0}
    .cat-tab.active .cat-icon svg{stroke:#fff}
    .cat-lbl{font-size:11px;font-weight:800;color:rgba(255,255,255,.5)}
    .cat-tab.active .cat-lbl{color:#fff}

    /* ── Content panel (white card) ── */
    .panel{flex:1;background:var(--card);border-radius:24px 24px 0 0;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 -4px 20px rgba(0,0,0,.1)}

    /* ── Color row ── */
    .color-row{flex-shrink:0;padding:12px 16px 8px;display:none;border-bottom:2px solid var(--card-border)}
    .color-row.show{display:block}
    .color-title{font-size:10px;font-weight:900;color:var(--text-light);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px}
    .dots{display:flex;flex-wrap:wrap;gap:6px}
    .dot{width:30px;height:30px;border-radius:50%;flex-shrink:0;cursor:pointer;border:3px solid transparent;transition:transform .1s,border-color .1s,box-shadow .1s}
    .dot.on{border-color:var(--blue);transform:scale(1.15);box-shadow:0 0 0 2px rgba(4,116,252,.3)}
    .dot:active{transform:scale(.85)}

    /* ── Items grid ── */
    .items-wrap{flex:1;overflow-y:auto;padding:12px 14px calc(env(safe-area-inset-bottom,8px) + 12px);-webkit-overflow-scrolling:touch}
    .items-wrap::-webkit-scrollbar{display:none}
    .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
    .icard{aspect-ratio:1;border-radius:14px;background:#f8fafc;border:2.5px solid var(--card-border);cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;transition:all .12s;box-shadow:0 3px 0 #d6cfc0}
    .icard:active{transform:translateY(3px);box-shadow:none}
    .icard.on{border-color:var(--blue);background:#e8f2ff;box-shadow:0 3px 0 var(--blue-dark)}
    .icard canvas{width:100%;height:100%;display:block;border-radius:10px}
    .none-lbl{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:800;color:var(--text-light)}
    .none-lbl svg{width:16px;height:16px;stroke:var(--text-light);fill:none;stroke-width:2;stroke-linecap:round;display:block}
    .icheck{position:absolute;bottom:4px;right:4px;width:18px;height:18px;background:var(--blue);border-radius:50%;display:none;align-items:center;justify-content:center;box-shadow:0 2px 0 var(--blue-dark)}
    .icard.on .icheck{display:flex}
    .icheck svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}

    /* ── Overlays ── */
    .saving{position:fixed;inset:0;background:rgba(4,116,252,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:99}
    .saving.show{display:flex}
    .saving-lbl{font-size:15px;font-weight:800;color:#fff}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    .toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,8px) + 14px);left:50%;transform:translateX(-50%) translateY(10px);border-radius:14px;padding:10px 22px;font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:all .28s;z-index:200;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.ok{background:var(--green);color:#fff}
    .toast.err{background:var(--red);color:#fff}

    /* ── Loading skeleton ── */
    .skel{background:linear-gradient(90deg,#e8e2d6 25%,#f0ead6 50%,#e8e2d6 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:10px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ── Animations ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp .25s ease both}
  </style>
</head>
<body>
<div class="editor">
  <div class="hdr">
    <button class="btn-x" id="close-btn">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Close
    </button>
    <div class="hdr-title">Edit Avatar</div>
    <button class="btn-save" id="save-btn">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Save
    </button>
  </div>
  <div class="preview-row">
    <div class="av-ring"><canvas id="pv" width="280" height="280"></canvas></div>
  </div>
  <div class="cat-row" id="cat-row"></div>
  <div class="panel">
    <div class="color-row" id="color-row">
      <div class="color-title" id="color-title">Color</div>
      <div class="dots" id="dots"></div>
    </div>
    <div class="items-wrap"><div class="items-grid" id="grid"></div></div>
  </div>
</div>
<div class="saving" id="saving"><div class="spin" style="width:40px;height:40px"></div><div class="saving-lbl">Saving...</div></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
'use strict';

// ── Firebase ──────────────────────────────────────────────────────────────────
var _auth, _db, _user = null;
(function(){
  var cfg={apiKey:"AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",authDomain:"braindeer-backend.firebaseapp.com",projectId:"braindeer-backend",storageBucket:"braindeer-backend.firebasestorage.app",messagingSenderId:"331205139765",appId:"1:331205139765:web:20cfef8194af63fc55c07c"};
  var app=firebase.apps.length?firebase.app():firebase.initializeApp(cfg);
  _auth=firebase.auth(app); _db=firebase.firestore(app);
  _auth.onAuthStateChanged(function(u){_user=u;});
})();

// ── Config ────────────────────────────────────────────────────────────────────
var BASE='/Avatars/';
var LAYERS=['bases','hair','eyes','brows','noses','mouths','neck','tops','glasses','hats'];
var NO_COL={brows:true,noses:true};

var CATS=[
  {id:'skin',   lbl:'Skin',   lk:'bases',  ck:'bases',
   svg:'<circle cx="12" cy="8" r="4"/><path d="M5 20a7 7 0 0114 0"/>'},
  {id:'hair',   lbl:'Hair',   lk:'hair',   ck:'hair',
   svg:'<path d="M12 3C8.5 3 6 5.5 6 9c0 1.5.5 3 1.5 4.5C6 14.5 5 16 5 17h14c0-1-1-2.5-2.5-3.5C17.5 12 18 10.5 18 9c0-3.5-2.5-6-6-6z"/>'},
  {id:'eyes',   lbl:'Eyes',   lk:'eyes',   ck:'eyes',
   svg:'<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>'},
  {id:'brows',  lbl:'Brows',  lk:'brows',  ck:null,
   svg:'<path d="M5 9c2-2 5-3 7-3s5 1 7 3"/><path d="M5 6c2-2 5-3 7-3s5 1 7 3"/>'},
  {id:'noses',  lbl:'Nose',   lk:'noses',  ck:null,
   svg:'<path d="M12 5v9"/><path d="M9 14c0 1.7 1.3 3 3 3s3-1.3 3-3"/><line x1="9" y1="14" x2="7" y2="14"/><line x1="15" y1="14" x2="17" y2="14"/>'},
  {id:'mouths', lbl:'Mouth',  lk:'mouths', ck:'mouths',
   svg:'<path d="M8 13s1.5 4 4 4 4-4 4-4"/>'},
  {id:'tops',   lbl:'Clothes',lk:'tops',   ck:'tops',
   svg:'<path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/>'},
  {id:'neck',   lbl:'Neck',   lk:'neck',   ck:'neck',
   svg:'<circle cx="12" cy="17" r="2"/><path d="M9 9l3 6 3-6"/><path d="M9 6l3-4 3 4"/>'},
  {id:'glasses',lbl:'Glasses',lk:'glasses',ck:'glasses',
   svg:'<circle cx="6" cy="12" r="3"/><circle cx="18" cy="12" r="3"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="2" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="22" y2="12"/>'},
  {id:'hats',   lbl:'Hats',   lk:'hats',   ck:'hats',
   svg:'<path d="M4 18h16"/><path d="M6 18V12a6 6 0 0112 0v6"/><line x1="2" y1="18" x2="22" y2="18"/>'},
  {id:'bg',     lbl:'BG',     lk:null,     ck:'bg',
   svg:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>'},
];

var OPTIONAL={neck:true,glasses:true,hats:true,brows:true,noses:true};

var COLORS=[
  '#FDBCB4','#F4C2A1','#E8B982','#D1A374','#C19A6B','#A67C5A','#8D5524','#6B4423',
  '#FFEEE6','#F5D5C4','#EBCCA2','#E1B380','#D79A5E','#CD813C','#B94F00',
  '#1C1C1C','#2C1810','#4A2E1A','#8B4513','#A0522D','#CD853F','#DAA520',
  '#F5DEB3','#FFD700','#C0C0C0','#808080','#FF4500','#FF69B4','#FF1493',
  '#FFFFFF','#D3D3D3','#404040','#000000',
  '#FF0000','#FF7F00','#FFFF00','#0000FF','#8B00FF',
  '#87CEEB','#4169E1','#000080','#6A5ACD','#228B22','#006400','#20B2AA','#008B8B',
  '#8B0000','#A52A2A','#FF6347',
];

var BG_COLORS=[
  '#1b2d5b','#151f3e','#243a6e','#2f4a88',
  '#0474fc','#3a7df2','#6d4aed','#e8443a','#3fba4f','#e8a817','#e87d1a','#e8557a',
  '#00bcd4','#009688','#ff5722','#795548',
  '#FF9A9E','#FECFEF','#667eea','#764ba2','#f093fb','#4facfe','#43e97b','#fa709a',
  '#ffeb3b','#ff9800','#8bc34a','#607d8b','#9e9e9e','#000000','#FFFFFF',
];

// ── State ─────────────────────────────────────────────────────────────────────
var manifest={};
var curCat='skin';
var S={
  parts: {bases:'base.png',neck:'',hair:'1.png',eyes:'BasicMale.png',
          brows:'Basic.png',noses:'basic.png',mouths:'Basic.png',
          tops:'16.png',glasses:'',hats:''},
  colors:{bases:'#E8B982',neck:'#C0C0C0',hair:'#4A2E1A',eyes:'#4169E1',
          brows:'#4A2E1A',mouths:'#CC6666',tops:'#3a7df2',
          glasses:'#1C1C1C',hats:'#e8443a',bg:'#1b2d5b'}
};

// ── Image cache ───────────────────────────────────────────────────────────────
var IC={};
function loadImg(src){
  if(src in IC)return Promise.resolve(IC[src]);
  return new Promise(function(res){
    var img=new Image();img.crossOrigin='anonymous';
    img.onload=function(){IC[src]=img;res(img);};
    img.onerror=function(){IC[src]=null;res(null);};
    img.src=src;
  });
}

// ── Green replacement ─────────────────────────────────────────────────────────
var NC={};
function replaceGreen(img,hex){
  if(!img)return null;
  var key=img.src+'|'+hex;
  if(NC[key])return NC[key];
  var W=img.naturalWidth||img.width||256;
  var H=img.naturalHeight||img.height||256;
  var c=document.createElement('canvas');c.width=W;c.height=H;
  var ctx=c.getContext('2d');ctx.drawImage(img,0,0,W,H);
  var id=ctx.getImageData(0,0,W,H);var px=id.data;
  var tr=parseInt(hex.slice(1,3),16),tg=parseInt(hex.slice(3,5),16),tb=parseInt(hex.slice(5,7),16);
  for(var i=0;i<px.length;i+=4){
    if(px[i+3]===0)continue;
    var R=px[i],G=px[i+1],B=px[i+2];
    if(G>80&&G>R*1.4&&G>B*1.4){
      var maxOther=Math.max(R,B);var strength=Math.min(1,(G-maxOther)/60);
      px[i]=(R+(tr-R)*strength+0.5)|0;
      px[i+1]=(G+(tg-G)*strength+0.5)|0;
      px[i+2]=(B+(tb-B)*strength+0.5)|0;
    }
  }
  ctx.putImageData(id,0,0);NC[key]=c;return c;
}

function drawLayer(ctx,img,col,lk,sz){
  if(!img)return;
  if(col&&!NO_COL[lk]){var colored=replaceGreen(img,col);if(colored)ctx.drawImage(colored,0,0,sz,sz);}
  else ctx.drawImage(img,0,0,sz,sz);
}

// ── Preview ───────────────────────────────────────────────────────────────────
var _pvPending=false;
function queuePreview(){if(_pvPending)return;_pvPending=true;requestAnimationFrame(function(){_pvPending=false;drawPreview();});}

async function drawPreview(){
  var cv=document.getElementById('pv');if(!cv)return;
  var ctx=cv.getContext('2d');var N=280;
  ctx.clearRect(0,0,N,N);ctx.fillStyle=S.colors.bg||'#1b2d5b';ctx.fillRect(0,0,N,N);
  for(var i=0;i<LAYERS.length;i++){
    var lk=LAYERS[i],part=S.parts[lk];if(!part)continue;
    var cat=CATS.find(function(c){return c.lk===lk;});
    var col=(cat&&cat.ck&&!NO_COL[lk])?S.colors[cat.ck]:null;
    var img=await loadImg(BASE+lk+'/'+part);
    drawLayer(ctx,img,col,lk,N);
    var ov=await loadImg(BASE+lk+'/'+part.replace('.png','overlay.png'));
    if(ov)ctx.drawImage(ov,0,0,N,N);
  }
}

// ── Thumbnails ────────────────────────────────────────────────────────────────
async function drawThumb(cvId,lk,item,col){
  var cv=document.getElementById(cvId);if(!cv)return;
  var key=lk+'|'+item+'|'+(col||'_');
  if(cv.dataset.k===key)return;cv.dataset.k=key;
  var SZ=100;cv.width=SZ;cv.height=SZ;
  var ctx=cv.getContext('2d');ctx.clearRect(0,0,SZ,SZ);
  var img=await loadImg(BASE+lk+'/'+item);
  if(!img){cv.dataset.k='';return;}
  drawLayer(ctx,img,col,lk,SZ);
  var ov=await loadImg(BASE+lk+'/'+item.replace('.png','overlay.png'));
  if(ov)ctx.drawImage(ov,0,0,SZ,SZ);
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function buildTabs(){
  var el=document.getElementById('cat-row');
  el.innerHTML=CATS.map(function(c){
    return '<div class="cat-tab" id="ctab-'+c.id+'">'
      +'<div class="cat-icon"><svg viewBox="0 0 24 24">'+c.svg+'</svg></div>'
      +'<span class="cat-lbl">'+c.lbl+'</span></div>';
  }).join('');
  el.addEventListener('click',function(e){
    var tab=e.target.closest('.cat-tab');
    if(tab)switchCat(tab.id.replace('ctab-',''));
  });
}

function switchCat(id){
  curCat=id;
  document.querySelectorAll('.cat-tab').forEach(function(t){t.classList.remove('active');});
  var tab=document.getElementById('ctab-'+id);
  if(tab){tab.classList.add('active');tab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}
  var cat=CATS.find(function(c){return c.id===id;});if(!cat)return;
  var crow=document.getElementById('color-row');
  if(cat.ck){
    crow.classList.add('show');
    document.getElementById('color-title').textContent=cat.lbl+' Color';
    buildDots(cat.ck,id==='bg'?BG_COLORS:COLORS);
  }else crow.classList.remove('show');
  buildGrid(id);
}

// ── Color dots ────────────────────────────────────────────────────────────────
function buildDots(ck,palette){
  var curCol=(S.colors[ck]||'').toLowerCase();
  var el=document.getElementById('dots');
  el.innerHTML=palette.map(function(c){
    var lc=c.toLowerCase();
    var isLight=lc==='#ffffff'||lc==='#ffd700'||lc==='#f5deb3'||lc==='#ffeb3b'||lc==='#fdbcb4'||lc==='#f4c2a1'||lc==='#e8b982'||lc==='#ffeee6'||lc==='#f5d5c4'||lc==='#ebcca2';
    var style='background:'+c+';'+(isLight?'box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.12);':'');
    return '<div class="dot'+(lc===curCol?' on':'')+'" data-ck="'+ck+'" data-col="'+c+'" style="'+style+'"></div>';
  }).join('');
  el.onclick=function(e){var dot=e.target.closest('.dot');if(dot)pickColor(dot.dataset.ck,dot.dataset.col);};
}

function pickColor(ck,col){
  S.colors[ck]=col;
  buildDots(ck,curCat==='bg'?BG_COLORS:COLORS);
  var cat=CATS.find(function(c){return c.ck===ck;});
  if(cat&&cat.lk){
    var pfx=BASE+cat.lk+'/';
    Object.keys(NC).forEach(function(k){if(k.startsWith(pfx))delete NC[k];});
    document.querySelectorAll('#grid canvas').forEach(function(cv){
      if(cv.id.startsWith('ic-'+cat.lk+'-'))cv.dataset.k='';
    });
    redrawThumbs(cat.lk,col);
  }
  queuePreview();
}

function redrawThumbs(lk,col){
  (manifest[lk]||[]).filter(function(f){return f.indexOf('overlay')===-1;})
    .forEach(function(item){drawThumb('ic-'+lk+'-'+safeId(item),lk,item,col);});
}

// ── Grid ──────────────────────────────────────────────────────────────────────
function safeId(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}

function buildColorGrid(grid,ck,palette){
  var curCol=(S.colors[ck]||'').toLowerCase();
  var html='<div style="display:flex;flex-wrap:wrap;gap:8px;padding:4px 0">';
  palette.forEach(function(c){
    var lc=c.toLowerCase(),sel=lc===curCol;
    var isLight=lc==='#ffffff'||lc==='#ffd700'||lc==='#f5deb3'||lc==='#ffeb3b'||lc==='#fdbcb4';
    var bdr=sel?'border:3px solid var(--blue);':'border:3px solid transparent;';
    var shd=isLight?'box-shadow:inset 0 0 0 1px rgba(0,0,0,.1);':'';
    html+='<div data-cgck="'+ck+'" data-cgcol="'+c+'" style="width:36px;height:36px;border-radius:50%;cursor:pointer;background:'+c+';'+bdr+shd+(sel?'transform:scale(1.15);':'')+'transition:all .1s;flex-shrink:0"></div>';
  });
  html+='</div>';grid.innerHTML=html;
  grid.onclick=function(e){
    var dot=e.target.closest('[data-cgck]');if(!dot)return;
    pickColor(dot.dataset.cgck,dot.dataset.cgcol);
    buildColorGrid(grid,dot.dataset.cgck,dot.dataset.cgck==='bg'?BG_COLORS:COLORS);
  };
}

function buildGrid(catId){
  var cat=CATS.find(function(c){return c.id===catId;});if(!cat)return;
  var grid=document.getElementById('grid');
  if(catId==='bg'){buildColorGrid(grid,'bg',BG_COLORS);return;}
  var lk=cat.lk;
  var items=(manifest[lk]||[]).filter(function(f){return f.indexOf('overlay')===-1;});
  var sel=S.parts[lk]||'';
  var col=(cat.ck&&!NO_COL[lk])?S.colors[cat.ck]:null;
  var html='';
  if(OPTIONAL[catId]){
    html+='<div class="icard'+(sel===''?' on':'')+'" data-lk="'+lk+'" data-item="">'
      +'<div class="none-lbl"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>None</div>'
      +'<div class="icheck"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div></div>';
  }
  items.forEach(function(item){
    var cid='ic-'+lk+'-'+safeId(item);
    html+='<div class="icard'+(sel===item?' on':'')+'" data-lk="'+lk+'" data-item="'+encodeURIComponent(item)+'">'
      +'<canvas id="'+cid+'" width="100" height="100"></canvas>'
      +'<div class="icheck"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div></div>';
  });
  grid.innerHTML=html;
  grid.onclick=function(e){
    var card=e.target.closest('.icard');
    if(card)selPart(card.dataset.lk,decodeURIComponent(card.dataset.item));
  };
  // Fire ALL thumbnails in parallel
  items.forEach(function(item){drawThumb('ic-'+lk+'-'+safeId(item),lk,item,col);});
}

function selPart(lk,item){
  S.parts[lk]=item;
  document.querySelectorAll('#grid .icard').forEach(function(c){
    c.classList.toggle('on',decodeURIComponent(c.dataset.item||'')===item&&c.dataset.lk===lk);
  });
  queuePreview();
}

// ── Bake ──────────────────────────────────────────────────────────────────────
async function bake(size){
  var cv=document.createElement('canvas');cv.width=size;cv.height=size;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=S.colors.bg||'#1b2d5b';ctx.fillRect(0,0,size,size);
  for(var i=0;i<LAYERS.length;i++){
    var lk=LAYERS[i],part=S.parts[lk];if(!part)continue;
    var cat=CATS.find(function(c){return c.lk===lk;});
    var col=(cat&&cat.ck&&!NO_COL[lk])?S.colors[cat.ck]:null;
    var img=await loadImg(BASE+lk+'/'+part);
    drawLayer(ctx,img,col,lk,size);
    var ov=await loadImg(BASE+lk+'/'+part.replace('.png','overlay.png'));
    if(ov)ctx.drawImage(ov,0,0,size,size);
  }
  return cv.toDataURL('image/webp',0.92);
}

// ── Save ──────────────────────────────────────────────────────────────────────
document.getElementById('save-btn').onclick=async function(){
  if(!_user)_user=_auth.currentUser;
  if(!_user){toast('Please sign in first',true);return;}
  var saveBtn=document.getElementById('save-btn');
  var savingEl=document.getElementById('saving');
  saveBtn.disabled=true;savingEl.classList.add('show');
  try{
    var bakedImg=await bake(400);
    await _db.collection('users').doc(_user.uid).set({
      avatarConfig:{parts:JSON.parse(JSON.stringify(S.parts)),colors:JSON.parse(JSON.stringify(S.colors))},
      avatarIMG:bakedImg,
      lastSeen:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
    savingEl.classList.remove('show');saveBtn.disabled=false;
    toast('Saved! ✓');
    try{window.parent.postMessage({type:'avatarSaved',avatarIMG:bakedImg},'*');}catch(e){}
    setTimeout(doClose,600);
  }catch(e){
    console.error('save:',e);savingEl.classList.remove('show');saveBtn.disabled=false;
    toast('Save failed: '+e.message,true);
  }
};

function doClose(){try{window.parent.postMessage({type:'avatarEditorClose'},'*');}catch(e){}}
document.getElementById('close-btn').onclick=doClose;

var _tt=null;
function toast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':' ok')+' show';
  clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},2200);
}

// ── Preload critical images ───────────────────────────────────────────────────
function preloadDefaults(){
  var loads=[];
  LAYERS.forEach(function(lk){
    var part=S.parts[lk];if(!part)return;
    loads.push(loadImg(BASE+lk+'/'+part));
    loads.push(loadImg(BASE+lk+'/'+part.replace('.png','overlay.png')));
  });
  return Promise.all(loads);
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init(){
  // Start loading manifest + auth + default images in parallel
  var manifestP=fetch('/Avatars/manifest.json').then(function(r){return r.json();}).catch(function(){toast('Could not load assets',true);return{};});
  var authP=new Promise(function(res){
    if(_auth.currentUser){_user=_auth.currentUser;return res();}
    var unsub=_auth.onAuthStateChanged(function(u){_user=u;unsub();res();});
    setTimeout(res,3000);
  });

  // Wait for both
  var results=await Promise.all([manifestP,authP]);
  manifest=results[0]||{};

  // Load user config if signed in
  if(_user){
    try{
      var snap=await _db.collection('users').doc(_user.uid).get();
      if(snap.exists){
        var d=snap.data();
        if(d.avatarConfig){
          if(d.avatarConfig.parts)Object.assign(S.parts,d.avatarConfig.parts);
          if(d.avatarConfig.colors)Object.assign(S.colors,d.avatarConfig.colors);
        }
      }
    }catch(e){console.warn('loadConfig:',e);}
  }

  // Preload default images while building UI
  preloadDefaults();

  buildTabs();
  switchCat('skin');
  drawPreview();
})();
</script>
