<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Avatar Editor — Cebear</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#151f3e;--navy:#1b2d5b;--navyM:#243a6e;--cream:#F0EAD6;--green:#3fba4f;--gd:#2d9a3c;--red:#e8443a;--gold:#e8a817;--goldd:#c48e10;--blue:#3a7df2;--dim:rgba(240,234,214,.4);--dimmer:rgba(240,234,214,.15)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100dvh;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--cream)}

    /* ── LAYOUT ── */
    .editor{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

    /* ── HEADER ── */
    .header{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,12px) + 8px) 16px 10px;background:var(--navy);border-bottom:1px solid var(--dimmer);flex-shrink:0}
    .header-title{font-size:17px;font-weight:900;color:var(--cream)}
    .btn-close{background:var(--dimmer);border:none;border-radius:10px;padding:7px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--dim);cursor:pointer;transition:all .15s}
    .btn-close:active{opacity:.7}
    .btn-save{background:var(--green);border:none;border-radius:10px;padding:7px 18px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;color:#fff;cursor:pointer;box-shadow:0 3px 0 var(--gd);transition:transform .1s;display:flex;align-items:center;gap:6px}
    .btn-save:active{transform:translateY(3px);box-shadow:none}
    .btn-save:disabled{opacity:.45;pointer-events:none}
    .btn-save svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

    /* ── PREVIEW ── */
    .preview-area{display:flex;justify-content:center;align-items:center;padding:16px;flex-shrink:0;background:var(--navy)}
    .avatar-ring{width:140px;height:140px;border-radius:50%;overflow:hidden;border:3px solid var(--dimmer);background:var(--navyM);position:relative;flex-shrink:0}
    .avatar-ring canvas{width:100%;height:100%;display:block}
    .avatar-ring .loading-ring{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
    .spin{width:28px;height:28px;border:3px solid var(--dimmer);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── CATEGORY TABS ── */
    .cat-scroll{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;flex-shrink:0;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
    .cat-scroll::-webkit-scrollbar{display:none}
    .cat-tab{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;scroll-snap-align:start;padding:8px 10px;border-radius:14px;background:var(--dimmer);border:2px solid transparent;transition:all .15s;min-width:58px}
    .cat-tab.active{background:rgba(58,125,242,.2);border-color:var(--blue)}
    .cat-tab:active{transform:scale(.94)}
    .cat-tab-icon{font-size:22px;line-height:1}
    .cat-tab-label{font-size:10px;font-weight:800;color:var(--dim);white-space:nowrap}
    .cat-tab.active .cat-tab-label{color:var(--blue)}

    /* ── COLOR STRIP ── */
    .color-strip-wrap{flex-shrink:0;padding:8px 16px 4px;display:none}
    .color-strip-wrap.show{display:block}
    .color-strip-label{font-size:10px;font-weight:800;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
    .color-strip{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px}
    .color-strip::-webkit-scrollbar{display:none}
    .color-dot{width:28px;height:28px;border-radius:50%;flex-shrink:0;cursor:pointer;border:3px solid transparent;transition:transform .1s,border-color .1s}
    .color-dot.active{border-color:#fff;transform:scale(1.2)}
    .color-dot:active{transform:scale(.9)}

    /* ── ITEMS GRID ── */
    .items-area{flex:1;overflow-y:auto;padding:8px 16px calc(env(safe-area-inset-bottom,0px) + 16px);-webkit-overflow-scrolling:touch}
    .items-area::-webkit-scrollbar{display:none}
    .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
    .item-card{width:100%;aspect-ratio:1;border-radius:14px;background:var(--dimmer);border:2.5px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:border-color .12s,transform .1s;position:relative}
    .item-card:active{transform:scale(.93)}
    .item-card.active{border-color:var(--gold);background:rgba(232,168,23,.12)}
    .item-card canvas{width:80%;height:80%;image-rendering:pixelated}
    .item-card-none{font-size:11px;font-weight:800;color:var(--dim);text-align:center;line-height:1.3}
    .item-card .item-check{position:absolute;bottom:4px;right:4px;width:16px;height:16px;background:var(--gold);border-radius:50%;display:none;align-items:center;justify-content:center}
    .item-card.active .item-check{display:flex}
    .item-check svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--green);color:#fff;border-radius:14px;padding:10px 22px;font-size:14px;font-weight:800;opacity:0;pointer-events:none;transition:all .3s;z-index:999;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.error{background:var(--red)}

    /* saving overlay */
    .saving-overlay{position:fixed;inset:0;background:rgba(21,31,62,.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:500;backdrop-filter:blur(6px)}
    .saving-overlay.show{display:flex}
    .saving-text{font-size:16px;font-weight:800;color:var(--cream)}
  </style>
</head>
<body>
<div class="editor">

  <div class="header">
    <button class="btn-close" onclick="closeEditor()">✕ Close</button>
    <div class="header-title">Edit Avatar</div>
    <button class="btn-save" id="save-btn" onclick="saveAvatar()">
      <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save
    </button>
  </div>

  <div class="preview-area">
    <div class="avatar-ring">
      <canvas id="preview-canvas" width="280" height="280"></canvas>
    </div>
  </div>

  <!-- Category tabs -->
  <div class="cat-scroll" id="cat-scroll"></div>

  <!-- Color strip -->
  <div class="color-strip-wrap" id="color-strip-wrap">
    <div class="color-strip-label" id="color-strip-label">Color</div>
    <div class="color-strip" id="color-strip"></div>
  </div>

  <!-- Items -->
  <div class="items-area">
    <div class="items-grid" id="items-grid"></div>
  </div>

</div>

<div class="toast" id="toast"></div>
<div class="saving-overlay" id="saving-overlay">
  <div class="spin" style="width:44px;height:44px;border-width:4px"></div>
  <div class="saving-text">Saving avatar...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// ── Firebase ──────────────────────────────────────────────────────────────────
var _fb = null, _auth = null, _db = null, _user = null;
(function(){
  try {
    // Try to reuse parent firebase if in iframe
    if (window.parent !== window && window.parent.firebase) {
      _fb = window.parent.firebase;
      _auth = _fb.auth();
      _db = _fb.firestore();
      _user = _auth.currentUser;
      _auth.onAuthStateChanged(function(u){ _user = u; });
      return;
    }
  } catch(e){}
  // Standalone init
  var cfg = {
    apiKey:"AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",
    authDomain:"braindeer-backend.firebaseapp.com",
    projectId:"braindeer-backend",
    storageBucket:"braindeer-backend.firebasestorage.app",
    messagingSenderId:"331205139765",
    appId:"1:331205139765:web:20cfef8194af63fc55c07c"
  };
  if (!firebase.apps.length) firebase.initializeApp(cfg);
  _auth = firebase.auth();
  _db = firebase.firestore();
  _auth.onAuthStateChanged(function(u){ _user = u; });
})();

// ── Constants ─────────────────────────────────────────────────────────────────
var BASE_URL = '/Avatars/characters/';

var LAYER_ORDER = ['bases','neck','hair','eyes','brows','noses','mouths','tops','glasses','hats'];

var CATEGORIES = [
  { id:'skin',    label:'Skin',       icon:'🧑',  colorKey:'bases',    layerKey:'bases'   },
  { id:'hair',    label:'Hair',       icon:'💇',  colorKey:'hair',     layerKey:'hair'    },
  { id:'eyes',    label:'Eyes',       icon:'👁',  colorKey:'eyes',     layerKey:'eyes'    },
  { id:'brows',   label:'Brows',      icon:'🤨',  colorKey:'brows',    layerKey:'brows'   },
  { id:'noses',   label:'Nose',       icon:'👃',  colorKey:null,       layerKey:'noses'   },
  { id:'mouths',  label:'Mouth',      icon:'👄',  colorKey:'mouths',   layerKey:'mouths'  },
  { id:'tops',    label:'Clothes',    icon:'👕',  colorKey:'tops',     layerKey:'tops'    },
  { id:'neck',    label:'Neck',       icon:'📿',  colorKey:'neck',     layerKey:'neck'    },
  { id:'glasses', label:'Glasses',    icon:'🕶',  colorKey:'glasses',  layerKey:'glasses' },
  { id:'hats',    label:'Hats',       icon:'🎩',  colorKey:'hats',     layerKey:'hats'    },
  { id:'bg',      label:'Background', icon:'🎨',  colorKey:'bg',       layerKey:null      },
];

// Sections that allow "none" selection
var OPTIONAL = ['neck','glasses','hats','brows','noses'];
// Sections with no color (noses has no colorable green pixels worth exposing)
var NO_COLOR = ['noses','brows'];

var COLOR_PALETTE = [
  // Skin tones
  '#FDBCB4','#F4C2A1','#E8B982','#D1A374','#C19A6B','#A67C5A','#8D5524','#6B4423',
  // Warm
  '#FF4500','#FF6347','#FFA500','#FFD700','#F0E68C','#FFFACD',
  // Cool
  '#87CEEB','#4169E1','#000080','#6A5ACD','#9370DB','#FF69B4','#FF1493',
  // Nature
  '#228B22','#006400','#8FBC8F','#90EE90','#20B2AA','#008B8B',
  // Neutral
  '#FFFFFF','#F5F5F5','#D3D3D3','#A9A9A9','#808080','#696969','#404040','#1C1C1C','#000000',
  // Rich
  '#8B0000','#A52A2A','#B8860B','#DAA520','#CD853F','#8B4513',
  // Bright
  '#FF00FF','#FF007F','#00FFFF','#00FF7F','#7FFF00','#FF7F00',
];

var BG_PALETTE = [
  '#0474fc','#3a7df2','#6d4aed','#e8443a','#3fba4f','#e8a817','#e87d1a','#e8557a',
  '#00bcd4','#009688','#4caf50','#8bc34a','#cddc39','#ffeb3b','#ff9800','#ff5722',
  '#795548','#607d8b','#9e9e9e','#1b2d5b','#151f3e','#243a6e','#2f4a88',
  '#FF9A9E','#FECFEF','#667eea','#764ba2','#f093fb','#4facfe','#43e97b','#fa709a',
];

// ── State ─────────────────────────────────────────────────────────────────────
var manifest = {};
var currentCat = 'skin';
var state = {
  parts: {
    bases: 'base.png',
    neck: '',
    hair: '1.png',
    eyes: 'BasicMale.png',
    brows: 'Basic.png',
    noses: 'basic.png',
    mouths: 'Basic.png',
    tops: '16.png',
    glasses: '',
    hats: '',
  },
  colors: {
    bases: '#E8B982',
    neck: '#C0C0C0',
    hair: '#8B4513',
    eyes: '#4169E1',
    brows: '#8B4513',
    mouths: '#CC6666',
    tops: '#3a7df2',
    glasses: '#1C1C1C',
    hats: '#e8443a',
    bg: '#1b2d5b',
  }
};

// Image cache
var imgCache = {};
function loadImg(src) {
  if (imgCache[src]) return Promise.resolve(imgCache[src]);
  return new Promise(function(res) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() { imgCache[src] = img; res(img); };
    img.onerror = function() { res(null); };
    img.src = src;
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    var r = await fetch('/Avatars/manifest.json');
    manifest = await r.json();
  } catch(e) {
    showToast('Could not load manifest', true);
    return;
  }

  // Load saved config from Firestore if user is logged in
  await loadSavedConfig();

  buildCategoryTabs();
  renderPreview();
  switchCategory('skin');
}

async function loadSavedConfig() {
  if (!_db) return;
  // Wait briefly for auth
  await new Promise(function(res){ setTimeout(res, 600); });
  if (!_user && _auth) _user = _auth.currentUser;
  if (!_user) return;
  try {
    var snap = await _db.collection('users').doc(_user.uid).get();
    if (snap.exists) {
      var d = snap.data();
      if (d.avatarConfig) {
        if (d.avatarConfig.parts) Object.assign(state.parts, d.avatarConfig.parts);
        if (d.avatarConfig.colors) Object.assign(state.colors, d.avatarConfig.colors);
      }
    }
  } catch(e) { console.warn('load config error:', e); }
}

// ── Category Tabs ─────────────────────────────────────────────────────────────
function buildCategoryTabs() {
  var el = document.getElementById('cat-scroll');
  el.innerHTML = CATEGORIES.map(function(c) {
    return '<div class="cat-tab" id="tab-'+c.id+'" onclick="switchCategory(\''+c.id+'\')">' +
      '<span class="cat-tab-icon">'+c.icon+'</span>' +
      '<span class="cat-tab-label">'+c.label+'</span>' +
    '</div>';
  }).join('');
}

function switchCategory(id) {
  currentCat = id;
  // Update tabs
  document.querySelectorAll('.cat-tab').forEach(function(t){ t.classList.remove('active'); });
  var tab = document.getElementById('tab-'+id);
  if (tab) { tab.classList.add('active'); tab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }

  var cat = CATEGORIES.find(function(c){ return c.id === id; });
  if (!cat) return;

  // Color strip
  var stripWrap = document.getElementById('color-strip-wrap');
  var stripLabel = document.getElementById('color-strip-label');
  if (cat.colorKey && NO_COLOR.indexOf(id) === -1) {
    stripWrap.classList.add('show');
    stripLabel.textContent = cat.label + ' Color';
    buildColorStrip(cat.colorKey, id === 'bg' ? BG_PALETTE : COLOR_PALETTE);
  } else {
    stripWrap.classList.remove('show');
  }

  buildItemsGrid(id);
}

function buildColorStrip(colorKey, palette) {
  var current = state.colors[colorKey] || '#000000';
  var el = document.getElementById('color-strip');
  el.innerHTML = palette.map(function(c) {
    var border = c.toLowerCase() === '#ffffff' ? 'border:2px solid #666;' : '';
    return '<div class="color-dot'+(c.toLowerCase()===current.toLowerCase()?' active':'')+'" '+
      'style="background:'+c+';'+border+'" onclick="pickColor(\''+colorKey+'\',\''+c+'\')"></div>';
  }).join('');
}

function pickColor(colorKey, color) {
  state.colors[colorKey] = color;
  // Refresh color strip selection
  var cat = CATEGORIES.find(function(c){ return c.colorKey === colorKey; });
  if (cat) buildColorStrip(colorKey, currentCat === 'bg' ? BG_PALETTE : COLOR_PALETTE);
  // Re-render preview and items (to show updated color on previews)
  renderPreview();
  // Refresh item previews for current category
  var catObj = CATEGORIES.find(function(c){ return c.id === currentCat; });
  if (catObj && catObj.colorKey === colorKey) {
    buildItemsGrid(currentCat);
  }
}

// ── Items Grid ────────────────────────────────────────────────────────────────
function buildItemsGrid(catId) {
  var cat = CATEGORIES.find(function(c){ return c.id === catId; });
  if (!cat) return;
  var grid = document.getElementById('items-grid');

  // Background is color-only
  if (catId === 'bg') {
    grid.innerHTML = '<div style="color:var(--dim);font-size:13px;font-weight:700;text-align:center;padding:20px;grid-column:1/-1">Pick a background color above</div>';
    return;
  }

  var layerKey = cat.layerKey;
  var items = manifest[layerKey] ? manifest[layerKey].filter(function(f){ return f.indexOf('overlay') === -1; }) : [];
  var currentPart = state.parts[layerKey] || '';
  var colorKey = cat.colorKey;
  var currentColor = colorKey ? (state.colors[colorKey] || '#888888') : null;

  var html = '';

  // "None" option for optional categories
  if (OPTIONAL.indexOf(catId) !== -1) {
    html += '<div class="item-card'+(currentPart===''?' active':'')+'" onclick="selectPart(\''+layerKey+'\',\'\')">' +
      '<div class="item-card-none">None</div>' +
      '<div class="item-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>' +
    '</div>';
  }

  // Item cards — rendered as canvases
  items.forEach(function(item) {
    var canvasId = 'ic-'+layerKey+'-'+item.replace(/[^a-zA-Z0-9]/g,'_');
    html += '<div class="item-card'+(currentPart===item?' active':'')+'" '+
      'id="icard-'+canvasId+'" onclick="selectPart(\''+layerKey+'\',\''+item+'\')">' +
      '<canvas id="'+canvasId+'" width="60" height="60"></canvas>' +
      '<div class="item-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>' +
    '</div>';
  });

  grid.innerHTML = html;

  // Draw each item canvas async
  items.forEach(function(item) {
    var canvasId = 'ic-'+layerKey+'-'+item.replace(/[^a-zA-Z0-9]/g,'_');
    drawItemPreview(canvasId, layerKey, item, currentColor);
  });
}

async function drawItemPreview(canvasId, layerKey, item, color) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 60, 60);

  // Base layer with color replacement
  var src = BASE_URL + layerKey + '/' + item;
  var img = await loadImg(src);
  if (!img) return;

  if (color) {
    drawWithColorReplace(ctx, img, 60, 60, color);
  } else {
    ctx.drawImage(img, 0, 0, 60, 60);
  }

  // Overlay
  var overlayFile = item.replace('.png', 'overlay.png');
  var overlayImg = await loadImg(BASE_URL + layerKey + '/' + overlayFile);
  if (overlayImg) ctx.drawImage(overlayImg, 0, 0, 60, 60);
}

// ── Part Selection ────────────────────────────────────────────────────────────
function selectPart(layerKey, item) {
  state.parts[layerKey] = item;
  // Update active state in grid
  var catId = currentCat;
  document.querySelectorAll('#items-grid .item-card').forEach(function(c){ c.classList.remove('active'); });
  var cat = CATEGORIES.find(function(c){ return c.id === catId; });
  if (cat) {
    var canvasId = item ? 'icard-ic-'+layerKey+'-'+item.replace(/[^a-zA-Z0-9]/g,'_') : null;
    // find by onclick
    document.querySelectorAll('#items-grid .item-card').forEach(function(c){
      if (c.getAttribute('onclick') === "selectPart('"+layerKey+"','"+item+"')") c.classList.add('active');
    });
  }
  renderPreview();
}

// ── Color Replace (green → chosen color) ─────────────────────────────────────
function drawWithColorReplace(ctx, img, w, h, hexColor) {
  // Draw to temp canvas
  var tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  var tc = tmp.getContext('2d');
  tc.drawImage(img, 0, 0, w, h);
  var data = tc.getImageData(0, 0, w, h);
  var px = data.data;

  var tr = parseInt(hexColor.slice(1,3), 16);
  var tg = parseInt(hexColor.slice(3,5), 16);
  var tb = parseInt(hexColor.slice(5,7), 16);

  for (var i = 0; i < px.length; i += 4) {
    if (px[i+3] < 30) continue; // skip transparent
    var r = px[i], g = px[i+1], b = px[i+2];
    // Green dominant: g > 200, g > r+50, g > b+50
    if (g > 180 && g > r + 40 && g > b + 40) {
      px[i]   = tr;
      px[i+1] = tg;
      px[i+2] = tb;
    }
  }
  tc.putImageData(data, 0, 0);
  ctx.drawImage(tmp, 0, 0);
}

// ── Render Preview ────────────────────────────────────────────────────────────
async function renderPreview() {
  var canvas = document.getElementById('preview-canvas');
  var ctx = canvas.getContext('2d');
  var S = 280;
  ctx.clearRect(0, 0, S, S);

  // Background color
  ctx.fillStyle = state.colors.bg || '#1b2d5b';
  ctx.fillRect(0, 0, S, S);

  // Draw each layer in order
  for (var i = 0; i < LAYER_ORDER.length; i++) {
    var layerKey = LAYER_ORDER[i];
    var part = state.parts[layerKey];
    if (!part) continue;

    // Find color for this layer
    var colorKey = null;
    var cat = CATEGORIES.find(function(c){ return c.layerKey === layerKey; });
    if (cat) colorKey = cat.colorKey;
    var color = colorKey ? state.colors[colorKey] : null;

    var src = BASE_URL + layerKey + '/' + part;
    var img = await loadImg(src);
    if (img) {
      if (color && NO_COLOR.indexOf(layerKey) === -1) {
        drawWithColorReplace(ctx, img, S, S, color);
      } else {
        ctx.drawImage(img, 0, 0, S, S);
      }
    }

    // Overlay
    var overlayFile = part.replace('.png', 'overlay.png');
    var overlayImg = await loadImg(BASE_URL + layerKey + '/' + overlayFile);
    if (overlayImg) ctx.drawImage(overlayImg, 0, 0, S, S);
  }
}

// ── Bake Full-Res Image ───────────────────────────────────────────────────────
async function bakeAvatar(size) {
  size = size || 400;
  var canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  var ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = state.colors.bg || '#1b2d5b';
  ctx.fillRect(0, 0, size, size);

  for (var i = 0; i < LAYER_ORDER.length; i++) {
    var layerKey = LAYER_ORDER[i];
    var part = state.parts[layerKey];
    if (!part) continue;

    var cat = CATEGORIES.find(function(c){ return c.layerKey === layerKey; });
    var colorKey = cat ? cat.colorKey : null;
    var color = colorKey ? state.colors[colorKey] : null;

    var img = await loadImg(BASE_URL + layerKey + '/' + part);
    if (img) {
      if (color && NO_COLOR.indexOf(layerKey) === -1) {
        drawWithColorReplace(ctx, img, size, size, color);
      } else {
        ctx.drawImage(img, 0, 0, size, size);
      }
    }
    var overlayImg = await loadImg(BASE_URL + layerKey + '/' + part.replace('.png','overlay.png'));
    if (overlayImg) ctx.drawImage(overlayImg, 0, 0, size, size);
  }

  // Return as WebP base64 (quality 0.88)
  return canvas.toDataURL('image/webp', 0.88);
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveAvatar() {
  if (!_db) { showToast('Not connected to Firebase', true); return; }
  if (!_user && _auth) _user = _auth.currentUser;
  if (!_user) { showToast('Please sign in first', true); return; }

  document.getElementById('saving-overlay').classList.add('show');
  document.getElementById('save-btn').disabled = true;

  try {
    // Bake at 400px
    var bakedImg = await bakeAvatar(400);

    var config = {
      parts: Object.assign({}, state.parts),
      colors: Object.assign({}, state.colors),
    };

    await _db.collection('users').doc(_user.uid).set({
      avatarConfig: config,
      avatarIMG: bakedImg,
      lastSeen: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    showToast('Avatar saved! ✓');

    // Tell parent to refresh
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'avatarSaved', avatarIMG: bakedImg }, '*');
    }

    setTimeout(function(){ closeEditor(); }, 800);

  } catch(e) {
    console.error('save error:', e);
    showToast('Save failed: ' + e.message, true);
  } finally {
    document.getElementById('saving-overlay').classList.remove('show');
    document.getElementById('save-btn').disabled = false;
  }
}

function closeEditor() {
  if (window.parent !== window) {
    window.parent.postMessage({ type: 'avatarEditorClose' }, '*');
  } else {
    history.back();
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
var _toastTimer = null;
function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
