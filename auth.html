<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>BrainDeer</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#3a2918;--card:#4a3625;--card2:#5a4232;
      --cream:#f0e2cc;--tan:#c2a476;--mid:#6b4f32;--light:#8f6b4a;
      --green:#58cc02;--greend:#46a302;
      --red:#ea2b2b;--redd:#c42020;
      --gold:#ffc800;--blue:#1cb0f6
    }

    body{
      background:var(--bg);
      min-height:100dvh;
      font-family:'Nunito',sans-serif;
      color:var(--cream);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:24px 20px;
      overflow-y:auto;
    }

    /* ── Logo ── */
    .logo{
      text-align:center;margin-bottom:24px;
      animation:fadeUp .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    .mascot{font-size:64px;line-height:1;margin-bottom:4px;display:block;filter:drop-shadow(0 4px 0 rgba(0,0,0,.25))}
    .logo-name{font-size:32px;font-weight:900;text-shadow:0 3px 0 rgba(0,0,0,.2)}
    .logo-tag{font-size:14px;font-weight:700;color:var(--tan);margin-top:2px}

    /* ── Card ── */
    .card{
      background:var(--card);border-radius:24px;
      padding:24px 20px;width:100%;max-width:380px;
      box-shadow:0 8px 0 rgba(0,0,0,.18);
      animation:fadeUp .5s .08s cubic-bezier(.34,1.56,.64,1) both;
      position:relative;overflow:hidden;
    }
    .card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:50%;
      background:linear-gradient(180deg,rgba(255,255,255,.04)0%,transparent 100%);
      border-radius:24px 24px 0 0;pointer-events:none;
    }

    /* ── Tabs ── */
    .tabs{
      display:grid;grid-template-columns:1fr 1fr;
      background:var(--bg);border-radius:16px;padding:4px;margin-bottom:20px;
    }
    .tab{
      padding:11px;text-align:center;font-size:15px;font-weight:800;
      color:var(--tan);border-radius:13px;cursor:pointer;
      transition:all .2s;user-select:none;
    }
    .tab.active{background:var(--mid);color:var(--cream);box-shadow:0 3px 0 rgba(0,0,0,.15)}

    /* ── Banner ── */
    .banner{
      padding:12px 14px;border-radius:12px;font-size:14px;font-weight:700;
      margin-bottom:14px;display:none;
    }
    .banner.error{background:var(--red);color:#fff;display:block;box-shadow:0 3px 0 var(--redd)}
    .banner.success{background:var(--green);color:#fff;display:block;box-shadow:0 3px 0 var(--greend)}

    /* ── Google button ── */
    .btn-google{
      width:100%;padding:14px 16px;border:none;border-radius:14px;
      background:var(--card2);color:var(--cream);
      font-size:16px;font-weight:700;font-family:'Nunito',sans-serif;
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
      box-shadow:0 4px 0 rgba(0,0,0,.18);
      transition:transform .1s,box-shadow .1s;
      margin-bottom:16px;position:relative;
    }
    .btn-google:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.18)}
    .btn-google:disabled{opacity:.5;pointer-events:none}
    .g-logo{width:20px;height:20px;flex-shrink:0}

    /* ── Divider ── */
    .divider{
      display:flex;align-items:center;gap:10px;
      margin:0 0 16px;color:var(--light);font-size:13px;font-weight:700;
    }
    .divider::before,.divider::after{content:'';flex:1;height:2px;background:var(--mid);border-radius:1px}

    /* ── Form ── */
    .form-group{margin-bottom:14px}
    label{display:block;font-size:13px;font-weight:800;color:var(--tan);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
    input{
      width:100%;padding:14px 16px;border:none;border-radius:14px;
      background:var(--bg);font-size:16px;font-weight:700;
      color:var(--cream);font-family:'Nunito',sans-serif;outline:none;
      transition:box-shadow .2s;-webkit-appearance:none;
    }
    input:focus{box-shadow:0 0 0 3px var(--light)}
    input::placeholder{color:var(--light);font-weight:600}

    /* ── Strength bar ── */
    #str-bar{height:4px;border-radius:2px;margin-top:6px;background:var(--mid);overflow:hidden;display:none}
    #str-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}

    /* ── Submit button ── */
    .btn-submit{
      width:100%;padding:15px;border:none;border-radius:14px;
      background:var(--green);color:#fff;
      font-size:16px;font-weight:900;font-family:'Nunito',sans-serif;
      text-transform:uppercase;letter-spacing:.5px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
      box-shadow:0 5px 0 var(--greend);
      transition:transform .1s,box-shadow .1s;
      position:relative;margin-top:4px;
    }
    .btn-submit:active{transform:translateY(4px);box-shadow:0 1px 0 var(--greend)}
    .btn-submit:disabled{opacity:.5;pointer-events:none}

    /* ── Spinner ── */
    .spinner{
      width:20px;height:20px;border:3px solid transparent;
      border-top-color:currentColor;border-radius:50%;
      animation:spin .6s linear infinite;display:none;
    }
    .loading .spinner{display:block}
    .loading .btn-text{display:none}

    /* ── Hint text under card ── */
    .hint{
      margin-top:18px;text-align:center;
      font-size:12px;font-weight:600;color:var(--light);line-height:1.6;
      background:var(--card);padding:12px 20px;border-radius:14px;
      box-shadow:0 3px 0 rgba(0,0,0,.1);
      animation:fadeUp .5s .16s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(14px) scale(.97)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div class="logo">
  <span class="mascot">🦌</span>
  <div class="logo-name">BrainDeer</div>
  <div class="logo-tag">Train your brain daily</div>
</div>

<div class="card">
  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <!-- Error/success banner -->
  <div class="banner" id="banner"></div>

  <!-- Google -->
  <button class="btn-google" id="btn-google" onclick="signInWithGoogle()">
    <svg class="g-logo" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    <span class="btn-text">Continue with Google</span>
    <div class="spinner"></div>
  </button>

  <div class="divider">or</div>

  <!-- Email/password form -->
  <form id="auth-form" onsubmit="handleSubmit(event)">
    <!-- Username — signup only -->
    <div class="form-group" id="field-username" style="display:none">
      <label>Username</label>
      <input type="text" id="input-username" placeholder="Your display name" autocomplete="username" maxlength="24">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="input-email" placeholder="you@example.com" autocomplete="email" required inputmode="email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password" required oninput="checkStrength(this.value)">
      <div id="str-bar"><div id="str-fill"></div></div>
    </div>

    <button type="submit" class="btn-submit" id="btn-submit">
      <span class="btn-text" id="submit-label">Sign In</span>
      <div class="spinner"></div>
    </button>
  </form>
</div>

<div class="hint">By continuing you agree to our terms.<br>Your progress syncs across all your devices.</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth, onAuthStateChanged,
    signInWithPopup, signInWithRedirect, getRedirectResult,
    GoogleAuthProvider,
    createUserWithEmailAndPassword, signInWithEmailAndPassword,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const cfg = {
    apiKey: "AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",
    authDomain: "braindeer-backend.firebaseapp.com",
    projectId: "braindeer-backend",
    storageBucket: "braindeer-backend.firebasestorage.app",
    messagingSenderId: "331205139765",
    appId: "1:331205139765:web:20cfef8194af63fc55c07c"
  };

  const app  = initializeApp(cfg);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const gp   = new GoogleAuthProvider();

  // Detect PWA / iOS standalone environment — use redirect instead of popup
  const isPWA = window.matchMedia('(display-mode: standalone)').matches
             || (navigator.standalone === true)
             || window.location.search.includes('pwa=1');

  // ── Handle redirect result on page load (PWA Google sign-in) ──
  getRedirectResult(auth).then(async result => {
    if (result && result.user) {
      await ensure(result.user);
      navigate();
    }
  }).catch(e => {
    if (e.code !== 'auth/popup-closed-by-user') showErr(fe(e.code));
  });

  // ── Already signed in? ──
  onAuthStateChanged(auth, u => {
    if (u) navigate();
  });

  function navigate() {
    if (window.parent && window.parent !== window && typeof window.parent.goTo === 'function') {
      window.parent.goTo('improve');
    } else {
      window.location.href = 'improve.html';
    }
  }

  let mode = 'login';

  window.switchTab = function(m) {
    mode = m;
    document.getElementById('tab-login').classList.toggle('active', m === 'login');
    document.getElementById('tab-signup').classList.toggle('active', m === 'signup');
    document.getElementById('field-username').style.display = m === 'signup' ? 'block' : 'none';
    document.getElementById('submit-label').textContent = m === 'login' ? 'Sign In' : 'Create Account';
    document.getElementById('input-password').autocomplete = m === 'signup' ? 'new-password' : 'current-password';
    document.getElementById('str-bar').style.display = m === 'signup' ? 'block' : 'none';
    clr();
  };

  function showErr(msg) {
    const b = document.getElementById('banner');
    b.textContent = msg;
    b.className = 'banner error';
  }
  function showOk(msg) {
    const b = document.getElementById('banner');
    b.textContent = msg;
    b.className = 'banner success';
  }
  function clr() {
    document.getElementById('banner').className = 'banner';
  }

  function setLoading(id, on) {
    const b = document.getElementById(id);
    b.classList.toggle('loading', on);
    b.disabled = on;
  }

  window.checkStrength = function(v) {
    if (mode !== 'signup') return;
    const f = document.getElementById('str-fill');
    let s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    f.style.width  = ['0%','30%','55%','80%','100%'][s];
    f.style.background = ['#6b4f32','#ea2b2b','#ff9600','#ffc800','#58cc02'][s];
  };

  async function ensure(u, extra = {}) {
    const ref = doc(db, 'users', u.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        uid: u.uid,
        email: u.email,
        username: extra.username || u.displayName || null,
        pic: u.photoURL || null,
        createdAt: serverTimestamp(),
        lastSeen: serverTimestamp()
      });
    } else {
      // update lastSeen without await — don't block navigation
      setDoc(ref, { lastSeen: serverTimestamp() }, { merge: true });
    }
  }

  // ── Google sign-in ──
  // Uses redirect on PWA/iOS (no popup blocker issues), popup elsewhere
  window.signInWithGoogle = async function() {
    clr();
    setLoading('btn-google', true);
    try {
      if (isPWA) {
        // redirect flow — page will reload, handled by getRedirectResult above
        await signInWithRedirect(auth, gp);
      } else {
        const result = await signInWithPopup(auth, gp);
        await ensure(result.user);
        navigate();
      }
    } catch (e) {
      setLoading('btn-google', false);
      if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request') {
        showErr(fe(e.code));
      }
    }
  };

  // ── Email/password submit ──
  window.handleSubmit = async function(e) {
    e.preventDefault();
    clr();

    const email = document.getElementById('input-email').value.trim();
    const pw    = document.getElementById('input-password').value;
    const un    = document.getElementById('input-username').value.trim();

    if (mode === 'signup' && pw.length < 6) {
      showErr('Password must be at least 6 characters.');
      return;
    }

    setLoading('btn-submit', true);

    try {
      if (mode === 'login') {
        const c = await signInWithEmailAndPassword(auth, email, pw);
        await ensure(c.user);
      } else {
        const c = await createUserWithEmailAndPassword(auth, email, pw);
        if (un) await updateProfile(c.user, { displayName: un });
        await ensure(c.user, { username: un });
      }
      navigate();
    } catch (e) {
      setLoading('btn-submit', false);
      showErr(fe(e.code));
    }
  };

  function fe(c) {
    return {
      'auth/user-not-found':       'No account with that email.',
      'auth/wrong-password':       'Incorrect password.',
      'auth/email-already-in-use': 'Email already registered.',
      'auth/invalid-email':        'Invalid email address.',
      'auth/weak-password':        'Password too weak — try adding numbers or symbols.',
      'auth/too-many-requests':    'Too many attempts. Please try again later.',
      'auth/network-request-failed':'No internet connection.',
      'auth/invalid-credential':   'Email or password is incorrect.',
      'auth/popup-blocked':        'Popup blocked. Trying redirect instead…',
    }[c] || 'Something went wrong. Please try again.';
  }
</script>

</body>
</html>
