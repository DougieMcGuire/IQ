<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BrainDeer – Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#3a2918;--card:#4a3625;--card2:#5a4232;
      --cream:#f0e2cc;--tan:#c2a476;--mid:#6b4f32;--light:#8f6b4a;
      --green:#58cc02;--greend:#46a302;
      --red:#ea2b2b;--redd:#c42020;
    }
    html,body{height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--cream)}
    body{
      min-height:100dvh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:env(safe-area-inset-top,20px) 20px env(safe-area-inset-bottom,20px);
    }
    .logo{text-align:center;margin-bottom:24px;animation:fadeUp .4s cubic-bezier(.34,1.56,.64,1) both}
    .mascot{font-size:64px;display:block;filter:drop-shadow(0 4px 0 rgba(0,0,0,.25))}
    .logo-name{font-size:30px;font-weight:900;text-shadow:0 3px 0 rgba(0,0,0,.2);margin-top:4px}
    .logo-tag{font-size:13px;font-weight:700;color:var(--tan);margin-top:2px}

    .card{
      background:var(--card);border-radius:24px;padding:26px 22px;
      width:100%;max-width:360px;box-shadow:0 8px 0 rgba(0,0,0,.18);
      animation:fadeUp .4s .07s cubic-bezier(.34,1.56,.64,1) both;
      position:relative;overflow:hidden;
    }
    .card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:50%;
      background:linear-gradient(180deg,rgba(255,255,255,.05) 0%,transparent 100%);
      border-radius:24px 24px 0 0;pointer-events:none;
    }

    .panel{display:none}.panel.active{display:block}
    .panel-title{font-size:17px;font-weight:900;text-align:center;margin-bottom:6px}
    .panel-sub{font-size:13px;font-weight:600;color:var(--tan);text-align:center;margin-bottom:22px;line-height:1.55}

    .btn-google{
      width:100%;padding:15px 16px;border:none;border-radius:14px;
      background:var(--card2);color:var(--cream);
      font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
      box-shadow:0 5px 0 rgba(0,0,0,.22);transition:transform .12s,box-shadow .12s;
    }
    .btn-google:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.22)}
    .btn-google:disabled{opacity:.5;pointer-events:none}
    .g-logo{width:20px;height:20px;flex-shrink:0}
    .btn-spinner{
      width:20px;height:20px;border:3px solid transparent;
      border-top-color:var(--cream);border-radius:50%;
      animation:spin .6s linear infinite;display:none;flex-shrink:0;
    }
    .btn-google.loading .btn-spinner{display:block}
    .btn-google.loading .g-logo,.btn-google.loading .btn-label{display:none}

    .success-icon{font-size:52px;text-align:center;margin-bottom:10px;animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
    .success-title{font-size:18px;font-weight:900;text-align:center;margin-bottom:6px}
    .success-sub{font-size:13px;font-weight:600;color:var(--tan);text-align:center;margin-bottom:20px;line-height:1.55}

    .user-pill{
      display:flex;align-items:center;gap:12px;
      background:var(--bg);border-radius:14px;padding:12px 14px;margin-bottom:18px;
    }
    .user-avatar{
      width:40px;height:40px;border-radius:50%;background:var(--mid);
      display:flex;align-items:center;justify-content:center;
      font-size:18px;font-weight:900;flex-shrink:0;overflow:hidden;
    }
    .user-avatar img{width:100%;height:100%;object-fit:cover}
    .user-name{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-email{font-size:12px;font-weight:600;color:var(--tan);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .btn-open{
      width:100%;padding:15px;border:none;border-radius:14px;
      background:var(--green);color:#fff;
      font-size:16px;font-weight:900;font-family:'Nunito',sans-serif;
      text-transform:uppercase;letter-spacing:.5px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
      box-shadow:0 5px 0 var(--greend);transition:transform .12s,box-shadow .12s;
      margin-bottom:10px;
    }
    .btn-open:active{transform:translateY(4px);box-shadow:0 1px 0 var(--greend)}
    .countdown{text-align:center;font-size:12px;font-weight:700;color:var(--light)}
    .not-you{text-align:center;font-size:12px;font-weight:700;color:var(--light);cursor:pointer;margin-top:14px}
    .not-you:active{color:var(--tan)}

    .banner{
      border-radius:12px;font-size:13px;font-weight:700;
      margin-bottom:16px;padding:12px 14px;
      background:var(--red);color:#fff;box-shadow:0 3px 0 var(--redd);display:none;
    }
    .banner.show{display:block}

    @keyframes fadeUp{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  </style>
</head>
<body>

<div class="logo">
  <span class="mascot">🦌</span>
  <div class="logo-name">BrainDeer</div>
  <div class="logo-tag">Train your brain daily</div>
</div>

<div class="card">
  <div class="panel active" id="panel-signin">
    <div class="panel-title">Sign in with Google</div>
    <div class="panel-sub">One tap — you'll be sent straight back into the app.</div>
    <div class="banner" id="banner"></div>
    <button class="btn-google" id="btn-google" onclick="doGoogle()">
      <svg class="g-logo" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span class="btn-label">Continue with Google</span>
      <div class="btn-spinner"></div>
    </button>
  </div>

  <div class="panel" id="panel-success">
    <div class="success-icon">✅</div>
    <div class="success-title">Signed in!</div>
    <div class="success-sub">Tap below to open BrainDeer.<br>You'll be logged in automatically.</div>
    <div class="user-pill">
      <div class="user-avatar" id="user-avatar"></div>
      <div class="user-info">
        <div class="user-name" id="user-name"></div>
        <div class="user-email" id="user-email"></div>
      </div>
    </div>
    <button class="btn-open" onclick="openApp()">🦌 Open BrainDeer</button>
    <div class="countdown" id="countdown"></div>
    <div class="not-you" onclick="notYou()">Not you? Switch account</div>
  </div>
</div>

<script type="module">
  import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const cfg = {
    apiKey:            "AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",
    authDomain:        "braindeer-backend.firebaseapp.com",
    projectId:         "braindeer-backend",
    storageBucket:     "braindeer-backend.firebasestorage.app",
    messagingSenderId: "331205139765",
    appId:             "1:331205139765:web:20cfef8194af63fc55c07c"
  };

  const app  = initializeApp(cfg);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const gp   = new GoogleAuthProvider();

  let autoTimer = null;

  // Already signed in? Skip straight to success
  onAuthStateChanged(auth, async u => {
    if (u) {
      const token = await u.getIdToken(true);
      await showSuccess(u, token);
    }
  });

  window.doGoogle = async function() {
    const btn = document.getElementById('btn-google');
    btn.classList.add('loading');
    btn.disabled = true;
    clrErr();
    try {
      const result = await signInWithPopup(auth, gp);
      const token  = await result.user.getIdToken();
      await showSuccess(result.user, token);
    } catch(e) {
      btn.classList.remove('loading');
      btn.disabled = false;
      if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request') {
        showErr(fe(e.code));
      }
    }
  };

  async function showSuccess(user, idToken) {
    // Populate pill
    const av = document.getElementById('user-avatar');
    av.innerHTML = user.photoURL
      ? `<img src="${user.photoURL}" alt="">`
      : (user.displayName || user.email || '?')[0].toUpperCase();
    document.getElementById('user-name').textContent  = user.displayName || 'User';
    document.getElementById('user-email').textContent = user.email || '';

    // Write session doc to Firestore — just the idToken, uid, TTL
    const sessionId = crypto.randomUUID();
    await setDoc(doc(db, 'authSessions', sessionId), {
      idToken,
      uid:       user.uid,
      createdAt: serverTimestamp(),
      expiresAt: new Date(Date.now() + 5 * 60 * 1000),
      used:      false
    });
    window._sessionId = sessionId;

    // Flip to success panel
    document.getElementById('panel-signin').classList.remove('active');
    document.getElementById('panel-success').classList.add('active');

    // Auto-open countdown
    let secs = 4;
    const cd = document.getElementById('countdown');
    cd.textContent = `Opening in ${secs}s…`;
    autoTimer = setInterval(() => {
      secs--;
      if (secs <= 0) { clearInterval(autoTimer); cd.textContent = ''; openApp(); }
      else cd.textContent = `Opening in ${secs}s…`;
    }, 1000);
  }

  window.openApp = function() {
    if (autoTimer) { clearInterval(autoTimer); document.getElementById('countdown').textContent = ''; }
    window.location.href = `https://braindeer.org/app.html?session=${window._sessionId}`;
  };

  window.notYou = async function() {
    if (autoTimer) clearInterval(autoTimer);
    window._sessionId = null;
    await signOut(auth);
    document.getElementById('panel-success').classList.remove('active');
    document.getElementById('panel-signin').classList.add('active');
    clrErr();
  };

  function showErr(msg) { const b = document.getElementById('banner'); b.textContent = msg; b.classList.add('show'); }
  function clrErr()     { document.getElementById('banner').classList.remove('show'); }
  function fe(c) {
    return {
      'auth/network-request-failed': 'No internet connection.',
      'auth/too-many-requests':      'Too many attempts. Please wait.',
      'auth/user-disabled':          'This account has been disabled.',
    }[c] || 'Something went wrong. Please try again.';
  }
</script>
</body>
</html>
