<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BrainDeer — Signing in…</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#3a2918;font-family:'Nunito',sans-serif;color:#f0e2cc;
      min-height:100dvh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;padding:24px;
      text-align:center;
    }
    .mascot{font-size:52px;animation:bob 1.2s ease-in-out infinite}
    .title{font-size:22px;font-weight:900;margin:10px 0 4px}
    .sub{font-size:14px;font-weight:700;color:#c2a476;margin-bottom:24px;line-height:1.5}
    .dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
    .dots span{
      width:8px;height:8px;border-radius:50%;background:#6b4f32;
      animation:dotPulse 1s ease infinite;
    }
    .dots span:nth-child(2){animation-delay:.15s}
    .dots span:nth-child(3){animation-delay:.3s}
    .err{
      background:#ea2b2b;color:#fff;padding:12px 18px;
      border-radius:12px;font-size:14px;font-weight:700;
      max-width:340px;display:none;margin-top:16px;
      box-shadow:0 3px 0 #c42020;
    }
    .err.show{display:block}
    .btn-retry{
      margin-top:14px;padding:12px 28px;border:none;border-radius:12px;
      background:#58cc02;color:#fff;font-size:15px;font-weight:800;
      font-family:'Nunito',sans-serif;cursor:pointer;display:none;
      box-shadow:0 4px 0 #46a302;
    }
    .btn-retry:active{transform:translateY(3px);box-shadow:0 1px 0 #46a302}
    .btn-retry.show{display:inline-block}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes dotPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
  </style>
</head>
<body>

<div class="mascot">🦌</div>
<div class="title">BrainDeer</div>
<div class="sub">Connecting to Google…</div>
<div class="dots"><span></span><span></span><span></span></div>
<div class="err" id="err"></div>
<button class="btn-retry" id="retryBtn" onclick="startAuth()">Try Again</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth, signInWithPopup, GoogleAuthProvider
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const cfg = {
    apiKey:            "AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",
    authDomain:        "braindeer-backend.firebaseapp.com",
    projectId:         "braindeer-backend",
    storageBucket:     "braindeer-backend.firebasestorage.app",
    messagingSenderId: "331205139765",
    appId:             "1:331205139765:web:20cfef8194af63fc55c07c"
  };

  const app  = initializeApp(cfg);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const gp   = new GoogleAuthProvider();

  const params    = new URLSearchParams(window.location.search);
  const sessionId = params.get('session');

  function showError(msg) {
    const el = document.getElementById('err');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('retryBtn').classList.add('show');
    document.querySelector('.dots').style.display = 'none';
    document.querySelector('.sub').textContent = 'Something went wrong';
  }

  if (!sessionId) {
    showError('Missing session — please go back to BrainDeer and try again.');
  }

  window.startAuth = async function() {
    // Reset UI
    document.getElementById('err').classList.remove('show');
    document.getElementById('retryBtn').classList.remove('show');
    document.querySelector('.dots').style.display = 'flex';
    document.querySelector('.sub').textContent = 'Connecting to Google…';

    try {
      // Do Google auth in Safari (where it works)
      const result = await signInWithPopup(auth, gp);

      // Get the Google ID token from the credential
      const credential = GoogleAuthProvider.credentialFromResult(result);
      const idToken = credential.idToken;

      if (!idToken) throw new Error('No ID token received');

      document.querySelector('.sub').textContent = 'Signed in! Returning to app…';

      // Create the session doc with the idToken (doc is created here,
      // not in the PWA, because Firestore fails in iOS standalone WKWebView)
      const sessionRef = doc(db, 'authSessions', sessionId);
      await setDoc(sessionRef, {
        idToken:     idToken,
        createdAt:   serverTimestamp(),
        expiresAt:   new Date(Date.now() + 5 * 60 * 1000),
        used:        false,
        completedAt: serverTimestamp()
      });

      // Sign out of this Safari context so there's no stale auth state
      await auth.signOut();

      // Redirect back to the app — app.html will pick up ?session= and
      // use signInWithCredential to complete the auth in the PWA context
      window.location.href = 'https://braindeer.org/app.html?session=' + sessionId;

    } catch (e) {
      console.error('Bridge auth error:', e);

      if (e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') {
        showError('Sign-in was cancelled. Tap "Try Again" to retry.');
      } else if (e.code === 'auth/network-request-failed') {
        showError('No internet connection. Check your connection and try again.');
      } else {
        showError('Sign-in failed. Tap "Try Again" to retry.');
      }
    }
  };

  // Auto-start auth if we have a session
  if (sessionId) {
    // Small delay so the user sees the loading state
    setTimeout(() => startAuth(), 400);
  }
</script>

</body>
</html>
