<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BrainDeer — Sign in with Google</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#3a2918;font-family:'Nunito',sans-serif;color:#f0e2cc;
      min-height:100dvh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;padding:24px;
      text-align:center;
    }
    .mascot{font-size:52px;animation:bob 1.2s ease-in-out infinite}
    .title{font-size:22px;font-weight:900;margin:10px 0 4px}
    .sub{font-size:14px;font-weight:700;color:#c2a476;margin-bottom:24px;line-height:1.5;max-width:300px}

    .dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
    .dots span{
      width:8px;height:8px;border-radius:50%;background:#6b4f32;
      animation:dotPulse 1s ease infinite;
    }
    .dots span:nth-child(2){animation-delay:.15s}
    .dots span:nth-child(3){animation-delay:.3s}

    .btn-go{
      padding:15px 36px;border:none;border-radius:14px;
      background:#58cc02;color:#fff;font-size:16px;font-weight:900;
      font-family:'Nunito',sans-serif;cursor:pointer;
      box-shadow:0 5px 0 #46a302;
      transition:transform .1s,box-shadow .1s;
      display:none;margin-bottom:16px;
    }
    .btn-go:active{transform:translateY(4px);box-shadow:0 1px 0 #46a302}
    .btn-go.show{display:inline-flex;align-items:center;gap:10px}

    .btn-go svg{width:20px;height:20px;flex-shrink:0}

    .err{
      background:#ea2b2b;color:#fff;padding:12px 18px;
      border-radius:12px;font-size:14px;font-weight:700;
      max-width:340px;display:none;margin-top:16px;
      box-shadow:0 3px 0 #c42020;
    }
    .err.show{display:block}

    .hidden{display:none!important}

    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes dotPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
  </style>
</head>
<body>

<div class="mascot">🦌</div>
<div class="title">BrainDeer</div>
<div class="sub" id="sub">Preparing sign-in…</div>
<div class="dots" id="dots"><span></span><span></span><span></span></div>

<button class="btn-go" id="btnGo" onclick="doRedirect()">
  <svg viewBox="0 0 48 48">
    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
  </svg>
  Continue with Google
</button>

<div class="err" id="err"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const cfg = {
    apiKey:            "AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",
    authDomain:        "braindeer-backend.firebaseapp.com",
    projectId:         "braindeer-backend",
    storageBucket:     "braindeer-backend.firebasestorage.app",
    messagingSenderId: "331205139765",
    appId:             "1:331205139765:web:20cfef8194af63fc55c07c"
  };

  const app  = initializeApp(cfg);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const gp   = new GoogleAuthProvider();

  const params    = new URLSearchParams(window.location.search);
  const sessionId = params.get('session');

  const sub  = document.getElementById('sub');
  const dots = document.getElementById('dots');
  const errEl = document.getElementById('err');
  const btn  = document.getElementById('btnGo');

  function showError(msg) {
    errEl.textContent = msg;
    errEl.classList.add('show');
    dots.classList.add('hidden');
    sub.textContent = 'Something went wrong';
    btn.classList.add('show');
    btn.innerHTML = 'Try Again';
  }

  function showLoading(msg) {
    errEl.classList.remove('show');
    dots.classList.remove('hidden');
    btn.classList.remove('show');
    sub.textContent = msg;
  }

  function showButton(msg) {
    dots.classList.add('hidden');
    sub.textContent = msg;
    btn.classList.add('show');
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  FLOW (iOS standalone PWA → Safari bridge):
  //
  //  1. auth.html detects iOS standalone, redirects here with ?session=ID
  //     (this opens in Safari, escaping the sandboxed WKWebView)
  //  2. We store sessionId in sessionStorage for persistence across redirect
  //  3. User taps "Continue with Google" → signInWithRedirect kicks off
  //  4. Google auth completes, Safari redirects back to this page
  //  5. getRedirectResult() picks up the credential + idToken
  //  6. We write idToken to Firestore authSessions doc
  //  7. Redirect to app.html?session=ID — app.html redeems it
  // ═══════════════════════════════════════════════════════════════════════

  // Store session ID so it survives the Google redirect round-trip
  if (sessionId) {
    sessionStorage.setItem('bd_session', sessionId);
  }
  const activeSession = sessionId || sessionStorage.getItem('bd_session');

  if (!activeSession) {
    showError('Missing session — please go back to BrainDeer and try again.');
  }

  // ── Check if returning from Google redirect ──────────────────────────
  getRedirectResult(auth).then(async (result) => {
    if (!result || !result.user) {
      // First visit — no redirect result yet. Show button.
      if (activeSession) {
        showButton('Tap below to sign in with Google');
      }
      return;
    }

    // ── We have a result! Extract idToken ─────────────────────────────
    showLoading('Signed in! Returning to app…');

    const credential = GoogleAuthProvider.credentialFromResult(result);
    const idToken = credential ? credential.idToken : null;

    if (!idToken) {
      showError('Could not get Google token. Please try again.');
      return;
    }

    const sid = activeSession;
    if (!sid) {
      showError('Session lost. Please go back to BrainDeer and try again.');
      return;
    }

    try {
      // Write the session doc so app.html can redeem it
      const sessionRef = doc(db, 'authSessions', sid);
      await setDoc(sessionRef, {
        idToken:     idToken,
        createdAt:   serverTimestamp(),
        expiresAt:   new Date(Date.now() + 5 * 60 * 1000),
        used:        false,
        completedAt: serverTimestamp()
      });

      // Sign out of Safari so there's no stale auth
      await auth.signOut();
      sessionStorage.removeItem('bd_session');

      // Send user back — app.html picks up ?session= and signs in
      window.location.href = 'https://braindeer.org/app.html?session=' + sid;

    } catch (e) {
      console.error('Firestore write failed:', e);
      showError('Could not complete sign-in. Please try again.');
    }

  }).catch((e) => {
    console.error('getRedirectResult error:', e);
    if (activeSession) {
      showButton('Tap below to sign in with Google');
    }
  });

  // ── Button handler → signInWithRedirect ──────────────────────────────
  window.doRedirect = function() {
    if (!activeSession) {
      showError('Missing session. Go back to BrainDeer and try again.');
      return;
    }
    showLoading('Redirecting to Google…');
    signInWithRedirect(auth, gp).catch((e) => {
      console.error('Redirect failed:', e);
      showError('Could not open Google sign-in. Please try again.');
    });
  };
</script>

</body>
</html>
