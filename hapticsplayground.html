<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Working Haptics Playground</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align:center; margin-top:50px; }
button { font-size:18px; margin:12px; padding:12px 24px; border-radius:8px; border:none; background:#0078ff; color:white; cursor:pointer; }
</style>
</head>
<body>

<h1>Working Haptics Playground</h1>
<button id="lightBtn">Light Tap</button>
<button id="mediumBtn">Medium Tap</button>
<button id="heavyBtn">Heavy Tap</button>

<script>
(function(){
    // Initialize hidden switch for iOS fallback
    const SWITCH_ID = 'hapticSwitch';
    let input = document.getElementById(SWITCH_ID);
    let label = document.querySelector(`label[for="${SWITCH_ID}"]`);
    
    if(!input){
        input = document.createElement('input');
        input.type = 'checkbox';
        input.id = SWITCH_ID;
        input.setAttribute('switch','');
        input.style.display = 'none';
        document.body.appendChild(input);

        label = document.createElement('label');
        label.htmlFor = SWITCH_ID;
        label.style.display = 'none';
        document.body.appendChild(label);
    }

    // Haptic trigger
    function triggerHaptic(duration = 20){
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

        if(isIOS){
            label.click(); // toggles the hidden switch → fires native haptic
        } else if(navigator.vibrate){
            navigator.vibrate(duration);
        }
    }

    // Bind buttons
    document.getElementById('lightBtn').addEventListener('pointerdown', () => triggerHaptic(20));
    document.getElementById('mediumBtn').addEventListener('pointerdown', () => triggerHaptic(50));
    document.getElementById('heavyBtn').addEventListener('pointerdown', () => triggerHaptic(100));
})();
</script>

</body>
</html>
