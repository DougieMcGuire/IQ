<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Haptics Playground</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  text-align:center;
  padding:40px;
}

button{
  padding:15px 25px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<h1>Haptics Playground</h1>
<p>Test vibration patterns</p>

<button onclick="vibrationPattern(0)">2s Vibration</button>
<button onclick="vibrationPattern(1)">Pulse Pattern</button>
<button onclick="vibrationPattern(2)">Twinkle Star</button>
<button onclick="vibrationPattern(3)">Mario</button>
<button onclick="vibrationPattern(4)">Jingle Bells</button>

<script>

let patterns = [
  2000,
  [2000,1000,2000,1000,2000,1000,2000],
  [400,200,400,200,400,200,800,200,800,200,400,200,400,200,200,200],
  [150,50,150,50,300,100,150,50,150,50,300,100,150,50,150,50],
  [300,200,300,200,300,400,300,200,300,200,300,400,300,200,600,200]
];

function vibrationPattern(index){

  if (navigator.vibrate) {

    navigator.vibrate(patterns[index]);

  } else {

    // iOS fallback trick
    let el = document.createElement('div');
    let id = Math.random().toString(36).slice(2);

    el.innerHTML =
      '<input type="checkbox" id="'+id+'" switch />' +
      '<label for="'+id+'"></label>';

    el.style.display = "none";
    document.body.appendChild(el);

    el.querySelector("label").click();

    setTimeout(()=>{
      el.remove();
    },1500);

  }

}

</script>

</body>
</html>
