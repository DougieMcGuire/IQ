<!DOCTYPE html>
<html>
<body style="font-family:sans-serif;background:#111;color:white;text-align:center;padding:40px">

<h2>iOS Haptic Playground</h2>

<button onclick="iosHaptic([0])">Single Tap</button>
<button onclick="iosHaptic([0,120])">Double Tap</button>
<button onclick="iosHaptic([0,120,120])">Triple Tap</button>
<button onclick="iosHaptic([0,80,80,80,80])">Rapid Pattern</button>

<script>

function createSwitch(){
  const id = "haptic_"+Math.random().toString(36).slice(2)

  const el = document.createElement("div")

  el.innerHTML =
    '<input type="checkbox" id="'+id+'" switch />' +
    '<label for="'+id+'"></label>'

  el.style.display="none"

  document.body.appendChild(el)

  return el.querySelector("label")
}

function iosHaptic(pattern){

  const label = createSwitch()

  pattern.forEach((delay,i)=>{

    setTimeout(()=>{
      label.click()
    },delay)

  })

}

</script>

</body>
</html>
