<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Leaderboard — Cebear</title>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f0e8;--card:#fff;--card-border:#e8e2d6;
      --blue:#0474fc;--blue-dark:#0358c4;--blue-light:#e8f2ff;
      --text:#1e293b;--text-dim:#64748b;--text-light:#94a3b8;
      --green:#22c55e;--green-dark:#16a34a;
      --red:#ef4444;--red-dark:#dc2626;
      --gold:#f59e0b;--gold-dark:#d97706;
      --orange:#f97316;--purple:#8b5cf6;
      --shadow-card:0 4px 0 var(--card-border);
      --shadow-blue:0 4px 0 var(--blue-dark);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100dvh;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    body{display:flex;flex-direction:column}

    /* ── HEADER ── */
    .top{
      background:var(--bg);
      padding:calc(env(safe-area-inset-top,20px) + 8px) 16px 0;
      flex-shrink:0;
      border-bottom:3px solid var(--card-border);
    }
    .top-inner{max-width:420px;margin:0 auto}
    .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .hdr-title{font-family:'Chewy',cursive;font-size:24px;letter-spacing:.5px;color:var(--text)}
    .hdr-btns{display:flex;gap:6px}
    .hdr-btn{
      background:var(--card);border:2.5px solid var(--card-border);border-radius:12px;
      padding:7px 12px;color:var(--text-dim);cursor:pointer;
      font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
      display:flex;align-items:center;gap:5px;transition:all .15s;
      box-shadow:0 3px 0 var(--card-border);
    }
    .hdr-btn:active{transform:translateY(3px);box-shadow:none}
    .hdr-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
    .hdr-btn.hid-mode{background:rgba(239,68,68,.06);color:var(--red);border-color:rgba(239,68,68,.25)}

    /* ── FILTERS ── */
    .filters{display:flex;gap:6px;margin-bottom:16px}
    .ftab{
      flex:1;background:var(--card);border:2.5px solid var(--card-border);
      border-radius:14px;padding:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;
      color:var(--text-dim);cursor:pointer;text-align:center;transition:all .2s;
      box-shadow:0 3px 0 var(--card-border);
    }
    .ftab:active{transform:translateY(3px);box-shadow:none}
    .ftab[data-sort="iq"].active{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 4px 0 #7c3aed}
    .ftab[data-sort="bestStreak"].active{background:var(--gold);color:#fff;border-color:var(--gold);box-shadow:0 4px 0 var(--gold-dark)}
    .ftab[data-sort="level"].active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:var(--shadow-blue)}

    /* ── PODIUM ── */
    .podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;padding:8px 8px 20px;max-width:380px;margin:0 auto}
    .pod{flex:1;display:flex;flex-direction:column;align-items:center;max-width:120px}
    .pod.r1{order:2}.pod.r2{order:1}.pod.r3{order:3}

    .pod-av-wrap{position:relative;z-index:2;margin-bottom:-20px}
    .pod.r1 .pod-av-wrap{margin-bottom:-26px}
    .pod-av{
      width:48px;height:48px;border-radius:50%;background:#f1f5f9;overflow:hidden;
      display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;
      color:var(--text-dim);border:3px solid var(--card-border);
      box-shadow:0 3px 0 var(--card-border);
    }
    .pod.r1 .pod-av{width:60px;height:60px;border:4px solid var(--gold);box-shadow:0 4px 0 var(--gold-dark)}
    .pod-av img{width:100%;height:100%;object-fit:cover;display:none}
    .pod-av.has-pic img{display:block}.pod-av.has-pic .av-txt{display:none}

    .pod-crown{position:absolute;top:-18px;left:50%;transform:translateX(-50%);z-index:3}
    .pod-crown svg{width:26px;height:22px}

    .pod-col{
      width:100%;border-radius:18px 18px 0 0;display:flex;flex-direction:column;
      align-items:center;justify-content:flex-start;padding-top:28px;position:relative;
      background:var(--card);border:2.5px solid var(--card-border);border-bottom:none;
    }
    .pod.r1 .pod-col{padding-top:34px;height:min(130px,20vh);box-shadow:0 -2px 0 var(--card-border) inset}
    .pod.r2 .pod-col{height:min(95px,15vh)}
    .pod.r3 .pod-col{height:min(75px,12vh)}

    .pod-rank{
      font-size:11px;font-weight:900;width:24px;height:24px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;margin-bottom:3px;
    }
    .pod.r1 .pod-rank{background:var(--gold);color:#fff;width:28px;height:28px;font-size:13px;box-shadow:0 3px 0 var(--gold-dark)}
    .pod.r2 .pod-rank{background:#cbd5e1;color:#475569;box-shadow:0 3px 0 #94a3b8}
    .pod.r3 .pod-rank{background:#d4a574;color:#fff;box-shadow:0 3px 0 #b8895a}

    .pod-name{font-size:10px;font-weight:800;color:var(--text-dim);text-align:center;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
    .pod-val{font-size:14px;font-weight:900;margin-top:2px}
    .pod.r1 .pod-val{font-size:18px}

    /* ── BOTTOM LIST ── */
    .bottom{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);padding:14px 16px 24px;position:relative;z-index:1}
    .bottom::-webkit-scrollbar{display:none}
    .bottom-inner{max-width:420px;margin:0 auto}

    .hidden-notice{
      background:rgba(239,68,68,.04);border-radius:16px;padding:12px 14px;margin-bottom:12px;
      display:flex;align-items:center;gap:10px;
      border:2px solid rgba(239,68,68,.15);
    }
    .hn-ic{width:28px;height:28px;background:rgba(239,68,68,.08);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .hn-ic svg{width:14px;height:14px;stroke:var(--red);fill:none;stroke-width:2}
    .hn-text{font-size:12px;font-weight:700;color:var(--text-dim)}.hn-text strong{color:var(--red)}

    .your-rank{
      background:var(--card);border-radius:18px;border:2.5px solid var(--card-border);
      padding:14px 16px;margin-bottom:14px;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:var(--shadow-card);
    }
    .yr-left{display:flex;align-items:center;gap:12px}
    .yr-badge{width:40px;height:40px;background:var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 0 var(--gold-dark)}
    .yr-badge svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
    .yr-info .yr-lbl{font-size:10px;font-weight:900;color:var(--text-light);text-transform:uppercase;letter-spacing:1px}
    .yr-info .yr-num{font-family:'Chewy',cursive;font-size:24px;color:var(--text);line-height:1.1}

    .sec-lbl{font-size:10px;font-weight:900;color:var(--text-light);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding:0 4px}

    .lb-list{display:flex;flex-direction:column;gap:8px}
    .lb-row{
      background:var(--card);border-radius:18px;border:2.5px solid var(--card-border);
      padding:12px 14px;display:flex;align-items:center;gap:12px;
      transition:transform .1s;box-shadow:0 3px 0 var(--card-border);
    }
    .lb-row:active{transform:scale(.99)}
    .lb-row.me{border-color:var(--gold);box-shadow:0 4px 0 var(--gold-dark)}
    .lb-rank{font-size:14px;font-weight:900;color:var(--text-light);min-width:24px;text-align:center}
    .lb-av{
      width:40px;height:40px;border-radius:50%;background:#f1f5f9;overflow:hidden;
      display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;
      color:var(--text-light);flex-shrink:0;border:2px solid var(--card-border);
    }
    .lb-av img{width:100%;height:100%;object-fit:cover;display:none}
    .lb-av.has-pic img{display:block}.lb-av.has-pic .av-txt{display:none}
    .lb-info{flex:1;min-width:0}
    .lb-name{font-size:14px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .lb-sub{font-size:10px;font-weight:700;color:var(--text-light);margin-top:2px;display:flex;gap:8px}
    .lb-val{font-size:20px;font-weight:900;flex-shrink:0;text-align:right}
    .lb-vlbl{font-size:9px;font-weight:800;color:var(--text-light);text-align:right;text-transform:uppercase;letter-spacing:.5px}
    .you-badge{background:var(--gold);color:#fff;font-size:8px;font-weight:900;padding:2px 6px;border-radius:6px;margin-left:4px;vertical-align:middle}

    .skeleton{background:var(--card);border:2.5px solid var(--card-border);border-radius:18px;height:60px;position:relative;overflow:hidden}
    .skeleton::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,0,0,.02),transparent);animation:shim 1.4s infinite}
    @keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

    .lb-empty{text-align:center;padding:40px 20px;color:var(--text-light);font-size:14px;font-weight:700;line-height:1.6}
    .lb-empty-ic{width:52px;height:52px;background:#f1f5f9;border:2.5px solid var(--card-border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
    .lb-empty-ic svg{width:24px;height:24px;stroke:var(--text-light);fill:none;stroke-width:2}

    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:var(--green);color:#fff;padding:10px 20px;border-radius:14px;
      font-size:14px;font-weight:800;opacity:0;transition:opacity .3s;z-index:300;
      pointer-events:none;box-shadow:0 4px 0 var(--green-dark);
    }
    .toast.show{opacity:1}

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .anim{animation:fadeUp .3s ease both}
    .d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
  </style>
</head>
<body>

<div class="top">
  <div class="top-inner">
    <div class="hdr">
      <div class="hdr-title">Leaderboard</div>
      <div class="hdr-btns">
        <button class="hdr-btn" id="privacy-btn">
          <svg id="privacy-icon" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          <span id="privacy-label">Hide</span>
        </button>
        <button class="hdr-btn" id="refresh-btn">
          <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>
      </div>
    </div>
    <div class="filters" id="filter-row">
      <button class="ftab active" data-sort="iq">IQ</button>
      <button class="ftab" data-sort="bestStreak">Streak</button>
      <button class="ftab" data-sort="level">Level</button>
    </div>
  </div>
  <div class="podium" id="podium"></div>
</div>

<div class="bottom">
  <div class="bottom-inner">
    <div class="hidden-notice" id="hidden-notice" style="display:none">
      <div class="hn-ic"><svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg></div>
      <div class="hn-text"><strong>Hidden</strong> — you won't appear on the board</div>
    </div>
    <div class="your-rank" id="your-rank-bar" style="display:none">
      <div class="yr-left">
        <div class="yr-badge"><svg viewBox="0 0 24 24"><path d="M6 9H2v12h4V9z"/><path d="M14 4h-4v17h4V4z"/><path d="M22 13h-4v8h4v-8z"/></svg></div>
        <div class="yr-info"><div class="yr-lbl">Your Rank</div><div class="yr-num" id="your-rank-num">#—</div></div>
      </div>
      <div id="your-rank-right" style="text-align:right"></div>
    </div>
    <div class="sec-lbl" id="rest-label" style="display:none">Everyone</div>
    <div class="lb-list" id="lb-list">
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{IQData,db,authReady}from'./data.js';import Haptics from'./haptics.js';
import{doc,getDoc,setDoc,updateDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
if(window.parent!==window)parent.authCheck();
const SC='bd_lb_snapshot',CMA=5*60000;
const SORT={iq:{field:'iq',label:'IQ',color:'var(--purple)',min:50,fmt:v=>v},bestStreak:{field:'bestStreak',label:'Streak',color:'var(--gold)',min:1,fmt:v=>v},level:{field:'level',label:'Level',color:'var(--blue)',min:1,fmt:v=>'Lvl '+v}};
let cs='iq',allUsers=[],myUid=null,isHidden=false;

function gc(){try{return JSON.parse(sessionStorage.getItem(SC))}catch{return null}}
function sc(d){try{sessionStorage.setItem(SC,JSON.stringify({...d,_ca:Date.now()}))}catch{}}
function toast(m,c){var t=document.getElementById('toast');t.textContent=m;t.style.background=c||'var(--green)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

document.getElementById('filter-row').addEventListener('click',e=>{
  var tab=e.target.closest('.ftab');if(!tab)return;Haptics?.medium?.();
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');cs=tab.dataset.sort;render();
});
document.getElementById('refresh-btn').addEventListener('click',()=>{
  Haptics?.medium?.();var c=gc();
  if(c&&Date.now()-c._ca<CMA){toast('Up to date','var(--text-dim)');return}
  fetchSnapshot(true);
});

function loadPrivacy(){isHidden=!!IQData.load().hideFromLeaderboard;updatePUI()}
async function togglePrivacy(){
  isHidden=!isHidden;Haptics?.medium?.();var d=IQData.load();d.hideFromLeaderboard=isHidden;IQData.save(d);
  if(myUid)try{await updateDoc(doc(db,'users',myUid),{hideFromLeaderboard:isHidden})}catch{}
  updatePUI();toast(isHidden?'Hidden':'Visible',isHidden?'var(--red)':'var(--green)');await pushMe();render();
}
function updatePUI(){
  var btn=document.getElementById('privacy-btn'),ic=document.getElementById('privacy-icon'),lbl=document.getElementById('privacy-label'),notice=document.getElementById('hidden-notice'),rb=document.getElementById('your-rank-bar');
  if(isHidden){ic.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';lbl.textContent='Show';btn.classList.add('hid-mode');notice.style.display='flex';rb.style.display='none'}
  else{ic.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';lbl.textContent='Hide';btn.classList.remove('hid-mode');notice.style.display='none'}
}
document.getElementById('privacy-btn').addEventListener('click',togglePrivacy);

async function pushMe(){
  if(!myUid)return;var d=IQData.load();if(!d.calibrated||(d.answered||0)<5)return;
  var me={uid:myUid,username:d.username||'Anonymous',iq:d.iq||0,level:d.level||1,bestStreak:d.bestStreak||0,answered:d.answered||0,correct:d.correct||0,pic:d.pic||'',hidden:!!d.hideFromLeaderboard,updatedAt:Date.now()};
  try{var ref=doc(db,'leaderboard','snapshot');var snap=await getDoc(ref);var users=[];if(snap.exists())users=(snap.data().users||[]).filter(u=>u.uid!==myUid);if(!me.hidden)users.push(me);users.sort((a,b)=>(b.iq||0)-(a.iq||0));if(users.length>500)users=users.slice(0,500);await setDoc(ref,{users,updatedAt:Date.now()});sessionStorage.removeItem(SC)}catch{}
}
window.updateLeaderboardSnapshot=pushMe;

async function migrate(){
  try{var{collection,getDocs,query,limit}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");var snap=await getDocs(query(collection(db,'users'),limit(500)));var users=snap.docs.map(d=>({uid:d.id,...d.data()})).filter(u=>!u.hideFromLeaderboard&&(u.iq||0)>0).map(u=>({uid:u.uid||'',username:u.username||'Anon',iq:u.iq||0,level:u.level||1,bestStreak:u.bestStreak||0,answered:u.answered||0,correct:u.correct||0,pic:u.pic||'',hidden:false,updatedAt:Date.now()})).filter(u=>u.uid);users.sort((a,b)=>(b.iq||0)-(a.iq||0));await setDoc(doc(db,'leaderboard','snapshot'),{users,updatedAt:Date.now(),migrated:true});return users}catch{return[]}
}

async function fetchSnapshot(forced=false){
  try{if(!forced){var c=gc();if(c?.users){allUsers=c.users;render();return}}
  var ref=doc(db,'leaderboard','snapshot');var snap=await getDoc(ref);
  if(snap.exists()){allUsers=(snap.data().users||[]).filter(u=>!u.hidden&&(u.iq||0)>=50&&(u.answered||0)>=5);sc({users:allUsers})}
  else{var m=await migrate();allUsers=m.filter(u=>(u.iq||0)>=50&&(u.answered||0)>=5);sc({users:allUsers})}}
  catch{toast('Load failed','var(--red)');var c=gc();if(c?.users)allUsers=c.users}
  render();
}

function getSorted(){var cfg=SORT[cs];return[...allUsers].filter(u=>u[cfg.field]!=null&&Number(u[cfg.field])>=cfg.min).sort((a,b)=>(b[cfg.field]||0)-(a[cfg.field]||0))}

function render(){
  var sorted=getSorted(),cfg=SORT[cs];
  var myIdx=myUid&&!isHidden?sorted.findIndex(u=>u.uid===myUid):-1;
  renderYR(sorted,myIdx,cfg);
  renderPodium(sorted.slice(0,3),cfg);
  renderList(sorted.slice(3),myIdx,cfg);
  document.getElementById('rest-label').style.display=sorted.length>3?'block':'none';
}

function renderYR(sorted,myIdx,cfg){
  var bar=document.getElementById('your-rank-bar');
  if(!myUid||myIdx===-1||isHidden){bar.style.display='none';return}
  bar.style.display='flex';
  document.getElementById('your-rank-num').textContent='#'+(myIdx+1);
  document.getElementById('your-rank-right').innerHTML=
    '<div style="font-family:Chewy,cursive;font-size:24px;color:'+cfg.color+'">'+cfg.fmt(sorted[myIdx][cfg.field])+'</div>'+
    '<div style="font-size:10px;font-weight:900;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px">'+cfg.label+'</div>';
}

function renderPodium(top3,cfg){
  var pod=document.getElementById('podium');
  if(!top3.length){pod.innerHTML='<div style="padding:30px;text-align:center;color:var(--text-dim);font-size:13px;font-weight:700;width:100%">No players ranked yet</div>';return}

  pod.innerHTML=[1,2,3].map(rank=>{
    var u=top3[rank-1];
    if(!u) return '<div class="pod r'+rank+'"></div>';
    var isMe=u.uid===myUid;
    return '<div class="pod r'+rank+' anim d'+rank+'">'+
      '<div class="pod-av-wrap">'+
        (rank===1?'<div class="pod-crown"><svg viewBox="0 0 28 22" fill="none"><path d="M14 2l4 7 8-3.5-5 10.5H7L2 5.5l8 3.5 4-7z" fill="#f59e0b" stroke="#d97706" stroke-width="1.2" stroke-linejoin="round"/></svg></div>':'')+
        '<div class="pod-av'+(u.pic?' has-pic':'')+'"><img src="'+(u.pic||'')+'" alt=""><span class="av-txt">CB</span></div>'+
      '</div>'+
      '<div class="pod-col">'+
        '<div class="pod-rank">'+rank+'</div>'+
        '<div class="pod-name">'+esc(u.username||'Anon')+(isMe?' (you)':'')+'</div>'+
        '<div class="pod-val" style="color:'+cfg.color+'">'+cfg.fmt(u[cfg.field])+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderList(rest,myIdx,cfg){
  var list=document.getElementById('lb-list');
  if(!rest.length){
    list.innerHTML='<div class="lb-empty"><div class="lb-empty-ic"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div>Not enough players yet — keep training!</div>';
    return;
  }
  list.innerHTML=rest.map((u,i)=>{
    var rank=i+4,isMe=u.uid===myUid;
    var acc=u.answered>0?Math.round(u.correct/u.answered*100):0;
    return '<div class="lb-row'+(isMe?' me':'')+' anim" style="animation-delay:'+(Math.min(i,8)*0.03)+'s">'+
      '<div class="lb-rank">'+rank+'</div>'+
      '<div class="lb-av'+(u.pic?' has-pic':'')+'"><img src="'+(u.pic||'')+'" alt=""><span class="av-txt">CB</span></div>'+
      '<div class="lb-info">'+
        '<div class="lb-name">'+esc(u.username||'Anon')+(isMe?'<span class="you-badge">YOU</span>':'')+'</div>'+
        '<div class="lb-sub"><span>IQ '+(u.iq||'--')+'</span><span>'+acc+'%</span><span>Lvl '+(u.level||1)+'</span></div>'+
      '</div>'+
      '<div>'+
        '<div class="lb-val" style="color:'+cfg.color+'">'+cfg.fmt(u[cfg.field])+'</div>'+
        '<div class="lb-vlbl">'+cfg.label+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function init(){
  await authReady;
  myUid=IQData.getCurrentUser()?.uid||null;
  loadPrivacy();
  await pushMe();
  await fetchSnapshot();
}
init();
</script>
