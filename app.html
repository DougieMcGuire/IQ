<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#3a2918">
  <link rel="manifest" href="manifest.json">
  <title>BrainDeer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #3a2918; --btn-bg: #f0e2cc; --btn-color: #3a2918; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Nunito', sans-serif; }

    #splash {
      position: fixed; inset: 0; z-index: 9999; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.3s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .mascot { font-size: 56px; animation: bob 1.2s ease-in-out infinite; }
    #splash .name { font-size: 26px; font-weight: 900; color: #f0e2cc; margin-top: 8px; }
    #splash .dots { margin-top: 16px; display: flex; gap: 6px; }
    #splash .dots span {
      width: 8px; height: 8px; border-radius: 50%; background: #6b4f32;
      animation: dotPulse 1s ease infinite;
    }
    #splash .dots span:nth-child(2) { animation-delay: 0.15s; }
    #splash .dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes dotPulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }

    .screen { position: absolute; inset: 0; width: 100%; height: 100%; display: none; overflow: hidden; }
    .screen.active { display: block; }
    .screen iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    /* Install button styles */
    #installBtn {
      position: fixed; bottom: 16px; right: 16px;
      background: var(--btn-bg); color: var(--btn-color); border: none;
      padding: 12px 18px; border-radius: 8px; font-size: 16px; font-weight: 700;
      cursor: pointer; z-index: 10000;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      display: none;
    }
    #installBtn:focus { outline: 3px solid #fff; }
    
    /* iOS instruction banner */
    #iosInstallBanner {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: #f0e2cc; color: #3a2918; padding: 12px 20px; border-radius: 8px; font-size: 16px;
      display: none; z-index: 10000;
      max-width: 90%;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="splash">
  <div class="mascot">🦌</div>
  <div class="name">BrainDeer</div>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<div class="screen" id="screen-auth"></div>
<div class="screen" id="screen-improve"></div>
<div class="screen" id="screen-profile"></div>

<!-- Install Button -->
<button id="installBtn" aria-label="Install BrainDeer as an app for faster access">⬇️ Install App</button>

<!-- iOS Banner -->
<div id="iosInstallBanner" role="alert">Tap the Share button → Add to Home Screen to install BrainDeer</div>

<script>
  var currentScreen = null;
  var screensLoaded = {};

  function goTo(page) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    if (!screensLoaded[page]) {
      var container = document.getElementById('screen-' + page);
      var iframe = document.createElement('iframe');
      iframe.src = page + '.html';
      iframe.allow = 'web-share';
      container.appendChild(iframe);
      screensLoaded[page] = true;
    }
    var el = document.getElementById('screen-' + page);
    if (el) { el.classList.add('active'); currentScreen = page; }
    var splash = document.getElementById('splash');
    if (splash && !splash.classList.contains('hide')) {
      splash.classList.add('hide');
      setTimeout(function() { if (splash.parentNode) splash.remove(); }, 400);
    }
  }

  function authCheck() { /* no-op */ }

  (function() {
    var isGuest = localStorage.getItem('iq_guest') === '1';
    var hasFirebaseUser = false;
    for (var i = 0; i < localStorage.length; i++) {
      if (localStorage.key(i).indexOf('firebase:authUser:') === 0) { hasFirebaseUser = true; break; }
    }
    if (isGuest || hasFirebaseUser) {
      goTo('improve');
    } else {
      goTo('auth');
    }
  })();

  // ================== PWA Install Handling ==================
  let deferredPrompt;
  const installBtn = document.getElementById('installBtn');
  const iosBanner = document.getElementById('iosInstallBanner');
  const isIos = /iphone|ipad|ipod/i.test(window.navigator.userAgent);
  const isInStandaloneMode = ('standalone' in window.navigator) && window.navigator.standalone;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
  });

  installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const choice = await deferredPrompt.userChoice;
      console.log('Install outcome:', choice.outcome);
      deferredPrompt = null;
      installBtn.style.display = 'none';
    }
  });

  // Show instructions for iOS users
  if (isIos && !isInStandaloneMode) {
    iosBanner.style.display = 'block';
  }
</script>

</body>
</html>
