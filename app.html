<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F2EBD9">
  <link rel="manifest" href="manifest.json">
  <title>IQ Profile</title>
  <style>
    :root { --bg: #F2EBD9; --tan: #C4AD8A; --ink: #2A2018; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); overflow: hidden; height: 100dvh; }

    .screen {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      background: var(--bg);
    }
    .screen.active { opacity: 1; pointer-events: all; }

    #veil {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 999;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.25s ease;
    }
    #veil.hidden { opacity: 0; pointer-events: none; }
    .spin {
      width: 32px; height: 32px;
      border: 3px solid var(--tan); border-top-color: var(--ink);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="veil"><div class="spin"></div></div>

<iframe src="improve.html" class="screen active" id="screen-improve"></iframe>
<iframe src="profile.html" class="screen"        id="screen-profile"></iframe>
<iframe src="auth.html"    class="screen"        id="screen-auth"></iframe>

<script type="module">
  import { authReady } from './data.js';

  // Any iframe calls parent.goTo('profile') to switch pages — instant, no reload
  window.goTo = function(page) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById('screen-' + page);
    if (el) el.classList.add('active');
  };

  // Wait for Firebase auth before revealing anything (prevents auth flicker)
  const user = await authReady;
  document.getElementById('veil').classList.add('hidden');

  const isGuest = localStorage.getItem('iq_guest') === '1';
  if (!user && !isGuest) {
    window.goTo('auth');
  }
</script>

</body>
</html>
