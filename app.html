<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#F2EBD9">

<link rel="manifest" href="manifest.json">

<title>My App</title>

<style>
:root {
    --bg: #F2EBD9;   /* header */
    --tan: #C4AD8A;  /* footer */
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background: var(--bg);
    overflow: hidden;
}

/* iframe full screen */
.screen {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    background: var(--bg);
}

.screen.active {
    display: block;
}

/* optional smooth fade */
.screen {
    transition: opacity 0.2s ease;
}
</style>
</head>
<body>

<iframe src="improve.html" class="screen active" id="improve"></iframe>
<iframe src="profile.html" class="screen" id="profile"></iframe>

<script>
/*
IMPORTANT:
Instead of using a nav here,
your existing navigator inside improve/profile
should call this function to switch pages.
*/

function goTo(page) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(page).classList.add('active');
}

/*
Example usage from inside improve.html:

parent.goTo('profile');

And from profile.html:

parent.goTo('improve');
*/
</script>

</body>
</html>
