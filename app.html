<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0474fc">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>Cebear</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100dvh;overflow:hidden;background:#1b2d5b;font-family:'Nunito',sans-serif;touch-action:manipulation}

    /* ── SPLASH ── exact testintro.html, dropped in as-is ── */
    #splash{
      position:fixed;inset:0;z-index:9999;
      background:#0474fc;
      display:flex;justify-content:center;align-items:center;overflow:hidden;
      touch-action:manipulation;
      -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
    }
    #splash.hide{
      opacity:0;pointer-events:none;
      transition:opacity 0.4s ease;
    }
    /* testintro .container */
    #splash .container{text-align:center;color:white;pointer-events:none}
    /* testintro img */
    #splash .container img{-webkit-user-drag:none;user-drag:none;pointer-events:none}
    /* testintro .logo */
    #splash .logo{
      width:170px;display:block;margin:0 auto;
      opacity:0;transform:translateY(28px) scale(0.6);
      animation:pop 0.8s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    /* testintro .text */
    #splash .text{
      font-family:'Chewy',cursive;
      font-size:92px;
      margin-top:6px;white-space:nowrap;padding:0 8px;overflow:visible;
    }
    /* testintro .letter */
    #splash .letter{
      display:inline-block;opacity:0;
      transform:translateY(28px) scale(0.6);
      animation:popLetter cubic-bezier(.34,1.56,.64,1) forwards;
      will-change:transform;backface-visibility:hidden;
    }
    /* testintro exact delays — all finish at 0.8s */
    #splash .letter:nth-child(1){animation-delay:0.15s;animation-duration:0.65s}
    #splash .letter:nth-child(2){animation-delay:0.19s;animation-duration:0.61s}
    #splash .letter:nth-child(3){animation-delay:0.23s;animation-duration:0.57s}
    #splash .letter:nth-child(4){animation-delay:0.27s;animation-duration:0.53s}
    #splash .letter:nth-child(5){animation-delay:0.31s;animation-duration:0.49s}
    #splash .letter:nth-child(6){animation-delay:0.35s;animation-duration:0.45s}
    @keyframes pop{
      0%{opacity:0;transform:translateY(28px) scale(0.6)}
      65%{opacity:1;transform:translateY(-6px) scale(1.08)}
      100%{opacity:1;transform:translateY(0) scale(1)}
    }
    @keyframes popLetter{
      0%{opacity:0;transform:translateY(28px) scale(0.6)}
      65%{opacity:1;transform:translateY(-6px) scale(1.08)}
      100%{opacity:1;transform:translateY(0) scale(1)}
    }
    /* ── responsive for desktop: scale the whole container ── */
    @media(min-width:600px){
      #splash .logo{width:min(170px,20vh)}
      #splash .text{font-size:min(92px,18vh)}
    }
    /* ── END SPLASH ── */

    .screen{position:absolute;top:0;left:0;right:0;bottom:0;display:none;overflow:hidden}
    .screen.active{display:block}
    .screen iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;touch-action:manipulation}
    body.has-nav .screen iframe{height:calc(100dvh - 58px - env(safe-area-inset-bottom,0px))}
    #nav{position:fixed;bottom:0;left:0;right:0;height:calc(58px + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:#1b2d5b;border-top:1px solid rgba(240,234,214,.08);display:none;justify-content:space-around;align-items:center;z-index:100}
    body.has-nav #nav{display:flex}
    .nb{padding:8px 0 2px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(240,234,214,.35);font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;cursor:pointer;position:relative;transition:color .15s;-webkit-tap-highlight-color:transparent}
    .nb .ni{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:all .2s}
    .nb .ni svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
    .nb.active{color:#F0EAD6}
    .nb.active .ni{background:rgba(240,234,214,.15);width:42px;height:28px}
    .nb.active .ni svg{stroke:#F0EAD6}
    .nbdg{position:absolute;top:4px;right:calc(50% - 16px);width:8px;height:8px;border-radius:50%;background:#e8443a;border:2px solid #1b2d5b;display:none}
    .nbdg.show{display:block}
    .auth-wait{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#1b2d5b}
    .auth-wait-dots{display:flex;gap:7px}
    .auth-wait-dot{width:10px;height:10px;border-radius:50%;background:rgba(240,234,214,.2);animation:dp 1s ease infinite}
    .auth-wait-dot:nth-child(2){animation-delay:.15s}
    .auth-wait-dot:nth-child(3){animation-delay:.3s}
    @keyframes dp{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
    #offline-toast{position:fixed;top:calc(env(safe-area-inset-top,20px) + 12px);left:50%;transform:translateX(-50%);background:#1b2d5b;border:1px solid rgba(240,234,214,.15);color:rgba(240,234,214,.7);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;padding:10px 18px;border-radius:14px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
    #offline-toast.show{opacity:1}
  </style>
  <!-- Chewy loaded after page CSS so it's ready by animation time -->
  <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
</head>
<body>

<!-- SPLASH: testintro.html body, verbatim -->
<div id="splash">
  <div class="container">
    <img src="logo.png" class="logo" draggable="false">
    <div class="text">
      <span class="letter">c</span><span class="letter">e</span><span class="letter">b</span><span class="letter">e</span><span class="letter">a</span><span class="letter">r</span>
    </div>
  </div>
</div>

<div id="offline-toast">No connection — come back online for this</div>
<div class="screen" id="screen-auth"></div>
<div class="screen" id="screen-improve"></div>
<div class="screen" id="screen-profile"></div>
<div class="screen" id="screen-leaderboard"></div>
<div class="screen" id="screen-tasks"></div>
<nav id="nav">
  <button class="nb" data-page="leaderboard" onclick="goTo('leaderboard')"><span class="ni"><svg viewBox="0 0 24 24"><path d="M6 9H2v12h4V9z"/><path d="M14 4h-4v17h4V4z"/><path d="M22 13h-4v8h4v-8z"/></svg></span>Ranks</button>
  <button class="nb active" data-page="improve" onclick="goTo('improve')"><span class="ni"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></span>Train</button>
  <button class="nb" data-page="tasks" onclick="goTo('tasks')"><span class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12l3 3 5-6"/></svg></span>Tasks<span class="nbdg" id="tasks-badge"></span></button>
  <button class="nb" data-page="profile" onclick="goTo('profile')"><span class="ni"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0112 0v1"/></svg></span>Profile</button>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",authDomain:"braindeer-backend.firebaseapp.com",projectId:"braindeer-backend",storageBucket:"braindeer-backend.firebasestorage.app",messagingSenderId:"331205139765",appId:"1:331205139765:web:20cfef8194af63fc55c07c",measurementId:"G-9B6885G0X0"});
var WORKER_URL='https://cebear.com/api/redeem-install-token';
var isStandalone=!!('standalone' in navigator&&navigator.standalone||window.matchMedia('(display-mode: standalone)').matches);

/*
  SPLASH TIMING — guaranteed sequence:
    0ms    : page loads, animations begin
    800ms  : last letter finishes (delay 0.35s + duration 0.45s = 0.8s)
    800ms  : animationend fires on last letter → starts 800ms hold timer
    2300ms : hold done → add .hide class (fade starts)
    2700ms : fade done → remove element from DOM

  animationend is the source of truth — not a fixed timeout.
  Fixed timeout is a fallback in case animationend misfires.
*/
var _splashDone = false;

function _doHide() {
  if (_splashDone) return;
  _splashDone = true;
  var sp = document.getElementById('splash');
  if (!sp) return;
  sp.classList.add('hide');
  setTimeout(function() {
    if (sp.parentNode) sp.parentNode.removeChild(sp);
  }, 450);
}

// Primary: use animationend on the last letter (letter 6 = nth-child(6))
// It finishes at delay(0.35s) + duration(0.45s) = 0.8s
// After it fires, hold 800ms then hide
(function() {
  var sp = document.getElementById('splash');
  if (!sp) return;
  var letters = sp.querySelectorAll('.letter');
  var lastLetter = letters[letters.length - 1]; // the 'r'
  if (!lastLetter) return;

  var holdTimer = null;
  lastLetter.addEventListener('animationend', function() {
    holdTimer = setTimeout(_doHide, 800);
  });

  // Fallback: if animationend never fires (font not loaded etc),
  // hard cutoff at 800ms + 800ms + 200ms buffer = 1800ms
  setTimeout(function() {
    if (!_splashDone) {
      clearTimeout(holdTimer);
      _doHide();
    }
  }, 1800);
})();

// goTo() calls this but _splashDone guard means it only works AFTER the hold
function dismissSplash() { /* intentionally does nothing — timing is guaranteed above */ }

function showNav(s){document.body.classList.toggle('has-nav',s)}
function updateNavActive(p){document.querySelectorAll('#nav .nb').forEach(function(b){b.classList.toggle('active',b.dataset.page===p)})}

var _isAuthed=false,_authResolved=false,_authWaiters=[];
firebase.auth().onAuthStateChanged(function(u){
  _isAuthed=!!u;
  if(!_authResolved){
    _authResolved=true;
    _authWaiters.forEach(function(fn){fn(u)});
    _authWaiters=[];
  }
  if(u){
    if(!currentScreen||currentScreen==='auth')goTo('improve');
    _notifyImprove('authSuccess');
  }else if(isStandalone){
    currentScreen=null;screensLoaded={};
    document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
    goTo('auth');
  }
});
function authReady(){
  if(_authResolved)return Promise.resolve(_isAuthed);
  return new Promise(function(r){_authWaiters.push(function(){r(_isAuthed)})});
}
function _notifyImprove(type,extra){
  (function attempt(n){
    var f=document.querySelector('#screen-improve iframe');
    if(f&&f.contentWindow){f.contentWindow.postMessage(Object.assign({type:type},extra||{}),'*');}
    else if(n>0){setTimeout(function(){attempt(n-1)},100);}
  })(30);
}

function tryGuestWall(page){
  if(isStandalone||_isAuthed)return false;
  if(page!=='profile'&&page!=='tasks'&&page!=='leaderboard')return false;
  try{
    var f=document.querySelector('#screen-improve iframe');
    if(f&&f.contentWindow&&typeof f.contentWindow.showGuestWallForNav==='function')
      return f.contentWindow.showGuestWallForNav(page);
  }catch{}
  goTo('auth');return true;
}

window.addEventListener('message',function(e){
  if(!e.data||!e.data.type)return;
  var t=e.data.type;
  if(t==='authSuccess'){_isAuthed=true;if(currentScreen==='auth')goTo('improve');return;}
  if(t==='googleAuthRequest'){
    var gp=new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(gp)
      .then(function(r){_isAuthed=true;ensureUser(r.user);})
      .catch(function(err){
        if(err.code==='auth/popup-closed-by-user'||err.code==='auth/cancelled-popup-request')return;
        _notifyImprove('authError',{msg:'Google sign-in failed. Try email instead.'});
      });
    return;
  }
  if(t==='googleRedirect'){location.href='google-redirect.html';return;}
  if(t==='savePushSub')firebase.auth().onAuthStateChanged(function(u){
    if(u)firebase.firestore().collection('pushSubscriptions').doc(u.uid)
      .set({subscription:e.data.sub,uid:u.uid,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(function(){});
  });
  if(t==='tasksUpdated'){var f=document.querySelector('#screen-tasks iframe');f&&f.contentWindow&&f.contentWindow.postMessage({type:'tasksUpdated'},'*')}
  if(t==='xpAwarded'){var f2=document.querySelector('#screen-improve iframe');f2&&f2.contentWindow&&f2.contentWindow.postMessage({type:'xpAwarded',xp:e.data.xp},'*')}
});

var currentScreen=null,screensLoaded={};
var AUTH_PAGES=['profile','tasks','leaderboard'];
var NETWORK_PAGES=['profile','tasks','leaderboard'];

function isOffline(){return!navigator.onLine;}
var _offlineTimer=null;
function showOfflineToast(){
  var t=document.getElementById('offline-toast');
  if(!t)return;
  t.classList.add('show');
  clearTimeout(_offlineTimer);
  _offlineTimer=setTimeout(function(){t.classList.remove('show');},2500);
}

window.goTo=function(page){
  if(tryGuestWall(page))return;
  if(isOffline()&&NETWORK_PAGES.indexOf(page)!==-1){showOfflineToast();return;}
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  if((page==='profile'||page==='leaderboard')&&screensLoaded[page]){
    var old=document.querySelector('#screen-'+page+' iframe');
    if(old)old.remove();
    screensLoaded[page]=false;
  }
  var sc=document.getElementById('screen-'+page);
  if(sc)sc.classList.add('active');
  currentScreen=page;
  showNav(page!=='auth');
  updateNavActive(page);
  // NOTE: does NOT call dismissSplash — splash timing is self-contained
  if(screensLoaded[page])return;
  var c=document.getElementById('screen-'+page);
  if(!c)return;
  if(AUTH_PAGES.indexOf(page)!==-1&&isStandalone&&!_authResolved){
    var w=document.createElement('div');w.className='auth-wait';
    w.innerHTML='<div class="auth-wait-dots"><div class="auth-wait-dot"></div><div class="auth-wait-dot"></div><div class="auth-wait-dot"></div></div>';
    c.appendChild(w);
    authReady().then(function(){var aw=c.querySelector('.auth-wait');if(aw)aw.remove();if(currentScreen===page)_loadIframe(page,c)});
    return;
  }
  _loadIframe(page,c);
};

function _loadIframe(page,c){
  if(screensLoaded[page])return;
  var f=document.createElement('iframe'),src=page+'.html';
  if(page==='improve'){var qs=sessionStorage.getItem('cebear_shared_qs');if(qs){src+=qs;sessionStorage.removeItem('cebear_shared_qs')}}
  f.src=src;f.allow='web-share';c.appendChild(f);screensLoaded[page]=true;
}

window.authCheck=function(){};
function ensureUser(u){
  var r=firebase.firestore().collection('users').doc(u.uid);
  return r.get().then(function(s){
    return s.exists
      ?r.set({lastSeen:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})
      :r.set({uid:u.uid,email:u.email,username:u.displayName||null,pic:u.photoURL||null,createdAt:firebase.firestore.FieldValue.serverTimestamp(),lastSeen:firebase.firestore.FieldValue.serverTimestamp()});
  });
}
function redeemSessionToken(sid){
  return firebase.firestore().collection('authSessions').doc(sid).get().then(function(s){
    if(!s.exists)throw'nf';
    var d=s.data();if(d.used)throw'u';
    var exp=d.expiresAt&&d.expiresAt.toDate?d.expiresAt.toDate():new Date(d.expiresAt);
    if(new Date()>exp)throw'e';
    s.ref.update({used:true});
    return firebase.auth().signInWithCredential(firebase.auth.GoogleAuthProvider.credential(d.idToken));
  });
}

(function(){
  localStorage.removeItem('iq_guest');
  var p=new URLSearchParams(location.search),tT=p.get('t'),sI=p.get('session');
  if(tT||sI)history.replaceState({},'',location.pathname);
  var qParam=p.get('q'),fromParam=p.get('from');
  if(qParam||fromParam){
    var qs='?';
    if(qParam)qs+='q='+encodeURIComponent(qParam);
    if(fromParam)qs+=(qParam?'&':'')+'from='+encodeURIComponent(fromParam);
    sessionStorage.setItem('cebear_shared_qs',qs);
    history.replaceState({},'',location.pathname);
  }
  var gT=sessionStorage.getItem('bd_gis_token');
  if(gT){
    sessionStorage.removeItem('bd_gis_token');
    firebase.auth().signInWithCredential(firebase.auth.GoogleAuthProvider.credential(gT))
      .then(function(r){ensureUser(r.user)})
      .then(function(){goTo('improve')})
      .catch(function(){start()});
    return;
  }
  if(sI){redeemSessionToken(sI).then(start).catch(start);return;}
  if(tT){
    fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:tT})})
      .then(function(r){return r.ok?r.json():null})
      .then(function(b){b&&b.customToken?firebase.auth().signInWithCustomToken(b.customToken).then(function(){location.reload()}):start()})
      .catch(start);
    return;
  }
  start();
  function start(){
    if(isStandalone){
      authReady().then(function(){if(!currentScreen)goTo(_isAuthed?'improve':'auth')});
    }else{
      goTo('improve');
    }
  }
})();

var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e});
window.triggerInstall=function(){deferredPrompt&&deferredPrompt.prompt()};
</script>
</body>
</html>
