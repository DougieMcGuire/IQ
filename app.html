    *{margin:0;padding:0;box-sizing:border-box}

    /* ── iOS status bar blur overlay ── */

        content:'';position:fixed;top:calc(-1 * env(safe-area-inset-top,0px));

    /* ── SPLASH ── */
    #splash{position:fixed;inset:0;z-index:9999;background:#0474fc;display:flex;justify-content:center;align-items:center;overflow:hidden;-webkit-user-select:none;user-select:none;contain:strict}
    #splash.hide{opacity:0;pointer-events:none;transition:opacity .4s ease}
    #splash .container{text-align:center;color:#fff;pointer-events:none}
    /* Logo: object-fit to prevent stretching */
    #splash .logo{
      width:clamp(100px,22vw,150px);
      height:auto;aspect-ratio:1;object-fit:contain;
      display:block;margin:0 auto;
      opacity:0;transform:translateY(28px) scale(.6);
      animation:pop .8s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    #splash .text{font-family:'Chewy',cursive;font-size:clamp(48px,13vw,84px);margin-top:6px;white-space:nowrap}
    #splash .letter{display:inline-block;opacity:0;transform:translateY(28px) scale(.6);animation:popLetter cubic-bezier(.34,1.56,.64,1) forwards;will-change:transform,opacity}
    #splash .letter:nth-child(1){animation-delay:.15s;animation-duration:.65s}
    #splash .letter:nth-child(2){animation-delay:.19s;animation-duration:.61s}
    #splash .letter:nth-child(3){animation-delay:.23s;animation-duration:.57s}
    #splash .letter:nth-child(4){animation-delay:.27s;animation-duration:.53s}
    #splash .letter:nth-child(5){animation-delay:.31s;animation-duration:.49s}
    #splash .letter:nth-child(6){animation-delay:.35s;animation-duration:.45s}
    @keyframes pop{0%{opacity:0;transform:translateY(28px) scale(.6)}65%{opacity:1;transform:translateY(-6px) scale(1.08)}100%{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes popLetter{0%{opacity:0;transform:translateY(28px) scale(.6)}65%{opacity:1;transform:translateY(-6px) scale(1.08)}100%{opacity:1;transform:translateY(0) scale(1)}}

    /* ── SCREENS ── */
    .screen{position:absolute;inset:0;display:none;overflow:hidden;contain:layout style}

    /* ── AUTH WAIT ── */
    .auth-wait{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0474fc}
    .auth-wait-dots{display:flex;gap:8px}
    .auth-wait-dot{width:12px;height:12px;border-radius:50%;background:#fff;will-change:transform,opacity;animation:dp 1s ease infinite}
    .auth-wait-dot:nth-child(2){animation-delay:.15s}
    .auth-wait-dot:nth-child(3){animation-delay:.3s}
    @keyframes dp{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}

    /* ── OFFLINE TOAST ── */
    #offline-toast{position:fixed;top:calc(env(safe-area-inset-top,20px) + 12px);left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:13px;font-weight:800;padding:10px 18px;border-radius:14px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;box-shadow:0 4px 0 #0f172a}
    #offline-toast.show{opacity:1}

    /* ── Reduced motion ── */
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
      #splash .logo,#splash .letter{animation:none;opacity:1;transform:none}
    }

    /* ── Print (just in case) ── */
    @media print{#nav,#splash{display:none!important}.screen{position:static;display:block!important}}
  </style>

<script>
firebase.initializeApp({apiKey:"AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",authDomain:"braindeer-backend.firebaseapp.com",projectId:"braindeer-backend",storageBucket:"braindeer-backend.firebasestorage.app",messagingSenderId:"331205139765",appId:"1:331205139765:web:20cfef8194af63fc55c07c",measurementId:"G-9B6885G0X0"});
var WORKER_URL='https://cebear.com/api/redeem-install-token';
var isStandalone=!!('standalone' in navigator&&navigator.standalone||window.matchMedia('(display-mode: standalone)').matches);

// ── Splash ────────────────────────────────────────────────────────────────────
var _splashDone=false;
function _doHide(){
  if(_splashDone)return;_splashDone=true;
  var sp=document.getElementById('splash');if(!sp)return;
  sp.classList.add('hide');
  setTimeout(function(){if(sp.parentNode)sp.parentNode.removeChild(sp);},450);
}
(function(){
  var letters=document.querySelectorAll('#splash .letter');
  var last=letters[letters.length-1];
  if(!last){setTimeout(_doHide,1800);return;}
  var held=false;
  last.addEventListener('animationend',function(){if(held)return;held=true;setTimeout(_doHide,500);});
  setTimeout(function(){if(!_splashDone)_doHide();},1400);
})();

// ── Auth ──────────────────────────────────────────────────────────────────────
var _isAuthed=false,_authResolved=false,_authWaiters=[];
firebase.auth().onAuthStateChanged(function(u){
  _isAuthed=!!u;_authResolved=true;
  if(u)ensureUser(u);
  _authWaiters.forEach(function(fn){fn();});_authWaiters=[];
  if(u){
    (function(){var d=new Date(),dk=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
      firebase.firestore().collection('users').doc(u.uid).collection('dailyTasks').doc(dk).get()
        .then(function(s){if(s.exists&&s.data()){var td=s.data();if(!td.allClaimed&&td.tasks&&td.tasks.some(function(t){return t.done&&!t.claimed})){var tb=document.getElementById('tasks-badge');if(tb)tb.classList.add('show');}}})
        .catch(function(){});
    })();
  }
});
function authReady(){
  if(_authResolved)return Promise.resolve(_isAuthed);
  return new Promise(function(r){_authWaiters.push(function(){r(_isAuthed);});});
}

// ── Cross-frame messaging ─────────────────────────────────────────────────────
function _notifyImprove(type,extra){
  (function attempt(n){
    var f=document.querySelector('#screen-improve iframe');
    if(f&&f.contentWindow)f.contentWindow.postMessage(Object.assign({type:type},extra||{}),'*');
    else if(n>0)setTimeout(function(){attempt(n-1);},100);
  })(30);
}
function tryGuestWall(page){
  if(isStandalone||_isAuthed)return false;
  if(page!=='profile'&&page!=='tasks'&&page!=='leaderboard')return false;
  try{var f=document.querySelector('#screen-improve iframe');if(f&&f.contentWindow&&typeof f.contentWindow.showGuestWallForNav==='function')return f.contentWindow.showGuestWallForNav(page);}catch{}
  goTo('auth');return true;
}

window.addEventListener('message',function(e){
  if(!e.data||!e.data.type)return;
  var t=e.data.type;
  if(t==='authSuccess'){_isAuthed=true;if(currentScreen==='auth')goTo('improve');return;}
  if(t==='googleAuthRequest'){
    firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider())
      .then(function(r){_isAuthed=true;ensureUser(r.user);})
      .catch(function(err){if(err.code==='auth/popup-closed-by-user'||err.code==='auth/cancelled-popup-request')return;_notifyImprove('authError',{msg:'Google sign-in failed.'});});
    return;
  }
  if(t==='googleRedirect'){location.href='google-redirect.html';return;}
  if(t==='savePushSub')firebase.auth().onAuthStateChanged(function(u){if(u)firebase.firestore().collection('pushSubscriptions').doc(u.uid).set({subscription:e.data.sub,uid:u.uid,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(function(){});});
  if(t==='tasksUpdated'){var f=document.querySelector('#screen-tasks iframe');f&&f.contentWindow&&f.contentWindow.postMessage({type:'tasksUpdated'},'*');}
  if(t==='xpAwarded'){var f2=document.querySelector('#screen-improve iframe');f2&&f2.contentWindow&&f2.contentWindow.postMessage({type:'xpAwarded',xp:e.data.xp},'*');}
  if(t==='avatarEditorClose'||t==='avatarSaved'){/* handled by profile iframe */}
});

// ── Navigation ────────────────────────────────────────────────────────────────
var currentScreen=null,screensLoaded={};
var AUTH_PAGES=['profile','tasks','leaderboard'];
var NETWORK_PAGES=['profile','tasks','leaderboard'];
function isOffline(){return!navigator.onLine;}
var _offlineTimer=null;
function showOfflineToast(){var t=document.getElementById('offline-toast');if(!t)return;t.classList.add('show');clearTimeout(_offlineTimer);_offlineTimer=setTimeout(function(){t.classList.remove('show');},2500);}
function showNav(show){document.body.classList.toggle('has-nav',show);}
function updateNavActive(page){
  document.querySelectorAll('.nb').forEach(function(b){
    var isActive=b.dataset.page===page;
    b.classList.toggle('active',isActive);
    b.setAttribute('aria-current',isActive?'page':'false');
  });
  // Status bar color: beige for improve (content has beige bg), blue for everything else
  var tc=document.getElementById('theme-color-meta');
  if(tc)tc.setAttribute('content',page==='improve'?'#f5f0e8':'#0474fc');
}

window.goTo=function(page){
  if(tryGuestWall(page))return;
  if(isOffline()&&NETWORK_PAGES.indexOf(page)!==-1){showOfflineToast();return;}
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  var sc=document.getElementById('screen-'+page);if(sc)sc.classList.add('active');
  currentScreen=page;showNav(page!=='auth');updateNavActive(page);
  document.body.classList.toggle('page-improve',page==='improve');
  if(screensLoaded[page]){
    // Already loaded — send pageEnter so it can animate + refresh data
    var iframe=document.querySelector('#screen-'+page+' iframe');
    if(iframe&&iframe.contentWindow){
      try{iframe.contentWindow.postMessage({type:'pageEnter'},'*');}catch(e){}
    }
    return;
  }
  var c=document.getElementById('screen-'+page);if(!c)return;
  if(AUTH_PAGES.indexOf(page)!==-1&&isStandalone&&!_authResolved){
    var w=document.createElement('div');w.className='auth-wait';
    w.innerHTML='<div class="auth-wait-dots"><div class="auth-wait-dot"></div><div class="auth-wait-dot"></div><div class="auth-wait-dot"></div></div>';
    c.appendChild(w);
    authReady().then(function(){var aw=c.querySelector('.auth-wait');if(aw)aw.remove();if(currentScreen===page)_loadIframe(page,c);});
    return;
  }
  _loadIframe(page,c);
};

function _loadIframe(page,c){
  if(screensLoaded[page])return;
  var f=document.createElement('iframe');
  f.title=page.charAt(0).toUpperCase()+page.slice(1)+' — Cebear';
  var src=page+'.html';
  if(page==='improve'){var qs=sessionStorage.getItem('cebear_shared_qs');if(qs){src+=qs;sessionStorage.removeItem('cebear_shared_qs');}}
  f.src=src;f.allow='web-share';
  // Lazy load non-critical iframes
  if(page!=='improve')f.loading='lazy';
  c.appendChild(f);screensLoaded[page]=true;
}

window.authCheck=function(){};
function ensureUser(u){
  var r=firebase.firestore().collection('users').doc(u.uid);
  return r.get().then(function(s){return s.exists?r.set({lastSeen:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}):r.set({uid:u.uid,email:u.email,username:u.displayName||null,pic:u.photoURL||null,createdAt:firebase.firestore.FieldValue.serverTimestamp(),lastSeen:firebase.firestore.FieldValue.serverTimestamp()});});
}
function redeemSessionToken(sid){
  return firebase.firestore().collection('authSessions').doc(sid).get().then(function(s){
    if(!s.exists)throw'nf';var d=s.data();if(d.used)throw'u';
    var exp=d.expiresAt&&d.expiresAt.toDate?d.expiresAt.toDate():new Date(d.expiresAt);
    if(new Date()>exp)throw'e';s.ref.update({used:true});
    return firebase.auth().signInWithCredential(firebase.auth.GoogleAuthProvider.credential(d.idToken));
  });
}

(function(){
  localStorage.removeItem('iq_guest');
  var p=new URLSearchParams(location.search),tT=p.get('t'),sI=p.get('session');
  if(tT||sI)history.replaceState({},'',location.pathname);
  var qParam=p.get('q'),fromParam=p.get('from'),sParam=p.get('s');
  if(qParam||fromParam||sParam){var qs='?';if(sParam)qs+='s='+encodeURIComponent(sParam);if(qParam)qs+=(sParam?'&':'')+'q='+encodeURIComponent(qParam);if(fromParam)qs+=(qParam||sParam?'&':'')+'from='+encodeURIComponent(fromParam);sessionStorage.setItem('cebear_shared_qs',qs);history.replaceState({},'',location.pathname);}
  var gT=sessionStorage.getItem('bd_gis_token');
  if(gT){sessionStorage.removeItem('bd_gis_token');firebase.auth().signInWithCredential(firebase.auth.GoogleAuthProvider.credential(gT)).then(function(r){ensureUser(r.user);}).then(function(){goTo('improve');}).catch(function(){start();});return;}
  if(sI){redeemSessionToken(sI).then(start).catch(start);return;}
  if(tT){fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:tT})}).then(function(r){return r.ok?r.json():null;}).then(function(b){b&&b.customToken?firebase.auth().signInWithCustomToken(b.customToken).then(function(){location.reload();}):start();}).catch(start);return;}
  start();
  function start(){isStandalone?authReady().then(function(){if(!currentScreen)goTo(_isAuthed?'improve':'auth');}):goTo('improve');}
})();

// ── Install prompt ────────────────────────────────────────────────────────────
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;});
window.triggerInstall=function(){deferredPrompt&&deferredPrompt.prompt();};

// ── Dark mode: listen for changes from iframes and propagate to all ──────────
function applyAppDarkMode(on){
  document.body.classList.toggle('dark',on);
  var nav=document.getElementById('nav');
  if(nav)nav.style.background=on?'#1e3a5f':'#0474fc';
  // Update body::after strip color
  var style=document.documentElement.style;
  if(on){
    style.setProperty('--app-nav-bg','#1e3a5f');
    document.body.style.background=on&&!document.body.classList.contains('page-improve')?'#1e3a5f':'';
  }else{
    style.removeProperty('--app-nav-bg');
    document.body.style.background='';
  }
  // Propagate to all loaded iframes
  document.querySelectorAll('.screen iframe').forEach(function(f){
    try{f.contentWindow.postMessage({type:'applyDarkMode',on:on},'*');}catch(e){}
  });
}
// Apply on load
if(localStorage.getItem('cb_dark')==='on')applyAppDarkMode(true);
// Listen for settings changes from profile iframe
window.addEventListener('message',function(e){
  if(!e.data)return;
  if(e.data.type==='darkModeChanged'){
    localStorage.setItem('cb_dark',e.data.on?'on':'off');
    applyAppDarkMode(e.data.on);
  }
});

// ── Preload improve.html for instant nav ──────────────────────────────────────
if('requestIdleCallback' in window){
  requestIdleCallback(function(){
    var link=document.createElement('link');link.rel='prefetch';link.href='improve.html';document.head.appendChild(link);
  });
}
