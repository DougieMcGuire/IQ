<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#162b5e">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>Cebear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100dvh;overflow:hidden;background:#162b5e;font-family:'Nunito',sans-serif;touch-action:manipulation}
    #splash{position:fixed;inset:0;z-index:9999;background:#111f45;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .35s}
    #splash.hide{opacity:0;pointer-events:none}
    #splash .sb{width:72px;height:72px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:bob 1.2s ease-in-out infinite}
    #splash .sb svg{width:40px;height:40px}
    #splash .sn{font-size:26px;font-weight:900;color:#fff;margin-top:12px}
    #splash .sd{margin-top:16px;display:flex;gap:6px}
    #splash .sd span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25);animation:dp 1s ease infinite}
    #splash .sd span:nth-child(2){animation-delay:.15s}
    #splash .sd span:nth-child(3){animation-delay:.3s}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes dp{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
    .screen{position:absolute;top:0;left:0;right:0;bottom:0;display:none;overflow:hidden}
    .screen.active{display:block}
    .screen iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;touch-action:manipulation}
    body.has-nav .screen iframe{height:calc(100dvh - 56px - env(safe-area-inset-bottom,0px))}
    #app-nav{position:fixed;bottom:0;left:0;right:0;height:calc(56px + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:#fff;box-shadow:0 -1px 0 rgba(0,0,0,.05);display:none;justify-content:space-around;align-items:center;z-index:100}
    body.has-nav #app-nav{display:flex}
    .nb{padding:6px 0 2px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:#b0b8cc;font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;cursor:pointer;position:relative;transition:color .15s;-webkit-tap-highlight-color:transparent}
    .nb .ni{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:all .15s}
    .nb .ni svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .nb.active{color:#162b5e}
    .nb.active .ni{background:#162b5e;width:38px}
    .nb.active .ni svg{stroke:#fff}
    .nbdg{position:absolute;top:1px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:#FF3B5C;border:1.5px solid #fff;display:none}
    .nbdg.show{display:block}
    #iosInstallBanner{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;color:#162b5e;padding:13px 22px;border-radius:16px;font-size:14px;font-weight:800;display:none;z-index:10000;max-width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);line-height:1.5}
    #iosInstallBanner a{color:#162b5e;text-decoration:underline}
    #iosInstallBanner .cb{display:inline-block;margin-left:12px;font-size:16px;cursor:pointer;opacity:.5;vertical-align:middle}
  </style>
</head>
<body>
<div id="splash"><div class="sb"><svg viewBox="0 0 48 48" fill="none"><circle cx="14" cy="12" r="7" fill="#162b5e"/><circle cx="34" cy="12" r="7" fill="#162b5e"/><circle cx="24" cy="26" r="16" fill="#162b5e"/><circle cx="14" cy="12" r="4.5" fill="#1e3872"/><circle cx="34" cy="12" r="4.5" fill="#1e3872"/><ellipse cx="24" cy="30" rx="6" ry="4.5" fill="#1e3872"/><circle cx="20" cy="24" r="2" fill="#fff"/><circle cx="28" cy="24" r="2" fill="#fff"/><ellipse cx="24" cy="29" rx="2.5" ry="1.5" fill="#162b5e"/></svg></div><div class="sn">Cebear</div><div class="sd"><span></span><span></span><span></span></div></div>
<div class="screen" id="screen-auth"></div>
<div class="screen" id="screen-improve"></div>
<div class="screen" id="screen-profile"></div>
<div class="screen" id="screen-leaderboard"></div>
<div class="screen" id="screen-tasks"></div>
<nav id="app-nav">
  <button class="nb" data-page="leaderboard" onclick="goTo('leaderboard')"><span class="ni"><svg viewBox="0 0 24 24"><path d="M6 9H2v12h4V9z"/><path d="M14 4h-4v17h4V4z"/><path d="M22 13h-4v8h4v-8z"/></svg></span>Ranks</button>
  <button class="nb active" data-page="improve" onclick="goTo('improve')"><span class="ni"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></span>Train</button>
  <button class="nb" data-page="tasks" onclick="goTo('tasks')"><span class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12l3 3 5-6"/></svg></span>Tasks<span class="nbdg" id="tasks-badge"></span></button>
  <button class="nb" data-page="profile" onclick="goTo('profile')"><span class="ni"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0112 0v1"/></svg></span>Profile</button>
</nav>
<div id="iosInstallBanner" role="alert"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",authDomain:"braindeer-backend.firebaseapp.com",projectId:"braindeer-backend",storageBucket:"braindeer-backend.firebasestorage.app",messagingSenderId:"331205139765",appId:"1:331205139765:web:20cfef8194af63fc55c07c",measurementId:"G-9B6885G0X0"});
var WORKER_URL='https://cebear.com/api/redeem-install-token';
function showNav(s){document.body.classList.toggle('has-nav',s)}
function updateNavActive(p){document.querySelectorAll('#app-nav .nb').forEach(b=>b.classList.toggle('active',b.dataset.page===p))}
window.addEventListener('message',function(e){if(!e.data||!e.data.type)return;var t=e.data.type;if(t==='authSuccess')return goTo('improve');if(t==='googleRedirect')return void(window.location.href='google-redirect.html');if(t==='savePushSub')firebase.auth().onAuthStateChanged(u=>{if(u)firebase.firestore().collection('pushSubscriptions').doc(u.uid).set({subscription:e.data.sub,uid:u.uid,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{})});if(t==='tasksUpdated'){var f=document.querySelector('#screen-tasks iframe');if(f)f.contentWindow.postMessage({type:'tasksUpdated'},'*')}if(t==='xpAwarded'){var f2=document.querySelector('#screen-improve iframe');if(f2)f2.contentWindow.postMessage({type:'xpAwarded',xp:e.data.xp},'*')}});
var currentScreen=null,screensLoaded={};
window.goTo=function(page){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));if((page==='profile'||page==='leaderboard')&&screensLoaded[page]){var old=document.querySelector('#screen-'+page+' iframe');if(old)old.remove();screensLoaded[page]=false}if(!screensLoaded[page]){var c=document.getElementById('screen-'+page);if(!c)return;var f=document.createElement('iframe');f.src=page+'.html';f.allow='web-share';c.appendChild(f);screensLoaded[page]=true}document.getElementById('screen-'+page)?.classList.add('active');currentScreen=page;showNav(page!=='auth');updateNavActive(page);var sp=document.getElementById('splash');if(sp&&!sp.classList.contains('hide')){sp.classList.add('hide');setTimeout(()=>sp.parentNode&&sp.remove(),400)}};
window.authCheck=function(){};
function ensureUser(u){var r=firebase.firestore().collection('users').doc(u.uid);return r.get().then(s=>s.exists?r.set({lastSeen:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}):r.set({uid:u.uid,email:u.email,username:u.displayName||null,pic:u.photoURL||null,createdAt:firebase.firestore.FieldValue.serverTimestamp(),lastSeen:firebase.firestore.FieldValue.serverTimestamp()}))}
function generateInstallToken(){var u=firebase.auth().currentUser;if(!u)return Promise.resolve(null);var t=Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2)+Date.now().toString(36);return firebase.firestore().collection('installTokens').doc(t).set({uid:u.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp(),expiresAt:new Date(Date.now()+600000),used:false}).then(()=>t).catch(()=>null)}
function showIOSBanner(user){if(('standalone' in navigator)&&navigator.standalone)return;if(!/iphone|ipad|ipod/i.test(navigator.userAgent))return;if(sessionStorage.getItem('iosBannerDismissed'))return;function rb(h){var b=document.getElementById('iosInstallBanner');b.innerHTML=h;b.style.display='block';document.getElementById('closeBanner')?.addEventListener('click',()=>{b.style.display='none';sessionStorage.setItem('iosBannerDismissed','1')})}if(user)generateInstallToken().then(t=>{var url=t?'https://cebear.com/app.html?t='+t:'https://cebear.com/app.html';rb('Install: <a href="'+url+'">Tap here</a>, Share → Add to Home Screen<span class="cb" id="closeBanner">✕</span>')});else rb('Tap <strong>Share</strong> → <strong>Add to Home Screen</strong><span class="cb" id="closeBanner">✕</span>')}
function redeemSessionToken(sid){return firebase.firestore().collection('authSessions').doc(sid).get().then(s=>{if(!s.exists)throw'nf';var d=s.data();if(d.used)throw'u';var exp=d.expiresAt?.toDate?d.expiresAt.toDate():new Date(d.expiresAt);if(new Date()>exp)throw'e';s.ref.update({used:true});return firebase.auth().signInWithCredential(firebase.auth.GoogleAuthProvider.credential(d.idToken))})}
(function(){localStorage.removeItem('iq_guest');var p=new URLSearchParams(location.search),tT=p.get('t'),sI=p.get('session');if(tT||sI)history.replaceState({},'',location.pathname);var gT=sessionStorage.getItem('bd_gis_token');if(gT){sessionStorage.removeItem('bd_gis_token');firebase.auth().signInWithCredential(firebase.auth.GoogleAuthProvider.credential(gT)).then(r=>ensureUser(r.user)).then(()=>goTo('improve')).catch(()=>nb());return}if(sI)redeemSessionToken(sI).then(()=>nb()).catch(()=>nb());else if(tT)fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:tT})}).then(r=>r.ok?r.json():null).then(b=>{if(b?.customToken)return firebase.auth().signInWithCustomToken(b.customToken).then(()=>location.reload());nb()}).catch(()=>nb());else nb();function nb(){var unsub=firebase.auth().onAuthStateChanged(u=>{unsub();goTo(u?'improve':'auth');showIOSBanner(u)})}})();
var deferredPrompt=null;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e});window.triggerInstall=function(){deferredPrompt?.prompt();deferredPrompt?.userChoice.then(()=>deferredPrompt=null)};window.addEventListener('appinstalled',()=>{deferredPrompt=null;document.getElementById('iosInstallBanner').style.display='none'});
</script>
</body>
</html>
