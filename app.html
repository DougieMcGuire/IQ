<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F2EBD9">
  <link rel="manifest" href="manifest.json">
  <title>IQ Profile</title>
  <style>
    :root { --bg: #F2EBD9; --tan: #C4AD8A; --ink: #2A2018; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); overflow: hidden; height: 100dvh; }

    .screen {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      background: var(--bg);
    }
    .screen.active { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

<iframe src="IQ/auth.html"    class="screen active" id="screen-auth"></iframe>
<iframe src="IQ/improve.html" class="screen"        id="screen-improve"></iframe>
<iframe src="IQ/profile.html" class="screen"        id="screen-profile"></iframe>

<script>
  // Called from inside any iframe: parent.goTo('profile')
  function goTo(page) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    var el = document.getElementById('screen-' + page);
    if (el) el.classList.add('active');
  }

  // On load: check if user is already logged in.
  // If yes, skip auth and go straight to improve.
  // If no, stay on auth (it's already the active screen).
  function authCheck() {
    var isGuest = localStorage.getItem('iq_guest') === '1';
    var hasFirebaseUser = Object.keys(localStorage)
      .some(k => k.startsWith('firebase:authUser:'));
    if (isGuest || hasFirebaseUser) {
      goTo('improve');
    }
    // else: do nothing, auth screen stays visible
  }
</script>

</body>
</html>
