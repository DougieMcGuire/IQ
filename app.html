<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1b2d5b">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>Cebear</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100dvh;overflow:hidden;background:#1b2d5b;font-family:'Nunito',sans-serif;touch-action:manipulation}
    #splash{position:fixed;inset:0;z-index:9999;background:#151f3e;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .35s}
    #splash.hide{opacity:0;pointer-events:none}
    #splash .sb{width:72px;height:72px;display:flex;align-items:center;justify-content:center;animation:bob 1.4s ease-in-out infinite}
    #splash .sb img{width:100%;height:100%;object-fit:contain}
    #splash .sn{font-size:28px;font-weight:900;color:#F0EAD6;margin-top:14px;letter-spacing:-.5px}
    #splash .sd{margin-top:18px;display:flex;gap:7px}
    #splash .sd span{width:8px;height:8px;border-radius:50%;background:rgba(240,234,214,.2);animation:dp 1s ease infinite}
    #splash .sd span:nth-child(2){animation-delay:.15s}
    #splash .sd span:nth-child(3){animation-delay:.3s}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes dp{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
    .screen{position:absolute;top:0;left:0;right:0;bottom:0;display:none;overflow:hidden}
    .screen.active{display:block}
    .screen iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;touch-action:manipulation}
    body.has-nav .screen iframe{height:calc(100dvh - 58px - env(safe-area-inset-bottom,0px))}
    #nav{position:fixed;bottom:0;left:0;right:0;height:calc(58px + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:#1b2d5b;border-top:1px solid rgba(240,234,214,.08);display:none;justify-content:space-around;align-items:center;z-index:100}
    body.has-nav #nav{display:flex}
    .nb{padding:8px 0 2px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(240,234,214,.35);font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;cursor:pointer;position:relative;transition:color .15s;-webkit-tap-highlight-color:transparent}
    .nb .ni{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:all .2s}
    .nb .ni svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
    .nb.active{color:#F0EAD6}
    .nb.active .ni{background:rgba(240,234,214,.15);width:42px;height:28px}
    .nb.active .ni svg{stroke:#F0EAD6}
    .nbdg{position:absolute;top:4px;right:calc(50% - 16px);width:8px;height:8px;border-radius:50%;background:#e8443a;border:2px solid #1b2d5b;display:none}
    .nbdg.show{display:block}

    /* Auth-wait overlay shown inside a screen while waiting for Firebase */
    .auth-wait{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#1b2d5b}
    .auth-wait-dot{width:10px;height:10px;border-radius:50%;background:rgba(240,234,214,.2);animation:dp 1s ease infinite}
    .auth-wait-dot:nth-child(2){animation-delay:.15s}
    .auth-wait-dot:nth-child(3){animation-delay:.3s}
    .auth-wait-dots{display:flex;gap:7px}
  </style>
</head>
<body>
<div id="splash"><div class="sb"><img src="logo.png" alt="Cebear" style="width:48px;height:48px;object-fit:contain"></div><div class="sn">Cebear</div><div class="sd"><span></span><span></span><span></span></div></div>
<div class="screen" id="screen-auth"></div>
<div class="screen" id="screen-improve"></div>
<div class="screen" id="screen-profile"></div>
<div class="screen" id="screen-leaderboard"></div>
<div class="screen" id="screen-tasks"></div>
<nav id="nav">
  <button class="nb" data-page="leaderboard" onclick="goTo('leaderboard')"><span class="ni"><svg viewBox="0 0 24 24"><path d="M6 9H2v12h4V9z"/><path d="M14 4h-4v17h4V4z"/><path d="M22 13h-4v8h4v-8z"/></svg></span>Ranks</button>
  <button class="nb active" data-page="improve" onclick="goTo('improve')"><span class="ni"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></span>Train</button>
  <button class="nb" data-page="tasks" onclick="goTo('tasks')"><span class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12l3 3 5-6"/></svg></span>Tasks<span class="nbdg" id="tasks-badge"></span></button>
  <button class="nb" data-page="profile" onclick="goTo('profile')"><span class="ni"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0112 0v1"/></svg></span>Profile</button>
</nav>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyBQDs2EXmb0YodZob6Hz4cSTm_hB146-No",authDomain:"braindeer-backend.firebaseapp.com",projectId:"braindeer-backend",storageBucket:"braindeer-backend.firebasestorage.app",messagingSenderId:"331205139765",appId:"1:331205139765:web:20cfef8194af63fc55c07c",measurementId:"G-9B6885G0X0"});
var WORKER_URL='https://cebear.com/api/redeem-install-token';

var isStandalone=!!(('standalone' in navigator&&navigator.standalone)||window.matchMedia('(display-mode: standalone)').matches);

function showNav(s){document.body.classList.toggle('has-nav',s)}
function updateNavActive(p){document.querySelectorAll('#nav .nb').forEach(b=>b.classList.toggle('active',b.dataset.page===p))}

// Auth state — resolved promise so we can await it
var _isAuthed=false;
var _authResolved=false;
var _authCallbacks=[];
function _onAuthResolve(u){
  _isAuthed=!!u;
  _authResolved=true;
  _authCallbacks.forEach(function(fn){try{fn(u)}catch{}});
  _authCallbacks=[];
}
// Returns a promise that resolves when auth state is known
function authReady(){
  if(_authResolved)return Promise.resolve(_isAuthed);
  return new Promise(function(res){_authCallbacks.push(function(){res(_isAuthed)})});
}

firebase.auth().onAuthStateChanged(function(u){
  _onAuthResolve(u);
  if(u&&currentScreen==='auth')goTo('improve');
});

/* ══ GUEST WALL NAV INTERCEPTION ══ */
function tryGuestWall(page){
  if(isStandalone)return false;
  if(_isAuthed)return false;
  if(page!=='profile'&&page!=='tasks'&&page!=='leaderboard')return false;
  try{
    var improveFrame=document.querySelector('#screen-improve iframe');
    if(improveFrame&&improveFrame.contentWindow&&typeof improveFrame.contentWindow.showGuestWallForNav==='function'){
      return improveFrame.contentWindow.showGuestWallForNav(page);
    }
  }catch(err){}
  goTo('auth');
  return true;
}

window.addEventListener('message',function(e){
  if(!e.data?.type)return;
  var t=e.data.type;
  if(t==='authSuccess'){
    _isAuthed=true;
    if(currentScreen==='auth')goTo('improve');
    return;
  }
  if(t==='googleRedirect')return void(location.href='google-redirect.html');
  if(t==='googleAuthRequest'){
    var gp=new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(gp).then(function(r){
      _isAuthed=true;
      var f=document.querySelector('#screen-improve iframe');
      if(f&&f.contentWindow)f.contentWindow.postMessage({type:'authSuccess'},'*');
    }).catch(function(err){
      if(err.code==='auth/popup-closed-by-user'||err.code==='auth/cancelled-popup-request')return;
      var f=document.querySelector('#screen-improve iframe');
      if(f&&f.contentWindow)f.contentWindow.postMessage({type:'authError',msg:'Google sign-in failed. Try email instead.'},'*');
    });
    return;
  }
  if(t==='savePushSub')firebase.auth().onAuthStateChanged(function(u){if(u)firebase.firestore().collection('pushSubscriptions').doc(u.uid).set({subscription:e.data.sub,uid:u.uid,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(function(){})});
  if(t==='tasksUpdated'){var f=document.querySelector('#screen-tasks iframe');f&&f.contentWindow&&f.contentWindow.postMessage({type:'tasksUpdated'},'*')}
  if(t==='xpAwarded'){var f2=document.querySelector('#screen-improve iframe');f2&&f2.contentWindow&&f2.contentWindow.postMessage({type:'xpAwarded',xp:e.data.xp},'*')}
});

var currentScreen=null,screensLoaded={};

// Auth-required pages — on standalone we wait for Firebase before loading the iframe
// so the page doesn't render with a null user
var AUTH_REQUIRED_PAGES=['profile','tasks','leaderboard'];

function showAuthWait(screenEl){
  var w=document.createElement('div');
  w.className='auth-wait';
  w.id='auth-wait-'+screenEl.id;
  w.innerHTML='<div class="auth-wait-dots"><div class="auth-wait-dot"></div><div class="auth-wait-dot"></div><div class="auth-wait-dot"></div></div>';
  screenEl.appendChild(w);
}
function removeAuthWait(screenEl){
  var w=screenEl.querySelector('.auth-wait');
  if(w)w.remove();
}

window.goTo=function(page){
  if(tryGuestWall(page))return;

  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});

  // Always reload profile + leaderboard (live data)
  if((page==='profile'||page==='leaderboard')&&screensLoaded[page]){
    var old=document.querySelector('#screen-'+page+' iframe');
    if(old)old.remove();
    screensLoaded[page]=false;
  }

  var sc=document.getElementById('screen-'+page);
  if(sc)sc.classList.add('active');
  currentScreen=page;
  showNav(page!=='auth');
  updateNavActive(page);
  dismissSplash();

  if(screensLoaded[page])return;

  var c=document.getElementById('screen-'+page);
  if(!c)return;

  // For auth-required pages on standalone: wait until Firebase auth is resolved
  // before creating the iframe, so the page loads with a known user state
  if(AUTH_REQUIRED_PAGES.indexOf(page)!==-1&&isStandalone&&!_authResolved){
    showAuthWait(c);
    authReady().then(function(){
      removeAuthWait(c);
      // If still on this page, load the iframe
      if(currentScreen===page)_loadIframe(page,c);
    });
    return;
  }

  _loadIframe(page,c);
};

function _loadIframe(page,c){
  if(screensLoaded[page])return;
  var f=document.createElement('iframe');
  var src=page+'.html';
  if(page==='improve'){
    var sharedQs=sessionStorage.getItem('cebear_shared_qs');
    if(sharedQs){src=page+'.html'+sharedQs;sessionStorage.removeItem('cebear_shared_qs')}
  }
  f.src=src;
  f.allow='web-share';
  c.appendChild(f);
  screensLoaded[page]=true;
}

function dismissSplash(){
  var sp=document.getElementById('splash');
  if(sp&&!sp.classList.contains('hide')){sp.classList.add('hide');setTimeout(function(){sp.parentNode&&sp.remove()},400)}
}

window.authCheck=function(){};

function ensureUser(u){
  var r=firebase.firestore().collection('users').doc(u.uid);
  return r.get().then(function(s){
    return s.exists
      ?r.set({lastSeen:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})
      :r.set({uid:u.uid,email:u.email,username:u.displayName||null,pic:u.photoURL||null,createdAt:firebase.firestore.FieldValue.serverTimestamp(),lastSeen:firebase.firestore.FieldValue.serverTimestamp()});
  });
}

function generateInstallToken(){
  var u=firebase.auth().currentUser;
  if(!u)return Promise.resolve(null);
  var t=Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2)+Date.now().toString(36);
  return firebase.firestore().collection('installTokens').doc(t).set({uid:u.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp(),expiresAt:new Date(Date.now()+600000),used:false}).then(function(){return t}).catch(function(){return null});
}

function redeemSessionToken(sid){
  return firebase.firestore().collection('authSessions').doc(sid).get().then(function(s){
    if(!s.exists)throw'nf';
    var d=s.data();
    if(d.used)throw'u';
    var exp=d.expiresAt?.toDate?d.expiresAt.toDate():new Date(d.expiresAt);
    if(new Date()>exp)throw'e';
    s.ref.update({used:true});
    return firebase.auth().signInWithCredential(firebase.auth.GoogleAuthProvider.credential(d.idToken));
  });
}

(function(){
  localStorage.removeItem('iq_guest');
  var p=new URLSearchParams(location.search),tT=p.get('t'),sI=p.get('session');
  if(tT||sI)history.replaceState({},'',location.pathname);
  var gT=sessionStorage.getItem('bd_gis_token');
  if(gT){
    sessionStorage.removeItem('bd_gis_token');
    firebase.auth().signInWithCredential(firebase.auth.GoogleAuthProvider.credential(gT))
      .then(function(r){return ensureUser(r.user)})
      .then(function(){goTo('improve')})
      .catch(function(){nb()});
    return;
  }
  if(sI)redeemSessionToken(sI).then(function(){nb()}).catch(function(){nb()});
  else if(tT)fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:tT})})
    .then(function(r){return r.ok?r.json():null})
    .then(function(b){
      if(b?.customToken)return firebase.auth().signInWithCustomToken(b.customToken).then(function(){location.reload()});
      nb();
    })
    .catch(function(){nb()});
  else nb();

  function nb(){
    // authReady is already wired to onAuthStateChanged above.
    // Just handle shared Q params and navigate to improve.
    var qp=new URLSearchParams(location.search);
    var qParam=qp.get('q'),fromParam=qp.get('from');
    if(qParam||fromParam){
      var qs='?';
      if(qParam)qs+='q='+encodeURIComponent(qParam);
      if(fromParam)qs+=(qParam?'&':'')+'from='+encodeURIComponent(fromParam);
      sessionStorage.setItem('cebear_shared_qs',qs);
      history.replaceState({},'',location.pathname);
    }
    // Navigate immediately — don't wait for auth for the improve feed
    goTo('improve');
  }
})();

var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e});
window.triggerInstall=function(){deferredPrompt&&deferredPrompt.prompt()};
</script>
</body>
</html>
