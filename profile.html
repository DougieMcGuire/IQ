<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Profile — Cebear</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--cream:#F0EAD6;--navy:#1b2d5b;--navyM:#243a6e;--navyL:#2f4a88;--card:#fff;--text:#1b2d5b;--dim:#6b7a9e;--light:#a0acc4;--green:#3fba4f;--gd:#2d9a3c;--red:#e8443a;--gold:#e8a817;--goldd:#c48e10;--blue:#3a7df2;--purple:#6d4aed;--orange:#e87d1a;--pink:#e8557a}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100dvh;font-family:'Nunito',sans-serif;background:var(--navy);color:var(--text);overflow:hidden}
    body{display:flex;flex-direction:column}
    .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .scroll::-webkit-scrollbar{display:none}

    /* ══ CREAM TOP — avatar + IQ hero ══ */
    .hero{
      background:var(--cream);
      padding:calc(env(safe-area-inset-top,20px) + 10px) 20px 0;
      display:flex;flex-direction:column;align-items:center;
      position:relative;
    }
    .hero-hdr{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .hero-name{font-size:14px;font-weight:800;color:var(--dim)}
    .hero-out{background:rgba(27,45,91,.06);border:none;padding:7px 14px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:var(--dim);cursor:pointer}

    .av-wrap{position:relative;margin-bottom:10px}
    .av{width:min(100px,24vw);height:min(100px,24vw);border-radius:50%;background:var(--navy);overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;border:4px solid var(--navy);box-shadow:0 4px 16px rgba(27,45,91,.2);transition:transform .15s}
    .av:active{transform:scale(.94)}
    .av img{width:100%;height:100%;object-fit:cover;display:none}
    .av svg{width:40%;height:40%;stroke:rgba(240,234,214,.35);fill:none;stroke-width:1.5}
    .av-edit{position:absolute;bottom:2px;right:2px;width:28px;height:28px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--cream)}
    .av-edit svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5}
    #avatar-input{display:none}

    .iq-big{font-size:min(80px,20vw);font-weight:900;line-height:1;color:var(--navy)}
    .iq-lbl{font-size:14px;font-weight:900;color:var(--light);letter-spacing:5px;text-transform:uppercase;margin-bottom:6px}
    .pct{background:var(--navy);color:var(--cream);font-size:12px;font-weight:900;padding:5px 18px;border-radius:20px;margin-bottom:16px}

    /* ── Share CTA on cream ── */
    .share-cta{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:400px;padding:15px;background:var(--gold);color:var(--navy);border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:1px;position:relative;overflow:hidden;box-shadow:0 4px 0 var(--goldd);transition:transform .1s;margin-bottom:4px}
    .share-cta:active{transform:translateY(4px);box-shadow:none}
    .share-cta svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;flex-shrink:0}
    .share-cta::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);animation:shimmer 3s infinite}
    @keyframes shimmer{0%{left:-100%}100%{left:200%}}
    .share-cta.uploading{opacity:.6;pointer-events:none}
    .share-nudge{text-align:center;font-size:11px;font-weight:700;color:var(--dim);margin-bottom:20px}

    /* ══ NAVY BOTTOM ══ */
    .navy-section{
      background:var(--navy);
      border-radius:28px 28px 0 0;
      padding:24px 16px 32px;
    }
    .navy-inner{max-width:420px;margin:0 auto}

    /* ── Stats: 2×2 grid, cream cards ── */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .sg{background:rgba(240,234,214,.08);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px}
    .sg-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sg-ic svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
    .sg-ic.i1{background:var(--green)}.sg-ic.i2{background:var(--blue)}.sg-ic.i3{background:var(--orange)}.sg-ic.i4{background:var(--purple)}
    .sg-info{display:flex;flex-direction:column}
    .sg-val{font-size:min(22px,5.5vw);font-weight:900;color:var(--cream);line-height:1.1}
    .sg-lbl{font-size:10px;font-weight:800;color:rgba(240,234,214,.35);margin-top:1px}

    /* ── Abilities: contained card with rows ── */
    .ab-title{font-size:11px;font-weight:900;color:rgba(240,234,214,.3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
    .ab-card{background:rgba(240,234,214,.05);border-radius:18px;padding:6px 0;overflow:hidden}
    .ab-row{display:flex;align-items:center;gap:12px;padding:10px 16px}
    .ab-row+.ab-row{border-top:1px solid rgba(240,234,214,.04)}
    .ab-dot{width:4px;height:24px;border-radius:2px;flex-shrink:0}
    .ab-mid{flex:1;min-width:0}
    .ab-name{font-size:12px;font-weight:800;color:rgba(240,234,214,.55);margin-bottom:5px}
    .ab-bar{height:6px;background:rgba(240,234,214,.06);border-radius:3px;overflow:hidden}
    .ab-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}
    .ab-val{font-size:16px;font-weight:900;color:var(--cream);min-width:30px;text-align:right}

    .reset-btn{margin:20px auto 0;background:none;border:none;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:rgba(240,234,214,.12);cursor:pointer;display:block;padding:12px;text-align:center}

    /* ══ SHARE MODAL ══ */
    .modal-overlay{position:fixed;inset:0;background:rgba(27,45,91,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center;z-index:200}
    .modal-overlay.show{display:flex}
    .modal-sheet{background:var(--cream);border-radius:24px 24px 0 0;width:100%;max-width:440px;padding:10px 16px calc(16px + env(safe-area-inset-bottom,0px));animation:sheetUp .28s cubic-bezier(.32,.72,0,1)}
    @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .sheet-handle{width:36px;height:4px;background:rgba(27,45,91,.12);border-radius:2px;margin:0 auto 16px}
    .card-preview{background:rgba(27,45,91,.06);border-radius:16px;overflow:hidden;margin-bottom:16px}.card-preview canvas{width:100%;display:block}
    .share-link-bar{display:flex;gap:8px;margin-bottom:16px}
    .share-link-url{flex:1;background:rgba(27,45,91,.06);border:none;border-radius:10px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .share-link-copy{background:var(--navy);color:var(--cream);border:none;border-radius:10px;padding:11px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;cursor:pointer}
    .share-label{font-size:11px;font-weight:800;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
    .share-grid{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}.share-grid::-webkit-scrollbar{display:none}
    .share-dest{flex-shrink:0;width:68px;background:rgba(27,45,91,.06);border:none;border-radius:14px;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;color:var(--text);transition:transform .1s}
    .share-dest:active{transform:scale(.93)}
    .sd-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .sd-icon svg{width:18px;height:18px;fill:#fff}
    .sd-native .sd-icon{background:var(--blue)}.sd-native .sd-icon svg{fill:none;stroke:#fff;stroke-width:2.5}
    .sd-copy .sd-icon{background:var(--navy)}.sd-copy .sd-icon svg{fill:none;stroke:#fff;stroke-width:2.5}
    .sd-x .sd-icon{background:#000}.sd-wa .sd-icon{background:#25D366}
    .sd-save .sd-icon{background:var(--green)}.sd-save .sd-icon svg{fill:none;stroke:#fff;stroke-width:2.5}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;padding:10px 20px;border-radius:14px;font-size:14px;font-weight:800;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="scroll">
  <!-- ══ CREAM TOP ══ -->
  <div class="hero">
    <div class="hero-hdr"><div class="hero-name" id="username-display"></div><button class="hero-out" id="signout-btn">Sign out</button></div>
    <div class="av-wrap">
      <div class="av" id="avatar-tap"><img id="avatar-img" src="" alt=""><svg id="avatar-icon" viewBox="0 0 64 64"><circle cx="32" cy="22" r="12"/><path d="M8 58C8 44 18 36 32 36C46 36 56 44 56 58"/></svg></div>
      <div class="av-edit" id="avatar-edit-btn"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg></div>
      <input type="file" id="avatar-input" accept="image/*">
    </div>
    <div class="iq-big" id="iq-num">--</div>
    <div class="iq-lbl">I Q</div>
    <div class="pct" id="pct-badge" style="display:none"></div>

    <button class="share-cta" id="share-btn"><svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>Share Your IQ</button>
    <div class="share-nudge">Challenge your friends — who's smarter?</div>
  </div>

  <!-- ══ NAVY BOTTOM ══ -->
  <div class="navy-section">
    <div class="navy-inner">
      <div class="stats-grid">
        <div class="sg"><div class="sg-ic i1"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/></svg></div><div class="sg-info"><div class="sg-val" id="answered">0</div><div class="sg-lbl">Answered</div></div></div>
        <div class="sg"><div class="sg-ic i2"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div><div class="sg-info"><div class="sg-val" id="accuracy">0%</div><div class="sg-lbl">Accuracy</div></div></div>
        <div class="sg"><div class="sg-ic i3"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div><div class="sg-info"><div class="sg-val" id="best-streak">0</div><div class="sg-lbl">Best Streak</div></div></div>
        <div class="sg"><div class="sg-ic i4"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div><div class="sg-info"><div class="sg-val" id="level-val">1</div><div class="sg-lbl">Level</div></div></div>
      </div>

      <div class="ab-title">Abilities</div>
      <div class="ab-card" id="abilities"></div>
      <button class="reset-btn" id="reset-btn">Reset Progress</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="share-modal"><div class="modal-sheet"><div class="sheet-handle"></div><div class="card-preview" id="card-preview"></div><div class="share-link-bar"><input class="share-link-url" id="share-url" readonly value=""><button class="share-link-copy" id="copy-link">Copy link</button></div><div class="share-label">Share to</div><div class="share-grid" id="share-grid"></div></div></div>
<div class="toast" id="toast"></div>

<script type="module">
import{IQData,iqToPercentile,formatPercentile}from'./data.js';import Haptics from'./haptics.js';
if(window.parent!==window)parent.authCheck();window.navGo=(p)=>{Haptics.light();parent.goTo(p)};
var AB=[{key:'patternRecognition',name:'Pattern',color:'#e87d1a'},{key:'problemSolving',name:'Problem Solving',color:'#e8443a'},{key:'mentalAgility',name:'Agility',color:'#3fba4f'},{key:'workingMemory',name:'Memory',color:'#6d4aed'},{key:'verbalReasoning',name:'Verbal',color:'#3a7df2'},{key:'logicalReasoning',name:'Logic',color:'#1b2d5b'},{key:'spatialAwareness',name:'Emotional',color:'#e8557a'},{key:'numericalReasoning',name:'Spatial',color:'#e8a817'}];
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function load(){var d=IQData.load();document.getElementById('username-display').textContent=d.username||IQData.getCurrentUser()?.displayName||'';
if(d.iq){document.getElementById('iq-num').textContent=d.iq;var b=document.getElementById('pct-badge');b.textContent='Top '+formatPercentile(iqToPercentile(d.iq));b.style.display='inline-block'}
document.getElementById('answered').textContent=d.answered||0;document.getElementById('accuracy').textContent=IQData.getAccuracy()+'%';document.getElementById('best-streak').textContent=d.bestStreak||0;document.getElementById('level-val').textContent=d.level||1;
if(d.pic){document.getElementById('avatar-img').src=d.pic;document.getElementById('avatar-img').style.display='block';document.getElementById('avatar-icon').style.display='none'}
var list=document.getElementById('abilities');list.innerHTML='';
AB.forEach(a=>{var pct=IQData.getStatPercent(a.key);var row=document.createElement('div');row.className='ab-row';
row.innerHTML='<div class="ab-dot" style="background:'+a.color+'"></div><div class="ab-mid"><div class="ab-name">'+a.name+'</div><div class="ab-bar"><div class="ab-fill" style="background:'+a.color+';width:0%" data-val="'+pct+'"></div></div></div><div class="ab-val">'+pct+'</div>';
list.appendChild(row)});
requestAnimationFrame(()=>setTimeout(()=>{document.querySelectorAll('.ab-fill').forEach(b=>{b.style.width=Math.max(6,parseInt(b.dataset.val))+'%'})},80))}

function handleAvatarFile(f){if(!f)return;var r=new FileReader();r.onload=e=>{var img=new Image();img.onload=()=>{var c=document.createElement('canvas');c.width=c.height=200;var ctx=c.getContext('2d');var min=Math.min(img.width,img.height);ctx.drawImage(img,(img.width-min)/2,(img.height-min)/2,min,min,0,0,200,200);var url=c.toDataURL('image/jpeg',.8);IQData.setProfilePic(url);document.getElementById('avatar-img').src=url;document.getElementById('avatar-img').style.display='block';document.getElementById('avatar-icon').style.display='none';Haptics.success();toast('Photo updated!')};img.src=e.target.result};r.readAsDataURL(f)}
document.getElementById('avatar-tap').onclick=()=>{Haptics.medium();document.getElementById('avatar-input').click()};
document.getElementById('avatar-edit-btn').onclick=()=>{Haptics.medium();document.getElementById('avatar-input').click()};
document.getElementById('avatar-input').onchange=e=>handleAvatarFile(e.target.files[0]);
document.getElementById('signout-btn').onclick=()=>{Haptics.warning();IQData.signOut()};
document.getElementById('reset-btn').onclick=()=>{Haptics.warning();if(confirm('Reset all progress?')){Haptics.error();IQData.reset();location.reload()}};

/* ══════════════════════════════════════════
   SHARE CARD — redesigned, fills space,
   loads profile pic properly, includes logo
   ══════════════════════════════════════════ */
var shareCanvas=null,shareUrl='';
function getShareUrl(){var u=IQData.getCurrentUser();return u?'https://cebear.com/share/'+u.uid:'https://cebear.com'}
function rr(c,x,y,w,h,r,f){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();if(f){c.fillStyle=f;c.fill()}}

function genShareCard(){
  var d=IQData.load(),W=1200,H=630,cv=document.createElement('canvas');
  cv.width=W;cv.height=H;var c=c=cv.getContext('2d');
  var uname=d.username||IQData.getCurrentUser()?.displayName||'Brain';
  var acc=IQData.getAccuracy(),pic=d.pic||null;

  // Full navy bg
  c.fillStyle='#1b2d5b';c.fillRect(0,0,W,H);

  // Cream accent band on left
  c.fillStyle='#F0EAD6';
  rr(c,0,0,W*0.42,H,0,'#F0EAD6');

  // ── LEFT SIDE (cream) ──
  var leftCx=W*0.21;

  // Profile pic — big
  var picR=65;
  var picY=110;
  c.save();
  c.fillStyle='#1b2d5b';
  c.beginPath();c.arc(leftCx,picY,picR+4,0,Math.PI*2);c.fill();
  c.fillStyle='#243a6e';
  c.beginPath();c.arc(leftCx,picY,picR,0,Math.PI*2);c.fill();
  if(!pic){c.font='900 42px Nunito';c.textAlign='center';c.textBaseline='middle';c.fillStyle='#F0EAD6';c.fillText('CB',leftCx,picY)}
  c.restore();

  // Name
  c.font='800 22px Nunito';c.fillStyle='#1b2d5b';c.textAlign='center';c.textBaseline='top';
  c.fillText(uname,leftCx,picY+picR+16);

  // IQ number — huge
  c.font='900 120px Nunito';c.fillStyle='#1b2d5b';c.textBaseline='middle';
  c.fillText(String(d.iq||'--'),leftCx,340);

  // IQ label
  c.font='900 16px Nunito';c.fillStyle='#8b9ab8';c.letterSpacing='6px';
  c.fillText('I Q',leftCx,410);

  // Percentile badge
  if(d.iq){
    var pctText='TOP '+formatPercentile(iqToPercentile(d.iq)).toUpperCase();
    c.font='900 14px Nunito';var tw=c.measureText(pctText).width+32;
    rr(c,leftCx-tw/2,430,tw,30,15,'#e8a817');
    c.fillStyle='#1b2d5b';c.textBaseline='middle';c.fillText(pctText,leftCx,445);
  }

  // ── RIGHT SIDE (navy) ──
  var rightX=W*0.48, rightW=W*0.48;
  var ry=50;

  // Stats grid
  var stats=[
    {v:String(d.answered||0),l:'Answered',color:'#3fba4f'},
    {v:acc+'%',l:'Accuracy',color:'#3a7df2'},
    {v:String(d.bestStreak||0),l:'Best Streak',color:'#e87d1a'},
    {v:'Lvl '+(d.level||1),l:'Level',color:'#6d4aed'}
  ];
  var gapX=16,gapY=12;
  var cellW=(rightW-gapX)/2, cellH=80;

  stats.forEach(function(s,i){
    var col=i%2, row=Math.floor(i/2);
    var cx=rightX+col*(cellW+gapX), cy=ry+row*(cellH+gapY);
    rr(c,cx,cy,cellW,cellH,14,'rgba(240,234,214,0.06)');
    // Color dot
    c.fillStyle=s.color;
    c.beginPath();c.arc(cx+18,cy+cellH/2,6,0,Math.PI*2);c.fill();
    // Value
    c.font='900 28px Nunito';c.fillStyle='#F0EAD6';c.textAlign='left';c.textBaseline='middle';
    c.fillText(s.v,cx+32,cy+cellH/2-8);
    // Label
    c.font='700 12px Nunito';c.fillStyle='rgba(240,234,214,0.4)';
    c.fillText(s.l,cx+32,cy+cellH/2+14);
  });

  // Abilities bars
  var aby=ry+2*(cellH+gapY)+20;
  c.font='900 11px Nunito';c.fillStyle='rgba(240,234,214,0.25)';c.textAlign='left';c.textBaseline='top';
  c.fillText('ABILITIES',rightX,aby);
  aby+=22;

  var cats=AB.slice(0,6);
  var barH=8,barGap=28;
  cats.forEach(function(a,i){
    var y=aby+i*barGap;
    var pct=IQData.getStatPercent(a.key);
    // name
    c.font='800 11px Nunito';c.fillStyle='rgba(240,234,214,0.4)';c.textAlign='left';c.textBaseline='top';
    c.fillText(a.name,rightX,y);
    // value
    c.font='900 11px Nunito';c.fillStyle='#F0EAD6';c.textAlign='right';
    c.fillText(String(pct),rightX+rightW,y);
    // bar bg
    var barY=y+16;
    rr(c,rightX,barY,rightW,barH,4,'rgba(240,234,214,0.06)');
    // bar fill
    if(pct>0) rr(c,rightX,barY,rightW*(pct/100),barH,4,a.color);
  });

  // ── BOTTOM: logo + branding ──
  c.font='800 14px Nunito';c.fillStyle='rgba(240,234,214,0.2)';c.textAlign='center';c.textBaseline='bottom';
  c.fillText('cebear.com',W/2,H-24);

  shareCanvas=cv;

  // Load profile pic async — draw into the circle
  if(pic){
    var img=new Image();
    img.crossOrigin='anonymous';
    img.onload=function(){
      c.save();
      c.beginPath();c.arc(leftCx,picY,picR,0,Math.PI*2);c.clip();
      c.drawImage(img,leftCx-picR,picY-picR,picR*2,picR*2);
      c.restore();
    };
    img.src=pic;
  }

  // Load logo.png async — place in bottom-left of cream area
  var logo=new Image();
  logo.crossOrigin='anonymous';
  logo.onload=function(){
    var lw=36,lh=36;
    // Place logo above the branding text, left side
    c.drawImage(logo,leftCx-lw/2,H-70,lw,lh);
  };
  logo.src='logo.png';

  return cv;
}

async function uploadShareCard(){
  var user=IQData.getCurrentUser();if(!user||!shareCanvas)return;var d=IQData.load();
  // Wait a beat for async images to paint
  await new Promise(r=>setTimeout(r,300));
  try{
    var du=shareCanvas.toDataURL('image/png');var b64=du.split(',')[1];
    var sd=new parent.Object();sd.iq=d.iq||0;sd.username=d.username||user.displayName||'Brain';sd.answered=d.answered||0;sd.accuracy=parseInt(IQData.getAccuracy())||0;sd.bestStreak=d.bestStreak||0;sd.cardBase64=b64;sd.updatedAt=new Date().toISOString();
    await parent.firebase.firestore().collection('shares').doc(user.uid).set(sd);toast('Share card ready!')
  }catch{toast('Share failed — try again')}
}

function buildShareGrid(){var hn=!!navigator.share,grid=document.getElementById('share-grid');grid.innerHTML='';var opts=[];
if(hn)opts.push({id:'native',label:'Share',cls:'sd-native',icon:'<svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>'});
opts.push({id:'copylink',label:'Copy',cls:'sd-copy',icon:'<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>'});
opts.push({id:'x',label:'X',cls:'sd-x',icon:'<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'});
opts.push({id:'whatsapp',label:'WhatsApp',cls:'sd-wa',icon:'<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.13.556 4.13 1.532 5.87L.06 23.71l5.99-1.572A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>'});
opts.push({id:'save',label:'Save',cls:'sd-save',icon:'<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'});
opts.forEach(o=>{var b=document.createElement('button');b.className='share-dest '+o.cls;b.innerHTML='<div class="sd-icon">'+o.icon+'</div>'+o.label;b.onclick=()=>handleShareAction(o.id);grid.appendChild(b)})}

function getShareText(){var d=IQData.load();return d.iq?'My IQ is '+d.iq+' on Cebear! Top '+formatPercentile(iqToPercentile(d.iq))+' — can you beat me?':'Training my brain on Cebear!'}
function handleShareAction(id){Haptics.medium();var text=getShareText();switch(id){case'native':navigator.share({title:'My Cebear IQ',text:text,url:shareUrl}).catch(()=>{});break;case'copylink':navigator.clipboard.writeText(shareUrl).then(()=>{Haptics.success();toast('Link copied!')}).catch(()=>toast('Copy failed'));break;case'x':window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(shareUrl),'_blank');break;case'whatsapp':window.open('https://wa.me/?text='+encodeURIComponent(text+' '+shareUrl),'_blank');break;case'save':if(!shareCanvas)return;Haptics.success();var a=document.createElement('a');a.download='cebear-stats.png';a.href=shareCanvas.toDataURL('image/png');a.click();toast('Image saved!');break}}

async function openShare(){
  var fab=document.getElementById('share-btn');fab.classList.add('uploading');fab.textContent='Generating...';
  shareUrl=getShareUrl();genShareCard();
  // Wait for async image loads (profile pic + logo)
  await new Promise(r=>setTimeout(r,500));
  await uploadShareCard();
  fab.classList.remove('uploading');fab.innerHTML='<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Share Your IQ';
  document.getElementById('share-url').value=shareUrl;
  var pv=document.getElementById('card-preview');pv.innerHTML='';
  // Re-grab canvas after images loaded
  var pc=document.createElement('canvas');pc.width=600;pc.height=315;pc.getContext('2d').drawImage(shareCanvas,0,0,600,315);pv.appendChild(pc);
  buildShareGrid();document.getElementById('share-modal').classList.add('show');
}

document.getElementById('share-btn').onclick=()=>{Haptics.medium();openShare()};
document.getElementById('share-modal').onclick=e=>{if(e.target.id==='share-modal'){Haptics.light();document.getElementById('share-modal').classList.remove('show')}};
document.getElementById('copy-link').onclick=()=>handleShareAction('copylink');
load();
</script>
</body>
