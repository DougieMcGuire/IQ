<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Profile — Cebear</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#162b5e;--card:#fff;--text:#162b5e;--dim:#6b7a9e;--light:#a0acc4;--pill:#EEF0F7;--green:#2DC653;--gd:#22a344;--red:#FF3B5C;--gold:#FFB800;--blue:#3B82F6;--purple:#7C5CFC;--orange:#FF8C00;--pink:#FF6B9D}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100dvh;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    body{display:flex;flex-direction:column}
    .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .scroll::-webkit-scrollbar{display:none}

    /* ── Header row ── */
    .hdr{display:flex;justify-content:space-between;align-items:center;padding:calc(env(safe-area-inset-top,0px)+12px) 16px 0}
    .hdr-name{font-size:14px;font-weight:800;color:rgba(255,255,255,.6)}
    .hdr-out{background:rgba(255,255,255,.08);border:none;padding:7px 14px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:rgba(255,255,255,.4);cursor:pointer}

    /* ── Hero — avatar + IQ (kept in position) ── */
    .hero{display:flex;flex-direction:column;align-items:center;padding:20px 16px 0}
    .av-wrap{position:relative;margin-bottom:12px}
    .av{width:min(100px,25vw);height:min(100px,25vw);border-radius:50%;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.2);border:3px solid rgba(255,255,255,.25);transition:transform .1s}
    .av:active{transform:scale(.95)}
    .av img{width:100%;height:100%;object-fit:cover;display:none}
    .av svg{width:40%;height:40%;stroke:var(--light);fill:none;stroke-width:1.5}
    .av-edit{position:absolute;bottom:0;right:0;width:28px;height:28px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.2)}
    .av-edit svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5}
    #avatar-input{display:none}
    .iq-big{font-size:min(80px,20vw);font-weight:900;line-height:1;color:#fff}
    .iq-lbl{font-size:14px;font-weight:900;color:rgba(255,255,255,.3);letter-spacing:6px;text-transform:uppercase;margin-bottom:8px}
    .pct{background:var(--gold);color:var(--bg);font-size:12px;font-weight:900;padding:5px 16px;border-radius:8px;letter-spacing:.5px}

    /* ── SHARE CTA — massive, impossible to miss ── */
    .share-section{padding:16px 16px 0}
    .share-cta{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:linear-gradient(135deg,#FFB800 0%,#FF8C00 100%);color:var(--bg);border:none;border-radius:16px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:1px;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(255,184,0,.4);transition:transform .1s}
    .share-cta:active{transform:translateY(2px);box-shadow:0 2px 8px rgba(255,184,0,.3)}
    .share-cta svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.5;flex-shrink:0}
    .share-cta::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2.5s infinite}
    @keyframes shimmer{0%{left:-100%}100%{left:200%}}
    .share-cta.uploading{opacity:.6;pointer-events:none}
    .share-nudge{text-align:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.35);margin-top:6px}

    /* ── Stats — 2×2 grid cards ── */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 16px 0}
    .sg-card{background:var(--card);border-radius:16px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:4px}
    .sg-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
    .sg-icon svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
    .sg-icon.i1{background:var(--green)}.sg-icon.i2{background:var(--blue)}.sg-icon.i3{background:var(--orange)}.sg-icon.i4{background:var(--purple)}
    .sg-val{font-size:min(24px,6vw);font-weight:900;color:var(--text)}
    .sg-lbl{font-size:10px;font-weight:800;color:var(--dim)}

    /* ── Abilities — horizontal scrolling chips ── */
    .ab-section{padding:16px 0 0}
    .ab-title{font-size:11px;font-weight:900;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;padding:0 16px;margin-bottom:8px}
    .ab-scroll{display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity}
    .ab-scroll::-webkit-scrollbar{display:none}
    .ab-chip{flex-shrink:0;width:min(130px,35vw);background:var(--card);border-radius:16px;padding:14px 12px;scroll-snap-align:start}
    .ab-chip-name{font-size:11px;font-weight:800;color:var(--dim);margin-bottom:8px}
    .ab-chip-val{font-size:22px;font-weight:900;color:var(--text);margin-bottom:6px}
    .ab-chip-bar{height:6px;background:var(--pill);border-radius:3px;overflow:hidden}
    .ab-chip-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}

    .reset-btn{margin:20px auto 24px;background:none;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:rgba(255,255,255,.15);cursor:pointer;display:block;padding:12px;text-align:center}

    /* ── Share modal ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(22,43,94,.92);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;z-index:200}
    .modal-overlay.show{display:flex}
    .modal-sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:440px;padding:10px 16px calc(16px + env(safe-area-inset-bottom,0px));animation:sheetUp .28s cubic-bezier(.32,.72,0,1)}
    @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .sheet-handle{width:36px;height:4px;background:#dde0ea;border-radius:2px;margin:0 auto 16px}
    .card-preview{background:var(--pill);border-radius:16px;overflow:hidden;margin-bottom:16px}.card-preview canvas{width:100%;display:block}
    .share-link-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center}
    .share-link-url{flex:1;background:var(--pill);border:none;border-radius:10px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .share-link-copy{background:var(--bg);color:#fff;border:none;border-radius:10px;padding:11px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;cursor:pointer}
    .share-label{font-size:11px;font-weight:800;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
    .share-grid{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}.share-grid::-webkit-scrollbar{display:none}
    .share-dest{flex-shrink:0;width:72px;background:var(--pill);border:none;border-radius:14px;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;color:var(--text);transition:transform .1s}
    .share-dest:active{transform:scale(.93)}
    .share-dest .sd-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .share-dest .sd-icon svg{width:20px;height:20px;fill:#fff}
    .sd-native .sd-icon{background:var(--blue)}.sd-native .sd-icon svg{fill:none;stroke:#fff;stroke-width:2.5}
    .sd-copy .sd-icon{background:var(--bg)}.sd-copy .sd-icon svg{fill:none;stroke:#fff;stroke-width:2.5}
    .sd-x .sd-icon{background:#000}.sd-wa .sd-icon{background:#25D366}.sd-save .sd-icon{background:var(--green)}.sd-save .sd-icon svg{fill:none;stroke:#fff;stroke-width:2.5}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;padding:10px 20px;border-radius:14px;font-size:14px;font-weight:800;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="scroll">
  <div class="hdr"><div class="hdr-name" id="username-display"></div><button class="hdr-out" id="signout-btn">Sign out</button></div>
  <div class="hero">
    <div class="av-wrap">
      <div class="av" id="avatar-tap"><img id="avatar-img" src="" alt=""><svg id="avatar-icon" viewBox="0 0 64 64"><circle cx="32" cy="22" r="12"/><path d="M8 58C8 44 18 36 32 36C46 36 56 44 56 58"/></svg></div>
      <div class="av-edit" id="avatar-edit-btn"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg></div>
      <input type="file" id="avatar-input" accept="image/*">
    </div>
    <div class="iq-big" id="iq-num">--</div>
    <div class="iq-lbl">I Q</div>
    <div class="pct" id="pct-badge" style="display:none"></div>
  </div>

  <div class="share-section">
    <button class="share-cta" id="share-btn"><svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>Share Your IQ Score</button>
    <div class="share-nudge">Challenge your friends — see who's smarter</div>
  </div>

  <div class="stats-grid">
    <div class="sg-card"><div class="sg-icon i1"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/></svg></div><div class="sg-val" id="answered">0</div><div class="sg-lbl">Answered</div></div>
    <div class="sg-card"><div class="sg-icon i2"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div><div class="sg-val" id="accuracy">0%</div><div class="sg-lbl">Accuracy</div></div>
    <div class="sg-card"><div class="sg-icon i3"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div><div class="sg-val" id="best-streak">0</div><div class="sg-lbl">Best Streak</div></div>
    <div class="sg-card"><div class="sg-icon i4"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div><div class="sg-val" id="level-val">1</div><div class="sg-lbl">Level</div></div>
  </div>

  <div class="ab-section">
    <div class="ab-title">Abilities</div>
    <div class="ab-scroll" id="abilities"></div>
  </div>

  <button class="reset-btn" id="reset-btn">Reset Progress</button>
</div>

<div class="modal-overlay" id="share-modal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="card-preview" id="card-preview"></div>
    <div class="share-link-bar"><input class="share-link-url" id="share-url" readonly value=""><button class="share-link-copy" id="copy-link">Copy link</button></div>
    <div class="share-label">Share to</div>
    <div class="share-grid" id="share-grid"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import{IQData,iqToPercentile,formatPercentile}from'./data.js';import Haptics from'./haptics.js';
if(window.parent!==window)parent.authCheck();
window.navGo=function(p){Haptics.light();parent.goTo(p)};
var ABILITIES=[{key:'patternRecognition',name:'Pattern',color:'#FF8C00'},{key:'problemSolving',name:'Problem Solving',color:'#FF3B5C'},{key:'mentalAgility',name:'Agility',color:'#2DC653'},{key:'workingMemory',name:'Memory',color:'#7C5CFC'},{key:'verbalReasoning',name:'Verbal',color:'#3B82F6'},{key:'logicalReasoning',name:'Logic',color:'#162b5e'},{key:'spatialAwareness',name:'Emotional',color:'#FF6B9D'},{key:'numericalReasoning',name:'Spatial',color:'#FFB800'}];
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function load(){var d=IQData.load();document.getElementById('username-display').textContent=d.username||IQData.getCurrentUser()?.displayName||'';
if(d.iq){document.getElementById('iq-num').textContent=d.iq;var b=document.getElementById('pct-badge');b.textContent='Top '+formatPercentile(iqToPercentile(d.iq));b.style.display='inline-block'}
document.getElementById('answered').textContent=d.answered||0;document.getElementById('accuracy').textContent=IQData.getAccuracy()+'%';document.getElementById('best-streak').textContent=d.bestStreak||0;document.getElementById('level-val').textContent=d.level||1;
if(d.pic){document.getElementById('avatar-img').src=d.pic;document.getElementById('avatar-img').style.display='block';document.getElementById('avatar-icon').style.display='none'}
var list=document.getElementById('abilities');list.innerHTML='';
ABILITIES.forEach(function(a){var pct=IQData.getStatPercent(a.key);var chip=document.createElement('div');chip.className='ab-chip';
chip.innerHTML='<div class="ab-chip-name">'+a.name+'</div><div class="ab-chip-val" style="color:'+a.color+'">'+pct+'</div><div class="ab-chip-bar"><div class="ab-chip-fill" style="background:'+a.color+';width:0%" data-val="'+pct+'"></div></div>';
list.appendChild(chip)});
requestAnimationFrame(()=>setTimeout(()=>{document.querySelectorAll('.ab-chip-fill').forEach(b=>{b.style.width=Math.max(8,parseInt(b.dataset.val))+'%'})},100))}
function handleAvatarFile(f){if(!f)return;var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas');c.width=c.height=200;var ctx=c.getContext('2d');var min=Math.min(img.width,img.height);ctx.drawImage(img,(img.width-min)/2,(img.height-min)/2,min,min,0,0,200,200);var url=c.toDataURL('image/jpeg',.8);IQData.setProfilePic(url);document.getElementById('avatar-img').src=url;document.getElementById('avatar-img').style.display='block';document.getElementById('avatar-icon').style.display='none';Haptics.success();toast('Photo updated!')};img.src=e.target.result};r.readAsDataURL(f)}
document.getElementById('avatar-tap').onclick=()=>{Haptics.medium();document.getElementById('avatar-input').click()};
document.getElementById('avatar-edit-btn').onclick=()=>{Haptics.medium();document.getElementById('avatar-input').click()};
document.getElementById('avatar-input').onchange=e=>handleAvatarFile(e.target.files[0]);
document.getElementById('signout-btn').onclick=()=>{Haptics.warning();IQData.signOut()};
document.getElementById('reset-btn').onclick=()=>{Haptics.warning();if(confirm('Reset all progress?')){Haptics.error();IQData.reset();location.reload()}};
var shareCanvas=null,shareUrl='';
function getShareUrl(){var u=IQData.getCurrentUser();return u?'https://cebear.com/share/'+u.uid:'https://cebear.com'}
function rr(c,x,y,w,h,r,f){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();if(f){c.fillStyle=f;c.fill()}}
function drawDonut(c,cx,cy,oR,iR,sA,eA,col){c.beginPath();c.arc(cx,cy,oR,sA,eA,false);c.arc(cx,cy,iR,eA,sA,true);c.closePath();c.fillStyle=col;c.fill()}
function genShareCard(){var d=IQData.load(),W=1200,H=630,cv=document.createElement('canvas');cv.width=W;cv.height=H;var ctx=cv.getContext('2d');var uname=d.username||IQData.getCurrentUser()?.displayName||'Brain',acc=IQData.getAccuracy(),pic=d.pic||null;
ctx.fillStyle='#111f45';ctx.fillRect(0,0,W,H);rr(ctx,20,20,W-40,H-40,24,'#162b5e');var topCx=W/2,picSize=64,picY=52;ctx.fillStyle='#1e3872';ctx.beginPath();ctx.arc(topCx,picY+picSize/2,picSize/2,0,Math.PI*2);ctx.fill();if(!pic){ctx.font='900 28px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';ctx.fillText('CB',topCx,picY+picSize/2)}
ctx.textBaseline='alphabetic';ctx.font='700 16px Nunito';ctx.fillStyle='#8a96b8';ctx.textAlign='center';ctx.fillText(uname,topCx,picY+picSize+22);ctx.font='900 100px Nunito';ctx.fillStyle='#fff';ctx.textBaseline='middle';ctx.fillText(d.iq||'--',topCx,picY+picSize+85);ctx.textBaseline='alphabetic';ctx.font='900 14px Nunito';ctx.fillStyle='#5a6a90';ctx.fillText('I Q',topCx,picY+picSize+125);
var bb=picY+picSize+130;if(d.iq){var pt='TOP '+formatPercentile(iqToPercentile(d.iq)).toUpperCase();ctx.font='900 13px Nunito';var tw=ctx.measureText(pt).width+36;rr(ctx,topCx-tw/2,bb+5,tw,28,8,'#FFB800');ctx.fillStyle='#162b5e';ctx.fillText(pt,topCx,bb+24);bb+=40}
var sY=bb+14,ms=[{v:String(d.answered||0),l:'ANSWERED'},{v:acc+'%',l:'ACCURACY'},{v:String(d.bestStreak||0),l:'BEST STREAK'}],pW=130,pG=12,tW=ms.length*pW+(ms.length-1)*pG,pX=topCx-tW/2;
ms.forEach((s,i)=>{var px=pX+i*(pW+pG);rr(ctx,px,sY,pW,48,10,'#1e3872');ctx.font='900 20px Nunito';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText(s.v,px+pW/2,sY+22);ctx.font='800 9px Nunito';ctx.fillStyle='#8a96b8';ctx.fillText(s.l,px+pW/2,sY+39)});
var cats=ABILITIES.slice(0,6),dY=sY+72,dR=38,dI=24,dG=(W-120)/cats.length,dX=60+dG/2;
cats.forEach((a,i)=>{var cx=dX+i*dG,cy=dY+dR,v=IQData.getStatPercent(a.key),ang=(v/100)*Math.PI*2;drawDonut(ctx,cx,cy,dR,dI,0,Math.PI*2,'#1e3872');if(v>0)drawDonut(ctx,cx,cy,dR,dI,-Math.PI/2,-Math.PI/2+ang,a.color);ctx.font='900 18px Nunito';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(String(v),cx,cy);ctx.textBaseline='alphabetic';ctx.font='800 11px Nunito';ctx.fillStyle='#8a96b8';ctx.fillText(a.name,cx,cy+dR+18)});
ctx.font='800 13px Nunito';ctx.fillStyle='#3d5080';ctx.textAlign='center';ctx.fillText('cebear.com',W/2,H-32);shareCanvas=cv;
if(pic){var img=new Image();img.crossOrigin='anonymous';img.onload=()=>{ctx.save();ctx.beginPath();ctx.arc(topCx,picY+picSize/2,picSize/2,0,Math.PI*2);ctx.clip();ctx.drawImage(img,topCx-picSize/2,picY,picSize,picSize);ctx.restore()};img.src=pic}return cv}
async function uploadShareCard(){var user=IQData.getCurrentUser();if(!user||!shareCanvas)return;var d=IQData.load();try{var du=shareCanvas.toDataURL('image/png');var b64=du.split(',')[1];var sd=new parent.Object();sd.iq=d.iq||0;sd.username=d.username||user.displayName||'Brain';sd.answered=d.answered||0;sd.accuracy=parseInt(IQData.getAccuracy())||0;sd.bestStreak=d.bestStreak||0;sd.cardBase64=b64;sd.updatedAt=new Date().toISOString();await parent.firebase.firestore().collection('shares').doc(user.uid).set(sd);toast('Share card ready!')}catch(e){toast('Share failed — try again')}}
function buildShareGrid(){var hn=!!navigator.share,grid=document.getElementById('share-grid');grid.innerHTML='';var opts=[];
if(hn)opts.push({id:'native',label:'Share',cls:'sd-native',icon:'<svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>'});
opts.push({id:'copylink',label:'Copy',cls:'sd-copy',icon:'<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>'});
opts.push({id:'x',label:'X',cls:'sd-x',icon:'<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'});

opts.forEach(o=>{var b=document.createElement('button');b.className='share-dest '+o.cls;b.innerHTML='<div class="sd-icon">'+o.icon+'</div>'+o.label;b.onclick=()=>handleShareAction(o.id);grid.appendChild(b)})}
function getShareText(){var d=IQData.load();return d.iq?'My IQ is '+d.iq+' on Cebear! Top '+formatPercentile(iqToPercentile(d.iq))+' — can you beat me?':'Training my brain on Cebear!'}
function handleShareAction(id){Haptics.medium();var text=getShareText();switch(id){case'native':navigator.share({title:'My Cebear IQ',text:text,url:shareUrl}).catch(()=>{});break;case'copylink':navigator.clipboard.writeText(shareUrl).then(()=>{Haptics.success();toast('Link copied!')}).catch(()=>toast('Copy failed'));break;case'x':window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(shareUrl),'_blank');break;case'whatsapp':window.open('https://wa.me/?text='+encodeURIComponent(text+' '+shareUrl),'_blank');break;case'save':if(!shareCanvas)return;Haptics.success();var a=document.createElement('a');a.download='cebear-stats.png';a.href=shareCanvas.toDataURL('image/png');a.click();toast('Image saved!');break}}
async function openShare(){var fab=document.getElementById('share-btn');fab.classList.add('uploading');fab.textContent='Generating...';shareUrl=getShareUrl();genShareCard();await uploadShareCard();fab.classList.remove('uploading');fab.innerHTML='<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.5"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Share Your IQ Score';document.getElementById('share-url').value=shareUrl;var pv=document.getElementById('card-preview');pv.innerHTML='';var pc=document.createElement('canvas');pc.width=600;pc.height=315;pc.getContext('2d').drawImage(shareCanvas,0,0,600,315);pv.appendChild(pc);buildShareGrid();document.getElementById('share-modal').classList.add('show')}
document.getElementById('share-btn').onclick=()=>{Haptics.medium();openShare()};
document.getElementById('share-modal').onclick=e=>{if(e.target.id==='share-modal'){Haptics.light();document.getElementById('share-modal').classList.remove('show')}};
document.getElementById('copy-link').onclick=()=>handleShareAction('copylink');
load();
