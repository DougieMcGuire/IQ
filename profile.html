<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Profile — Cebear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f0e8;--card:#fff;--card-border:#e8e2d6;
      --blue:#0474fc;--blue-dark:#0358c4;--blue-light:#e8f2ff;
      --text:#1e293b;--text-dim:#64748b;--text-light:#94a3b8;
      --green:#22c55e;--green-dark:#16a34a;--red:#ef4444;
      --gold:#f59e0b;--gold-dark:#d97706;
      --orange:#f97316;--purple:#8b5cf6;--pink:#ec4899;
      --shadow-card:0 4px 0 var(--card-border);
      --shadow-blue:0 4px 0 var(--blue-dark);
      --card-r:20px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{width:100%;height:100%;overflow:hidden}
    body{width:100%;height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden}
    .scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;min-height:0;position:relative;z-index:0;height:0}
    .scroll::-webkit-scrollbar{display:none}
    .hero{background:var(--blue);padding:calc(env(safe-area-inset-top,20px) + 12px) 20px 36px;display:flex;flex-direction:column;align-items:center;position:relative}
    .hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:28px;background:var(--bg);border-radius:28px 28px 0 0}
    .hero-hdr{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;z-index:1}
    .hero-name{font-size:18px;font-weight:900;letter-spacing:.3px;color:#fff}
    .hero-out{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.35);padding:7px 14px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:#fff;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.15)}
    .hero-out:active{transform:translateY(3px);box-shadow:none}
    .av-wrap{position:relative;margin-bottom:10px;cursor:pointer;z-index:1}
    .av{width:clamp(110px,28vw,130px);height:clamp(110px,28vw,130px);border-radius:50%;overflow:hidden;border:5px solid #fff;box-shadow:0 6px 0 var(--blue-dark);transition:transform .12s}
    .av:active{transform:scale(.93)}
    .av img{width:100%;height:100%;object-fit:cover;display:block}
    .av-badge{position:absolute;bottom:2px;right:2px;width:34px;height:34px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid #fff;pointer-events:none;box-shadow:0 3px 0 var(--gold-dark)}
    .av-badge svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
    .av-edit-lbl{font-size:11px;font-weight:800;color:rgba(255,255,255,.65);margin-bottom:10px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;z-index:1}
    .iq-num{font-family:'Chewy',cursive;font-size:clamp(72px,20vw,96px);line-height:1;color:#fff;letter-spacing:-1px;z-index:1}
    .iq-lbl{font-size:12px;font-weight:900;color:rgba(255,255,255,.5);letter-spacing:6px;text-transform:uppercase;margin-bottom:8px;z-index:1}
    .pct-badge{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:900;padding:5px 16px;border-radius:20px;margin-bottom:16px;border:2px solid rgba(255,255,255,.3);z-index:1}
    .share-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:340px;padding:14px 20px;background:#fff;color:var(--blue);border:none;border-radius:16px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;letter-spacing:.3px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 4px 0 var(--card-border);transition:transform .1s;margin-bottom:6px;z-index:1}
    .share-btn:active{transform:translateY(4px);box-shadow:none}
    .share-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;flex-shrink:0}
    .share-nudge{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);z-index:1;margin-bottom:0}
    .content{padding:12px 16px 80px;max-width:480px;margin:0 auto;width:100%}
    .section-title{font-size:18px;font-weight:900;letter-spacing:.3px;color:var(--text);margin-bottom:12px;padding:0 4px}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
    .sg{background:var(--card);border-radius:var(--card-r);border:2.5px solid var(--card-border);padding:16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-card)}
    .sg-ic{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sg-ic svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round}
    .sg-ic.i1{background:var(--green);box-shadow:0 3px 0 var(--green-dark)}
    .sg-ic.i2{background:var(--blue);box-shadow:0 3px 0 var(--blue-dark)}
    .sg-ic.i3{background:var(--orange);box-shadow:0 3px 0 #c2410c}
    .sg-ic.i4{background:var(--purple);box-shadow:0 3px 0 #7c3aed}
    .sg-val{font-size:clamp(24px,6.5vw,30px);font-weight:900;color:var(--text);line-height:1}
    .sg-lbl{font-size:10px;font-weight:900;color:var(--text-light);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
    .ab-card{background:var(--card);border-radius:var(--card-r);border:2.5px solid var(--card-border);overflow:hidden;box-shadow:var(--shadow-card)}
    .ab-row{display:flex;align-items:center;gap:12px;padding:13px 16px}
    .ab-row+.ab-row{border-top:2px solid #f1f5f9}
    .ab-dot{width:4px;height:28px;border-radius:3px;flex-shrink:0}
    .ab-mid{flex:1;min-width:0}
    .ab-name{font-size:12px;font-weight:800;color:var(--text-dim);margin-bottom:5px}
    .ab-bar{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;border:1.5px solid #d1d5db}
    .ab-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}
    .ab-val{font-size:18px;font-weight:900;color:var(--text);min-width:32px;text-align:right}
    .reset-btn{margin:16px auto 0;background:none;border:none;font-size:11px;font-weight:700;color:var(--text-light);cursor:pointer;display:block;padding:12px;text-align:center}
    .av-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:16px;display:none}
    .av-overlay.open{display:flex}
    .av-card{width:100%;max-width:460px;height:min(88dvh,700px);border-radius:24px;overflow:hidden;background:var(--blue);box-shadow:0 8px 0 var(--blue-dark);animation:avIn .3s cubic-bezier(.34,1.2,.64,1) both}
    @keyframes avIn{from{transform:scale(.93) translateY(14px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
    .av-card iframe{width:100%;height:100%;border:none;display:block}
    .modal-overlay{position:fixed;inset:0;background:rgba(30,41,59,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
    .modal-overlay.show{display:flex}
    .modal-box{background:#fff;border-radius:24px;border:3px solid var(--card-border);padding:24px 20px;width:100%;max-width:360px;text-align:center;box-shadow:0 6px 0 var(--card-border)}
    .card-preview{background:#f1f5f9;border-radius:14px;overflow:hidden;margin-bottom:12px;border:2px solid var(--card-border)}
    .card-preview canvas{width:100%;display:block}
    .share-link-bar{display:flex;gap:8px;margin-bottom:12px}
    .share-link-url{flex:1;background:#f8fafc;border:2.5px solid var(--card-border);border-radius:12px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
    .share-link-copy{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:11px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 3px 0 var(--blue-dark)}
    .share-link-copy:active{transform:translateY(3px);box-shadow:none}
    .share-lbl{font-size:10px;font-weight:900;color:var(--text-light);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
    .share-grid{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
    .share-grid::-webkit-scrollbar{display:none}
    .share-dest{flex-shrink:0;width:66px;background:#f8fafc;border:2px solid var(--card-border);border-radius:14px;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;color:var(--text);transition:transform .1s;box-shadow:0 2px 0 var(--card-border)}
    .share-dest:active{transform:scale(.93)}
    .sd-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .sd-icon svg{width:18px;height:18px;fill:#fff}
    .sd-native .sd-icon{background:var(--blue)}.sd-native .sd-icon svg{fill:none;stroke:#fff;stroke-width:2.5}
    .sd-copy .sd-icon{background:#1e293b}.sd-copy .sd-icon svg{fill:none;stroke:#fff;stroke-width:2.5}
    .sd-x .sd-icon{background:#000}.sd-wa .sd-icon{background:#25D366}
    .sd-save .sd-icon{background:var(--green)}.sd-save .sd-icon svg{fill:none;stroke:#fff;stroke-width:2.5}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;padding:10px 20px;border-radius:14px;font-size:14px;font-weight:800;opacity:0;transition:all .3s;z-index:400;white-space:nowrap;pointer-events:none;box-shadow:0 4px 0 var(--green-dark)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── Page entrance animations ── */
    @keyframes avZoom{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
    @keyframes heroSlide{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
    @keyframes statPop{from{opacity:0;transform:scale(.85) translateY(8px)}to{opacity:1;transform:none}}
    @keyframes barGrow{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    body.enter .av-wrap{animation:avZoom .4s cubic-bezier(.22,1,.36,1) .02s both}
    body.enter .iq-num{animation:avZoom .35s cubic-bezier(.22,1,.36,1) .08s both}
    body.enter .iq-lbl{animation:heroSlide .3s ease .1s both}
    body.enter .pct-badge{animation:heroSlide .3s ease .12s both}
    body.enter .share-btn{animation:statPop .3s ease .14s both}
    body.enter .sg:nth-child(1){animation:statPop .3s ease .06s both}
    body.enter .sg:nth-child(2){animation:statPop .3s ease .1s both}
    body.enter .sg:nth-child(3){animation:statPop .3s ease .14s both}
    body.enter .sg:nth-child(4){animation:statPop .3s ease .18s both}
    body.enter .ab-card{animation:barGrow .35s ease .12s both}
  </style>
</head>
<body>
<div class="scroll">
  <div class="hero">
    <div class="hero-hdr">
      <div class="hero-name" id="username-display"></div>
      <button class="hero-out" id="signout-btn">Sign out</button>
    </div>
    <div class="av-wrap" id="av-wrap">
      <div class="av"><img id="av-img" src="Avatars/Anonymous.png" alt="Your avatar" loading="lazy" decoding="async"></div>
      <div class="av-badge"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg></div>
    </div>
    <div class="av-edit-lbl" id="av-edit-lbl">Edit Avatar</div>
    <div class="iq-num" id="iq-num">--</div>
    <div class="iq-lbl">I Q</div>
    <div class="pct-badge" id="pct-badge" style="display:none"></div>
    <button class="share-btn" id="share-btn">
      <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      Share Your IQ
    </button>
    <div class="share-nudge">Challenge your friends — who's smarter?</div>
  </div>
  <div class="content">
    <div class="section-title">Stats</div>
    <div class="stats-grid">
      <div class="sg"><div class="sg-ic i1"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/></svg></div><div><div class="sg-val" id="answered">0</div><div class="sg-lbl">Answered</div></div></div>
      <div class="sg"><div class="sg-ic i2"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div><div><div class="sg-val" id="accuracy">0%</div><div class="sg-lbl">Accuracy</div></div></div>
      <div class="sg"><div class="sg-ic i3"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div><div><div class="sg-val" id="best-streak">0</div><div class="sg-lbl">Best Streak</div></div></div>
      <div class="sg"><div class="sg-ic i4"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div><div><div class="sg-val" id="level-val">1</div><div class="sg-lbl">Level</div></div></div>
    </div>
    <div class="section-title">Abilities</div>
    <div class="ab-card" id="abilities"></div>
    <button class="reset-btn" id="reset-btn">Reset all progress</button>
  </div>
</div>
<div class="av-overlay" id="av-overlay">
  <div class="av-card"><iframe id="av-iframe" src="" title="Avatar editor"></iframe></div>
</div>
<div class="modal-overlay" id="share-modal">
  <div class="modal-box">
    <div class="card-preview" id="card-preview"></div>
    <div class="share-link-bar">
      <input class="share-link-url" id="share-url" readonly>
      <button class="share-link-copy" id="copy-link">Copy</button>
    </div>
    <div class="share-lbl">Share to</div>
    <div class="share-grid" id="share-grid"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import{IQData,iqToPercentile,formatPercentile}from'./data.js';
import Haptics from'./haptics.js';
if(window.parent!==window)parent.authCheck();
window.navGo=function(p){Haptics.light();parent.goTo(p);};

var AB=[
  {key:'patternRecognition',name:'Pattern',color:'#f97316'},
  {key:'problemSolving',name:'Problem Solving',color:'#ef4444'},
  {key:'mentalAgility',name:'Agility',color:'#22c55e'},
  {key:'workingMemory',name:'Memory',color:'#8b5cf6'},
  {key:'verbalReasoning',name:'Verbal',color:'#0474fc'},
  {key:'logicalReasoning',name:'Logic',color:'#1e293b'},
  {key:'spatialAwareness',name:'Spatial',color:'#ec4899'},
  {key:'numericalReasoning',name:'Numerical',color:'#f59e0b'}
];

function pToast(m,err){var t=document.getElementById('toast');t.textContent=m;t.style.background=err?'#ef4444':'#22c55e';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function loadProfile(){
  var d=IQData.load();
  document.getElementById('username-display').textContent=d.username||IQData.getCurrentUser()?.displayName||'';
  if(d.iq){document.getElementById('iq-num').textContent=d.iq;var b=document.getElementById('pct-badge');b.textContent='Top '+formatPercentile(iqToPercentile(d.iq));b.style.display='inline-block';}
  document.getElementById('answered').textContent=d.answered||0;
  document.getElementById('accuracy').textContent=IQData.getAccuracy()+'%';
  document.getElementById('best-streak').textContent=d.bestStreak||0;
  document.getElementById('level-val').textContent=d.level||1;
  var list=document.getElementById('abilities');list.innerHTML='';
  AB.forEach(a=>{
    var pct=IQData.getStatPercent(a.key);
    var row=document.createElement('div');row.className='ab-row';
    row.innerHTML=`<div class="ab-dot" style="background:${a.color}"></div><div class="ab-mid"><div class="ab-name">${a.name}</div><div class="ab-bar"><div class="ab-fill" style="background:${a.color};width:0%" data-val="${pct}"></div></div></div><div class="ab-val">${pct}</div>`;
    list.appendChild(row);
  });
  requestAnimationFrame(()=>setTimeout(()=>{document.querySelectorAll('.ab-fill').forEach(b=>{b.style.width=Math.max(6,parseInt(b.dataset.val))+'%';});},80));
}

async function loadAvatar(){
  try{const fb=window.parent!==window?window.parent.firebase:null;if(!fb)return;const u=fb.auth().currentUser;if(!u)return;const snap=await fb.firestore().collection('users').doc(u.uid).get();if(snap.exists&&snap.data().avatarIMG)document.getElementById('av-img').src=snap.data().avatarIMG;}catch(e){}
}

var _iframeLoaded=false;
function openEditor(){Haptics.medium();if(!_iframeLoaded){_iframeLoaded=true;document.getElementById('av-iframe').src='avatar.html';}document.getElementById('av-overlay').classList.add('open');}
function closeEditor(){document.getElementById('av-overlay').classList.remove('open');}
document.getElementById('av-overlay').addEventListener('click',function(e){if(e.target===this)closeEditor();});
document.getElementById('av-wrap').onclick=openEditor;
document.getElementById('av-edit-lbl').onclick=openEditor;
window.addEventListener('message',function(e){
  if(!e.data||!e.data.type)return;
  if(e.data.type==='avatarSaved'){if(e.data.avatarIMG)document.getElementById('av-img').src=e.data.avatarIMG;closeEditor();pToast('Avatar updated!');Haptics.success();}
  if(e.data.type==='avatarEditorClose')closeEditor();
  if(e.data.type==='pageEnter'){playEntrance();loadProfile();loadAvatar();}
});
document.getElementById('signout-btn').onclick=()=>{Haptics.warning();IQData.signOut();};
document.getElementById('reset-btn').onclick=()=>{Haptics.warning();if(confirm('Reset all progress?')){Haptics.error();IQData.reset();location.reload();}};

var shareCanvas=null,shareUrl='';
function getShareUrl(){var u=IQData.getCurrentUser();return u?'https://cebear.com/@'+u.uid:'https://cebear.com';}
function loadImg(src){return new Promise(r=>{if(!src){r(null);return;}var img=new Image();img.crossOrigin='anonymous';img.onload=()=>r(img);img.onerror=()=>r(null);img.src=src;});}
function rr(c,x,y,w,h,r,f){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();if(f){c.fillStyle=f;c.fill();}}

async function genShareCard(){
  var d=IQData.load(),W=1200,H=630,cv=document.createElement('canvas');
  cv.width=W;cv.height=H;var c=cv.getContext('2d');
  var uname=d.username||IQData.getCurrentUser()?.displayName||'Brain';
  var acc=IQData.getAccuracy(),iq=String(d.iq||'--');
  var pctText=d.iq?'TOP '+formatPercentile(iqToPercentile(d.iq)).toUpperCase():'';
  var[picImg,logoImg]=await Promise.all([loadImg(document.getElementById('av-img')?.src||null),loadImg('logo.png')]);
  c.fillStyle='#0474fc';c.fillRect(0,0,W,H);
  var pad=56,picR=110,picCx=pad+picR+20,picCy=200;
  c.lineWidth=8;c.strokeStyle='#f59e0b';c.beginPath();c.arc(picCx,picCy,picR+10,0,Math.PI*2);c.stroke();
  c.fillStyle='rgba(255,255,255,.1)';c.beginPath();c.arc(picCx,picCy,picR,0,Math.PI*2);c.fill();
  if(picImg){c.save();c.beginPath();c.arc(picCx,picCy,picR,0,Math.PI*2);c.clip();c.drawImage(picImg,picCx-picR,picCy-picR,picR*2,picR*2);c.restore();}
  else{c.font='900 72px Nunito';c.textAlign='center';c.textBaseline='middle';c.fillStyle='rgba(255,255,255,.4)';c.fillText(uname.charAt(0).toUpperCase(),picCx,picCy);}
  c.font='900 36px Nunito';c.fillStyle='rgba(255,255,255,.9)';c.textAlign='center';c.textBaseline='top';c.fillText(uname,picCx,picCy+picR+18);
  var iqCx=((picCx+picR+60)+(W-pad))/2,iqCy=180;
  c.font='900 36px Nunito';c.fillStyle='rgba(255,255,255,.4)';c.textAlign='center';c.textBaseline='bottom';c.fillText('IQ',iqCx,iqCy-100);
  c.font='900 260px Nunito';c.fillStyle='#fff';c.textBaseline='middle';c.fillText(iq,iqCx,iqCy);
  var nw=c.measureText(iq).width;rr(c,iqCx-nw/2+10,iqCy+120,nw-20,6,3,'#f59e0b');
  if(pctText){c.font='900 24px Nunito';var tw=c.measureText(pctText).width+56,py=iqCy+140;rr(c,iqCx-tw/2,py,tw,48,24,'rgba(245,158,11,.15)');c.strokeStyle='#f59e0b';c.lineWidth=3;rr(c,iqCx-tw/2,py,tw,48,24,null);c.stroke();c.fillStyle='#f59e0b';c.textBaseline='middle';c.fillText(pctText,iqCx,py+24);}
  var by=400,bw=(W-pad*2-14*3)/4,bh=90;
  [{v:String(d.answered||0),l:'ANSWERED',color:'#22c55e'},{v:acc+'%',l:'ACCURACY',color:'#38bdf8'},{v:String(d.bestStreak||0),l:'STREAK',color:'#f97316'},{v:'Lvl '+(d.level||1),l:'LEVEL',color:'#a78bfa'}].forEach(function(s,i){var bx=pad+i*(bw+14);rr(c,bx,by,bw,bh,16,'rgba(255,255,255,.07)');rr(c,bx+16,by,bw-32,3,1.5,s.color);c.font='900 36px Nunito';c.fillStyle='#fff';c.textAlign='center';c.textBaseline='middle';c.fillText(s.v,bx+bw/2,by+38);c.font='800 13px Nunito';c.fillStyle='rgba(255,255,255,.4)';c.fillText(s.l,bx+bw/2,by+68);});
  var brandY=by+bh+20,brandCy=brandY+((H-brandY)/2);
  c.strokeStyle='rgba(255,255,255,.1)';c.lineWidth=1;c.beginPath();c.moveTo(pad,brandY);c.lineTo(W-pad,brandY);c.stroke();
  var ls=48;c.font='900 48px Nunito';var cw=c.measureText('cebear').width,dw=c.measureText('.com').width,bx2=W/2-((logoImg?ls+14:0)+cw+dw+34)/2;
  if(logoImg){c.drawImage(logoImg,bx2,brandCy-ls/2,ls,ls);bx2+=ls+14;}
  c.fillStyle='#fff';c.textAlign='left';c.textBaseline='middle';c.fillText('cebear',bx2,brandCy);bx2+=cw;c.fillStyle='rgba(255,255,255,.4)';c.fillText('.com',bx2,brandCy);bx2+=dw+14;c.fillStyle='#f59e0b';c.beginPath();c.arc(bx2,brandCy,5,0,Math.PI*2);c.fill();bx2+=20;c.font='800 22px Nunito';c.fillStyle='#f59e0b';c.fillText('Beat me!',bx2,brandCy);
  shareCanvas=cv;return cv;
}
async function uploadShareCard(){var user=IQData.getCurrentUser();if(!user||!shareCanvas)return;try{var b64=shareCanvas.toDataURL('image/png').split(',')[1];var d=IQData.load();await parent.firebase.firestore().collection('shares').doc(user.uid).set({iq:d.iq||0,username:d.username||user.displayName||'',cardBase64:b64,updatedAt:new Date().toISOString()});}catch(e){}}
function buildShareGrid(){
  var hn=!!navigator.share,grid=document.getElementById('share-grid');grid.innerHTML='';
  var opts=[];
  if(hn)opts.push({id:'native',label:'Share',cls:'sd-native',icon:'<svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>'});
  opts.push({id:'copylink',label:'Copy',cls:'sd-copy',icon:'<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>'});
  opts.push({id:'x',label:'X',cls:'sd-x',icon:'<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'});
  opts.push({id:'whatsapp',label:'WhatsApp',cls:'sd-wa',icon:'<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.13.556 4.13 1.532 5.87L.06 23.71l5.99-1.572A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>'});
  opts.push({id:'save',label:'Save',cls:'sd-save',icon:'<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'});
  opts.forEach(o=>{var b=document.createElement('button');b.className='share-dest '+o.cls;b.innerHTML='<div class="sd-icon">'+o.icon+'</div>'+o.label;b.onclick=()=>handleShareAction(o.id);grid.appendChild(b);});
}
function getShareText(){var d=IQData.load();return d.iq?'My IQ is '+d.iq+' on Cebear! Top '+formatPercentile(iqToPercentile(d.iq))+' — can you beat me?':'Training my brain on Cebear!';}
function handleShareAction(id){Haptics.medium();var text=getShareText();switch(id){case'native':navigator.share({title:'My Cebear IQ',text,url:shareUrl}).catch(()=>{});break;case'copylink':navigator.clipboard.writeText(shareUrl).then(()=>{Haptics.success();pToast('Link copied!');}).catch(()=>pToast('Copy failed'));break;case'x':window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(shareUrl),'_blank');break;case'whatsapp':window.open('https://wa.me/?text='+encodeURIComponent(text+' '+shareUrl),'_blank');break;case'save':if(!shareCanvas)return;Haptics.success();var a=document.createElement('a');a.download='cebear-iq.png';a.href=shareCanvas.toDataURL('image/png');a.click();pToast('Saved!');break;}}
async function openShare(){
  var fab=document.getElementById('share-btn');fab.disabled=true;
  fab.innerHTML='<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Generating...';
  shareUrl=getShareUrl();await genShareCard();await uploadShareCard();
  fab.disabled=false;fab.innerHTML='<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Share Your IQ';
  document.getElementById('share-url').value=shareUrl;
  var pv=document.getElementById('card-preview');pv.innerHTML='';var pc=document.createElement('canvas');pc.width=600;pc.height=315;pc.getContext('2d').drawImage(shareCanvas,0,0,600,315);pv.appendChild(pc);
  buildShareGrid();document.getElementById('share-modal').classList.add('show');
}
document.getElementById('share-btn').onclick=()=>{Haptics.medium();openShare();};
document.getElementById('share-modal').onclick=e=>{if(e.target.id==='share-modal'){Haptics.light();document.getElementById('share-modal').classList.remove('show');}};
document.getElementById('copy-link').onclick=()=>handleShareAction('copylink');

function playEntrance(){
  document.body.classList.remove('enter');
  void document.body.offsetWidth;
  document.body.classList.add('enter');
}

loadProfile();loadAvatar();playEntrance();
</script>
