<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Profile — Cebear</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--cream:#F0EAD6;--navy:#1b2d5b;--navyM:#243a6e;--navyL:#2f4a88;--card:#fff;--text:#1b2d5b;--dim:#6b7a9e;--light:#a0acc4;--green:#3fba4f;--gd:#2d9a3c;--red:#e8443a;--gold:#e8a817;--goldd:#c48e10;--blue:#3a7df2;--purple:#6d4aed;--orange:#e87d1a;--pink:#e8557a}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100dvh;font-family:'Nunito',sans-serif;background:var(--navy);color:var(--text);overflow:hidden}
    body{display:flex;flex-direction:column}
    .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .scroll::-webkit-scrollbar{display:none}

    /* ── HERO ── */
    .hero{background:var(--cream);padding:calc(env(safe-area-inset-top,20px) + 10px) 20px 0;display:flex;flex-direction:column;align-items:center;position:relative}
    .hero-hdr{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .hero-name{font-size:14px;font-weight:800;color:var(--dim)}
    .hero-out{background:rgba(27,45,91,.06);border:none;padding:7px 14px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:var(--dim);cursor:pointer}

    /* ── AVATAR ── */
    .av-wrap{position:relative;margin-bottom:10px;cursor:pointer}
    .av{width:min(100px,24vw);height:min(100px,24vw);border-radius:50%;background:var(--navy);overflow:hidden;display:flex;align-items:center;justify-content:center;border:4px solid var(--navy);box-shadow:0 4px 16px rgba(27,45,91,.2);transition:transform .15s}
    .av:active{transform:scale(.94)}
    .av img{width:100%;height:100%;object-fit:cover}
    .av-edit-badge{position:absolute;bottom:2px;right:2px;width:28px;height:28px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--cream);cursor:pointer}
    .av-edit-badge svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
    .av-edit-label{font-size:11px;font-weight:800;color:var(--dim);margin-top:-6px;margin-bottom:8px;cursor:pointer}

    .iq-big{font-size:min(80px,20vw);font-weight:900;line-height:1;color:var(--navy)}
    .iq-lbl{font-size:14px;font-weight:900;color:var(--light);letter-spacing:5px;text-transform:uppercase;margin-bottom:6px}
    .pct{background:var(--navy);color:var(--cream);font-size:12px;font-weight:900;padding:5px 18px;border-radius:20px;margin-bottom:16px}
    .share-cta{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:400px;padding:15px;background:var(--gold);color:var(--navy);border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:1px;position:relative;overflow:hidden;box-shadow:0 4px 0 var(--goldd);transition:transform .1s;margin-bottom:4px}
    .share-cta:active{transform:translateY(4px);box-shadow:none}
    .share-cta svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;flex-shrink:0}
    .share-cta::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);animation:shimmer 3s infinite}
    @keyframes shimmer{0%{left:-100%}100%{left:200%}}
    .share-nudge{text-align:center;font-size:11px;font-weight:700;color:var(--dim);margin-bottom:20px}

    /* ── BODY ── */
    .navy-section{background:var(--navy);border-radius:28px 28px 0 0;padding:24px 16px 32px}
    .navy-inner{max-width:420px;margin:0 auto}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
    .sg{background:rgba(240,234,214,.06);border-radius:16px;padding:16px;display:flex;align-items:center;gap:12px;border:1px solid rgba(240,234,214,.06);position:relative;overflow:hidden}
    .sg::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,234,214,.1),transparent)}
    .sg-ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 0 rgba(0,0,0,.15)}
    .sg-ic svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
    .sg-ic.i1{background:var(--green)}.sg-ic.i2{background:var(--blue)}.sg-ic.i3{background:var(--orange)}.sg-ic.i4{background:var(--purple)}
    .sg-info{display:flex;flex-direction:column}
    .sg-val{font-size:min(24px,6vw);font-weight:900;color:var(--cream);line-height:1.1}
    .sg-lbl{font-size:10px;font-weight:800;color:rgba(240,234,214,.3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
    .ab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .ab-title{font-size:11px;font-weight:900;color:rgba(240,234,214,.3);letter-spacing:2px;text-transform:uppercase}
    .ab-card{background:rgba(240,234,214,.04);border-radius:18px;padding:4px 0;overflow:hidden;border:1px solid rgba(240,234,214,.04)}
    .ab-row{display:flex;align-items:center;gap:12px;padding:11px 16px}
    .ab-row+.ab-row{border-top:1px solid rgba(240,234,214,.03)}
    .ab-dot{width:4px;height:28px;border-radius:2px;flex-shrink:0}
    .ab-mid{flex:1;min-width:0}
    .ab-name{font-size:12px;font-weight:800;color:rgba(240,234,214,.5);margin-bottom:5px}
    .ab-bar{height:7px;background:rgba(240,234,214,.06);border-radius:4px;overflow:hidden}
    .ab-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.34,1.56,.64,1);position:relative}
    .ab-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(255,255,255,.2) 0%,transparent 100%);border-radius:4px}
    .ab-val{font-size:16px;font-weight:900;color:var(--cream);min-width:32px;text-align:right}
    .reset-btn{margin:24px auto 0;background:none;border:none;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:rgba(240,234,214,.12);cursor:pointer;display:block;padding:12px;text-align:center}

    /* ── AVATAR EDITOR MODAL ── */
    .av-modal{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;background:transparent;pointer-events:none;transition:background .3s}
    .av-modal.open{background:rgba(0,0,0,.7);pointer-events:all;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
    .av-modal-sheet{position:absolute;bottom:0;left:0;right:0;height:92dvh;border-radius:24px 24px 0 0;overflow:hidden;background:#151f3e;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 40px rgba(0,0,0,.5)}
    .av-modal.open .av-modal-sheet{transform:translateY(0)}
    .av-modal-handle{width:36px;height:4px;background:rgba(240,234,214,.15);border-radius:2px;margin:10px auto 0}
    .av-modal-iframe{width:100%;height:calc(100% - 24px);border:none;display:block}

    /* ── SHARE MODAL ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(27,45,91,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
    .modal-overlay.show{display:flex}
    .modal-box{background:var(--cream);border-radius:28px;padding:32px 24px;width:100%;max-width:360px;text-align:center}
    .card-preview{background:rgba(27,45,91,.06);border-radius:16px;overflow:hidden;margin-bottom:16px}.card-preview canvas{width:100%;display:block}
    .share-link-bar{display:flex;gap:8px;margin-bottom:16px}
    .share-link-url{flex:1;background:rgba(27,45,91,.06);border:none;border-radius:10px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .share-link-copy{background:var(--navy);color:var(--cream);border:none;border-radius:10px;padding:11px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;cursor:pointer}
    .share-label{font-size:11px;font-weight:800;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
    .share-grid{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}.share-grid::-webkit-scrollbar{display:none}
    .share-dest{flex-shrink:0;width:68px;background:rgba(27,45,91,.06);border:none;border-radius:14px;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;color:var(--text);transition:transform .1s}
    .share-dest:active{transform:scale(.93)}
    .sd-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
    .sd-icon svg{width:18px;height:18px;fill:#fff}
    .sd-native .sd-icon{background:var(--blue)}.sd-native .sd-icon svg{fill:none;stroke:#fff;stroke-width:2.5}
    .sd-copy .sd-icon{background:var(--navy)}.sd-copy .sd-icon svg{fill:none;stroke:#fff;stroke-width:2.5}
    .sd-x .sd-icon{background:#000}.sd-wa .sd-icon{background:#25D366}
    .sd-save .sd-icon{background:var(--green)}.sd-save .sd-icon svg{fill:none;stroke:#fff;stroke-width:2.5}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#fff;padding:10px 20px;border-radius:14px;font-size:14px;font-weight:800;opacity:0;transition:all .3s;z-index:400;white-space:nowrap;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="scroll">
  <div class="hero">
    <div class="hero-hdr">
      <div class="hero-name" id="username-display"></div>
      <button class="hero-out" id="signout-btn">Sign out</button>
    </div>

    <!-- Avatar -->
    <div class="av-wrap" onclick="openAvatarEditor()">
      <div class="av" id="av-circle">
        <img id="av-img" src="Avatars/Anonymous.png" alt="Avatar">
      </div>
      <div class="av-edit-badge">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>
      </div>
    </div>
    <div class="av-edit-label" onclick="openAvatarEditor()">Edit Avatar</div>

    <div class="iq-big" id="iq-num">--</div>
    <div class="iq-lbl">I Q</div>
    <div class="pct" id="pct-badge" style="display:none"></div>
    <button class="share-cta" id="share-btn">
      <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      Share Your IQ
    </button>
    <div class="share-nudge">Challenge your friends — who's smarter?</div>
  </div>

  <div class="navy-section"><div class="navy-inner">
    <div class="stats-grid">
      <div class="sg"><div class="sg-ic i1"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/></svg></div><div class="sg-info"><div class="sg-val" id="answered">0</div><div class="sg-lbl">Answered</div></div></div>
      <div class="sg"><div class="sg-ic i2"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div><div class="sg-info"><div class="sg-val" id="accuracy">0%</div><div class="sg-lbl">Accuracy</div></div></div>
      <div class="sg"><div class="sg-ic i3"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div><div class="sg-info"><div class="sg-val" id="best-streak">0</div><div class="sg-lbl">Best Streak</div></div></div>
      <div class="sg"><div class="sg-ic i4"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div><div class="sg-info"><div class="sg-val" id="level-val">1</div><div class="sg-lbl">Level</div></div></div>
    </div>
    <div class="ab-header"><div class="ab-title">Abilities</div></div>
    <div class="ab-card" id="abilities"></div>
    <button class="reset-btn" id="reset-btn">Reset Progress</button>
  </div></div>
</div>

<!-- Avatar Editor Modal (bottom sheet with iframe) -->
<div class="av-modal" id="av-modal" onclick="handleModalBgClick(event)">
  <div class="av-modal-sheet" id="av-modal-sheet">
    <div class="av-modal-handle"></div>
    <iframe class="av-modal-iframe" id="av-iframe" src="" allow="camera"></iframe>
  </div>
</div>

<!-- Share Modal -->
<div class="modal-overlay" id="share-modal">
  <div class="modal-box">
    <div class="card-preview" id="card-preview"></div>
    <div class="share-link-bar">
      <input class="share-link-url" id="share-url" readonly value="">
      <button class="share-link-copy" id="copy-link">Copy link</button>
    </div>
    <div class="share-label">Share to</div>
    <div class="share-grid" id="share-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{IQData,iqToPercentile,formatPercentile}from'./data.js';
import Haptics from'./haptics.js';
if(window.parent!==window)parent.authCheck();
window.navGo=function(p){Haptics.light();parent.goTo(p)};

var AB=[
  {key:'patternRecognition',name:'Pattern',color:'#e87d1a'},
  {key:'problemSolving',name:'Problem Solving',color:'#e8443a'},
  {key:'mentalAgility',name:'Agility',color:'#3fba4f'},
  {key:'workingMemory',name:'Memory',color:'#6d4aed'},
  {key:'verbalReasoning',name:'Verbal',color:'#3a7df2'},
  {key:'logicalReasoning',name:'Logic',color:'#1b2d5b'},
  {key:'spatialAwareness',name:'Spatial',color:'#e8557a'},
  {key:'numericalReasoning',name:'Numerical',color:'#e8a817'}
];

function toast(m,err){
  var t=document.getElementById('toast');
  t.textContent=m;t.style.background=err?'var(--red)':'var(--green)';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);
}

// ── Load profile data ──────────────────────────────────────────────────────
function loadProfile(){
  var d=IQData.load();
  document.getElementById('username-display').textContent=d.username||IQData.getCurrentUser()?.displayName||'';
  if(d.iq){
    document.getElementById('iq-num').textContent=d.iq;
    var b=document.getElementById('pct-badge');
    b.textContent='Top '+formatPercentile(iqToPercentile(d.iq));
    b.style.display='inline-block';
  }
  document.getElementById('answered').textContent=d.answered||0;
  document.getElementById('accuracy').textContent=IQData.getAccuracy()+'%';
  document.getElementById('best-streak').textContent=d.bestStreak||0;
  document.getElementById('level-val').textContent=d.level||1;
  var list=document.getElementById('abilities');
  list.innerHTML='';
  AB.forEach(a=>{
    var pct=IQData.getStatPercent(a.key);
    var row=document.createElement('div');row.className='ab-row';
    row.innerHTML='<div class="ab-dot" style="background:'+a.color+'"></div><div class="ab-mid"><div class="ab-name">'+a.name+'</div><div class="ab-bar"><div class="ab-fill" style="background:'+a.color+';width:0%" data-val="'+pct+'"></div></div></div><div class="ab-val">'+pct+'</div>';
    list.appendChild(row);
  });
  requestAnimationFrame(()=>setTimeout(()=>{
    document.querySelectorAll('.ab-fill').forEach(b=>{b.style.width=Math.max(6,parseInt(b.dataset.val))+'%'});
  },80));
}

// ── Avatar display ──────────────────────────────────────────────────────────
async function loadAvatar(){
  try{
    const inIframe=window.parent!==window;
    let fb=null;
    if(inIframe){try{fb=window.parent.firebase}catch{}}
    if(!fb){
      // try local firebase (module)
      return;
    }
    const u=fb.auth().currentUser;
    if(!u)return;
    const snap=await fb.firestore().collection('users').doc(u.uid).get();
    if(!snap.exists)return;
    const data=snap.data();
    if(data.avatarIMG){
      setAvatarImg(data.avatarIMG);
    }
  }catch(e){console.warn('loadAvatar error:',e);}
}

function setAvatarImg(src){
  var img=document.getElementById('av-img');
  if(!img)return;
  img.src=src;
}

// ── Avatar Editor Modal ─────────────────────────────────────────────────────
window.openAvatarEditor=function(){
  Haptics.medium();
  var modal=document.getElementById('av-modal');
  var iframe=document.getElementById('av-iframe');
  // Load avatar.html into iframe if not already
  if(!iframe.src||iframe.src==='about:blank'||iframe.src===''){
    iframe.src='avatar.html';
  }
  modal.classList.add('open');
  document.body.style.overflow='hidden';
};

window.handleModalBgClick=function(e){
  // Only close if clicking the backdrop (not the sheet)
  if(e.target===document.getElementById('av-modal')){
    closeAvatarEditor();
  }
};

function closeAvatarEditor(){
  var modal=document.getElementById('av-modal');
  modal.classList.remove('open');
  document.body.style.overflow='';
}

// Listen for messages from the avatar editor iframe
window.addEventListener('message',function(e){
  if(!e.data||!e.data.type)return;
  if(e.data.type==='avatarSaved'){
    // Update the displayed avatar immediately
    if(e.data.avatarIMG) setAvatarImg(e.data.avatarIMG);
    closeAvatarEditor();
    toast('Avatar updated! ✓');
    Haptics.success();
  }
  if(e.data.type==='avatarEditorClose'){
    closeAvatarEditor();
  }
});

// ── Sign out / reset ────────────────────────────────────────────────────────
document.getElementById('signout-btn').onclick=()=>{Haptics.warning();IQData.signOut()};
document.getElementById('reset-btn').onclick=()=>{
  Haptics.warning();
  if(confirm('Reset all progress?')){Haptics.error();IQData.reset();location.reload();}
};

// ── Share card ──────────────────────────────────────────────────────────────
var shareCanvas=null,shareUrl='';
function getShareUrl(){var u=IQData.getCurrentUser();return u?'https://cebear.com/@'+u.uid:'https://cebear.com';}
function rr(c,x,y,w,h,r,f){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();if(f){c.fillStyle=f;c.fill()}}
function loadImg(src){return new Promise(r=>{if(!src){r(null);return}var img=new Image();img.crossOrigin='anonymous';img.onload=()=>r(img);img.onerror=()=>r(null);img.src=src})}

async function genShareCard(){
  var d=IQData.load(),W=1200,H=630,cv=document.createElement('canvas');
  cv.width=W;cv.height=H;var c=cv.getContext('2d');
  var uname=d.username||IQData.getCurrentUser()?.displayName||'Brain';
  var acc=IQData.getAccuracy(),iq=String(d.iq||'--');
  var pctText=d.iq?'TOP '+formatPercentile(iqToPercentile(d.iq)).toUpperCase():'';

  // Get avatar image
  var picSrc=document.getElementById('av-img')?.src||null;
  var [picImg,logoImg]=await Promise.all([loadImg(picSrc),loadImg('logo.png')]);

  c.fillStyle='#334570';c.fillRect(0,0,W,H);
  var g1=c.createRadialGradient(350,220,0,350,220,380);
  g1.addColorStop(0,'rgba(232,168,23,0.07)');g1.addColorStop(1,'transparent');
  c.fillStyle=g1;c.fillRect(0,0,W,H);

  var pad=56,picR=110,picCx=pad+picR+20,picCy=200;
  var pg=c.createRadialGradient(picCx,picCy,picR-30,picCx,picCy,picR+50);
  pg.addColorStop(0,'rgba(232,168,23,0.18)');pg.addColorStop(1,'transparent');
  c.fillStyle=pg;c.beginPath();c.arc(picCx,picCy,picR+50,0,Math.PI*2);c.fill();
  c.lineWidth=8;c.strokeStyle='#e8a817';c.beginPath();c.arc(picCx,picCy,picR+10,0,Math.PI*2);c.stroke();
  c.fillStyle='#243a6e';c.beginPath();c.arc(picCx,picCy,picR,0,Math.PI*2);c.fill();
  if(picImg){c.save();c.beginPath();c.arc(picCx,picCy,picR,0,Math.PI*2);c.clip();c.drawImage(picImg,picCx-picR,picCy-picR,picR*2,picR*2);c.restore();}
  else{c.font='900 72px Nunito';c.textAlign='center';c.textBaseline='middle';c.fillStyle='rgba(240,234,214,0.3)';c.fillText(uname.charAt(0).toUpperCase(),picCx,picCy);}
  c.font='900 36px Nunito';c.fillStyle='#F0EAD6';c.textAlign='center';c.textBaseline='top';c.fillText(uname,picCx,picCy+picR+18);

  var iqZoneLeft=picCx+picR+60,iqZoneRight=W-pad,iqCx=(iqZoneLeft+iqZoneRight)/2,iqCy=180;
  c.font='900 36px Nunito';c.fillStyle='rgba(240,234,214,0.3)';c.textAlign='center';c.textBaseline='bottom';c.fillText('IQ',iqCx,iqCy-100);
  c.font='900 260px Nunito';c.fillStyle='#F0EAD6';c.textBaseline='middle';c.textAlign='center';c.fillText(iq,iqCx,iqCy);
  var numW=c.measureText(iq).width;rr(c,iqCx-numW/2+10,iqCy+120,numW-20,6,3,'#e8a817');
  if(pctText){c.font='900 24px Nunito';var tw=c.measureText(pctText).width+56,pillY=iqCy+140;rr(c,iqCx-tw/2,pillY,tw,48,24,'rgba(232,168,23,0.15)');c.strokeStyle='#e8a817';c.lineWidth=3;c.beginPath();c.moveTo(iqCx-tw/2+24,pillY);c.lineTo(iqCx+tw/2-24,pillY);c.arc(iqCx+tw/2-24,pillY+24,24,-Math.PI/2,Math.PI/2);c.lineTo(iqCx-tw/2+24,pillY+48);c.arc(iqCx-tw/2+24,pillY+24,24,Math.PI/2,-Math.PI/2);c.closePath();c.stroke();c.fillStyle='#e8a817';c.textBaseline='middle';c.textAlign='center';c.fillText(pctText,iqCx,pillY+24);}

  var band2Y=400,boxGap=14,boxW=(W-pad*2-boxGap*3)/4,boxH=90;
  [{v:String(d.answered||0),l:'ANSWERED',color:'#3fba4f'},{v:acc+'%',l:'ACCURACY',color:'#3a7df2'},{v:String(d.bestStreak||0),l:'STREAK',color:'#e87d1a'},{v:'Lvl '+(d.level||1),l:'LEVEL',color:'#6d4aed'}].forEach(function(s,i){
    var bx=pad+i*(boxW+boxGap);rr(c,bx,band2Y,boxW,boxH,16,'rgba(240,234,214,0.05)');rr(c,bx+16,band2Y,boxW-32,3,1.5,s.color);
    c.font='900 36px Nunito';c.fillStyle='#F0EAD6';c.textAlign='center';c.textBaseline='middle';c.fillText(s.v,bx+boxW/2,band2Y+38);
    c.font='800 13px Nunito';c.fillStyle='rgba(240,234,214,0.3)';c.fillText(s.l,bx+boxW/2,band2Y+68);
  });

  var brandY=band2Y+boxH+20,brandCy=brandY+((H-brandY)/2);
  c.strokeStyle='rgba(240,234,214,0.06)';c.lineWidth=1;c.beginPath();c.moveTo(pad,brandY);c.lineTo(W-pad,brandY);c.stroke();
  var logoSize=48;c.font='900 48px Nunito';var cebW=c.measureText('cebear').width,comW=c.measureText('.com').width;
  var totalBrandW=(logoImg?logoSize+14:0)+cebW+comW+14+60,bx2=W/2-totalBrandW/2;
  if(logoImg){c.drawImage(logoImg,bx2,brandCy-logoSize/2,logoSize,logoSize);bx2+=logoSize+14;}
  c.fillStyle='#F0EAD6';c.textAlign='left';c.textBaseline='middle';c.fillText('cebear',bx2,brandCy);bx2+=cebW;
  c.fillStyle='rgba(240,234,214,0.4)';c.fillText('.com',bx2,brandCy);bx2+=comW+14;
  c.fillStyle='#e8a817';c.beginPath();c.arc(bx2,brandCy,5,0,Math.PI*2);c.fill();bx2+=20;
  c.font='800 22px Nunito';c.fillStyle='#e8a817';c.fillText('Beat me!',bx2,brandCy);

  shareCanvas=cv;return cv;
}

async function uploadShareCard(){
  var user=IQData.getCurrentUser();if(!user||!shareCanvas)return;
  var d=IQData.load();
  try{
    var du=shareCanvas.toDataURL('image/png');var b64=du.split(',')[1];
    var sd={iq:d.iq||0,username:d.username||user.displayName||'Brain',answered:d.answered||0,accuracy:parseInt(IQData.getAccuracy())||0,bestStreak:d.bestStreak||0,cardBase64:b64,updatedAt:new Date().toISOString()};
    await parent.firebase.firestore().collection('shares').doc(user.uid).set(sd);
  }catch{}
}
function buildShareGrid(){
  var hn=!!navigator.share,grid=document.getElementById('share-grid');grid.innerHTML='';
  var opts=[];
  if(hn)opts.push({id:'native',label:'Share',cls:'sd-native',icon:'<svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>'});
  opts.push({id:'copylink',label:'Copy',cls:'sd-copy',icon:'<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>'});
  opts.push({id:'x',label:'X',cls:'sd-x',icon:'<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'});
  opts.push({id:'whatsapp',label:'WhatsApp',cls:'sd-wa',icon:'<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.13.556 4.13 1.532 5.87L.06 23.71l5.99-1.572A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>'});
  opts.push({id:'save',label:'Save',cls:'sd-save',icon:'<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'});
  opts.forEach(o=>{var b=document.createElement('button');b.className='share-dest '+o.cls;b.innerHTML='<div class="sd-icon">'+o.icon+'</div>'+o.label;b.onclick=()=>handleShareAction(o.id);grid.appendChild(b)});
}
function getShareText(){var d=IQData.load();return d.iq?'My IQ is '+d.iq+' on Cebear! Top '+formatPercentile(iqToPercentile(d.iq))+' — can you beat me?':'Training my brain on Cebear!';}
function handleShareAction(id){
  Haptics.medium();var text=getShareText();
  switch(id){
    case'native':navigator.share({title:'My Cebear IQ',text:text,url:shareUrl}).catch(()=>{});break;
    case'copylink':navigator.clipboard.writeText(shareUrl).then(()=>{Haptics.success();toast('Link copied!')}).catch(()=>toast('Copy failed'));break;
    case'x':window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(shareUrl),'_blank');break;
    case'whatsapp':window.open('https://wa.me/?text='+encodeURIComponent(text+' '+shareUrl),'_blank');break;
    case'save':if(!shareCanvas)return;Haptics.success();var a=document.createElement('a');a.download='cebear-stats.png';a.href=shareCanvas.toDataURL('image/png');a.click();toast('Image saved!');break;
  }
}
async function openShare(){
  var fab=document.getElementById('share-btn');fab.disabled=true;fab.innerHTML='<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Generating...';
  shareUrl=getShareUrl();await genShareCard();await uploadShareCard();
  fab.disabled=false;fab.innerHTML='<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Share Your IQ';
  document.getElementById('share-url').value=shareUrl;
  var pv=document.getElementById('card-preview');pv.innerHTML='';
  var pc=document.createElement('canvas');pc.width=600;pc.height=315;pc.getContext('2d').drawImage(shareCanvas,0,0,600,315);pv.appendChild(pc);
  buildShareGrid();document.getElementById('share-modal').classList.add('show');
}
document.getElementById('share-btn').onclick=()=>{Haptics.medium();openShare()};
document.getElementById('share-modal').onclick=e=>{if(e.target.id==='share-modal'){Haptics.light();document.getElementById('share-modal').classList.remove('show');}};
document.getElementById('copy-link').onclick=()=>handleShareAction('copylink');

// ── Start ──────────────────────────────────────────────────────────────────
loadProfile();
loadAvatar();
</script>
